<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>复古换装小屋</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: #f7efe7;
      color: #5b4030;
    }

    .page {
      width: 1100px;
      max-width: 96%;
      margin: 28px auto;
    }

    h1 {
      text-align: center;
      font-size: 30px;
      margin: 0 0 24px;
      color: #6b452e;
      letter-spacing: 2px;
    }

    .main {
      display: flex;
      gap: 28px;
      align-items: flex-start;
    }

    .preview-box {
      width: 270px;
      background: #fff;
      border: 1px solid #e4d2c2;
      border-radius: 16px;
      padding: 22px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(90, 60, 40, 0.12);
      flex-shrink: 0;
    }

    .preview-title {
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 14px;
      color: #6b452e;
    }

    .avatar-outer {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
      background: #f5eee7;
      border-radius: 12px;
      border: 1px dashed #d2bba7;
      margin-bottom: 18px;
    }

    .avatar {
      position: relative;
      width: 140px;
      height: 226px;
      background: transparent;
      overflow: hidden;
    }

    .layer {
      position: absolute;
      left: 0;
      top: 0;
      width: 140px;
      height: 226px;
      object-fit: contain;
      pointer-events: none;
      image-rendering: auto;
    }

    /*
      图层顺序：从下到上
      背景-前景装饰-翅膀-后发-衣服-上衣-下装-身体/脸-颈饰品-前发-帽子-眼镜-耳饰-脸饰品-手持物-特效-陪伴-文字装饰-相框

      头发只使用一个素材文件夹：assets/hair
      *_front 放前发层；*_back 放后发层，后发不显示分类按钮，会被前发自动带出。
    */
    #layer-background { z-index: 0; }
    #layer-front { z-index: 10; }
    #layer-wing { z-index: 20; }

    #layer-hair-back { z-index: 25; }

    #layer-clothes { z-index: 30; }
    #layer-bottom { z-index: 31; }
    #layer-top { z-index: 32; }

    #layer-body { z-index: 40; }
    #layer-neck { z-index: 50; }
    #layer-hair { z-index: 60; }

    #layer-hat { z-index: 70; }
    #layer-glasses { z-index: 80; }
    #layer-earring { z-index: 90; }
    #layer-face { z-index: 100; }
    #layer-hand { z-index: 110; }
    #layer-effect { z-index: 120; }
    #layer-partner { z-index: 130; }
    #layer-text { z-index: 140; }
    #layer-frame { z-index: 150; }

    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .save-btn,
    .reset-btn {
      border: none;
      color: #fff;
      padding: 9px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .save-btn { background: #8b5e3c; }
    .save-btn:hover { background: #6e4528; }

    .reset-btn { background: #b9997b; }
    .reset-btn:hover { background: #98775a; }

    .panel {
      flex: 1;
      background: #fff;
      border: 1px solid #e4d2c2;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(90, 60, 40, 0.12);
      min-height: 520px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
      padding-bottom: 16px;
      border-bottom: 1px solid #eee0d5;
    }

    .tabs button {
      border: none;
      background: #d9b99b;
      color: #4f3424;
      padding: 10px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
    }

    .tabs button:hover { background: #c9a17e; }

    .tabs button.active {
      background: #8b5e3c;
      color: #fff;
    }

    .category-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      color: #6b452e;
    }

    .category-title {
      font-size: 17px;
      font-weight: bold;
    }

    .category-count {
      font-size: 13px;
      color: #9a7a64;
    }

    .items {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(128px, 1fr));
      gap: 14px;
      max-height: 640px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .item {
      background: #faf7f3;
      border: 1px solid #e5d9cc;
      border-radius: 10px;
      padding: 8px;
      text-align: center;
      cursor: pointer;
      transition: 0.15s;
      min-height: 198px;
    }

    .item:hover {
      border-color: #8b5e3c;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(90, 60, 40, 0.12);
    }

    .item.selected {
      border-color: #8b5e3c;
      background: #f3e4d6;
    }

    .item img {
      width: 96px;
      height: 155px;
      object-fit: contain;
      background: #eee;
      border-radius: 6px;
    }


    /* 头发合成缩略图：后发 + 前发叠加显示 */
    .hair-thumb {
      position: relative;
      width: 96px;
      height: 155px;
      margin: 0 auto;
      background: #eee;
      border-radius: 6px;
      overflow: hidden;
    }

    .hair-thumb img {
      position: absolute;
      left: 0;
      top: 0;
      width: 96px;
      height: 155px;
      object-fit: contain;
      background: transparent;
      border-radius: 0;
    }

    .hair-back-thumb {
      z-index: 1;
    }

    .hair-front-thumb {
      z-index: 2;
    }

    .item-name {
      font-size: 13px;
      margin-top: 8px;
      color: #5b4030;
      word-break: break-all;
      line-height: 1.35;
    }

    .empty-item {
      width: 96px;
      height: 155px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eee;
      color: #777;
      font-size: 13px;
      border-radius: 6px;
    }

    .warning {
      background: #fff7e6;
      border: 1px solid #f0d49b;
      color: #8a611f;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 14px;
    }



    .load-more-wrap {
      grid-column: 1 / -1;
      display: flex;
      justify-content: center;
      padding: 10px 0 4px;
    }

    .load-more-btn {
      border: none;
      background: #8b5e3c;
      color: #fff;
      padding: 10px 22px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      box-shadow: 0 4px 10px rgba(90, 60, 40, 0.12);
    }

    .load-more-btn:hover {
      background: #6e4528;
    }

    .load-more-note {
      grid-column: 1 / -1;
      text-align: center;
      color: #9a7a64;
      font-size: 12px;
      padding: 2px 0 8px;
    }

    @media (max-width: 760px) {
      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      .page {
        width: 100%;
        max-width: 100%;
        height: 100dvh;

        padding: 0 10px 12px;

      }

      h1 { display: none; }

      .main {

      .preview-title { display: none; }

      .avatar-outer {

        padding: 2px 10px 0;
        margin-bottom: 4px;
        overflow: visible;
      }

      .avatar {

      .btn-row {

      .save-btn,

      .panel {

      .tabs button {

      .category-head {

      .items {

        overflow-x: hidden;

        -webkit-overflow-scrolling: touch;
      }

      .item {
        min-height: 136px;
        padding: 6px;
        border-radius: 9px;
      }

      .item img,
      .empty-item {
        width: 62px;
        height: 100px;
        border-radius: 6px;
      }


      .hair-thumb {
        width: 62px;
        height: 100px;
        border-radius: 6px;
      }

      .hair-thumb img {
        width: 62px;
        height: 100px;
      }

      .item-name {
        font-size: 11px;
        margin-top: 5px;
        line-height: 1.25;
      }
    }

    /* 声明按钮与弹窗 */
    .notice-btn {
      border: none;
      color: #fff;
      padding: 9px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      background: linear-gradient(180deg, #7fbfff, #4f92df);
      box-shadow: 0 5px 14px rgba(68, 143, 232, 0.20);
    }

    .notice-btn:hover {
      background: linear-gradient(180deg, #69aeff, #367ed0);
    }

    .notice-modal {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .notice-modal.show {
      display: flex;
    }

    .notice-mask {
      position: absolute;
      inset: 0;
      background: rgba(20, 46, 86, 0.38);
      backdrop-filter: blur(5px);
    }

    .notice-panel {
      position: relative;
      width: min(520px, 92vw);
      background: rgba(255, 255, 255, 0.96);
      border: 2px solid #a9cdfc;
      border-radius: 18px;
      box-shadow:
        0 18px 48px rgba(65, 132, 221, 0.28),
        inset 0 1px 0 rgba(255,255,255,0.95);
      padding: 26px 26px 22px;
      color: #1f3c68;
      animation: noticePop 0.18s ease-out;
    }

    @keyframes noticePop {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

      margin: 0 0 16px;

      text-align: center;
      letter-spacing: 1px;

  <!-- 这个文件由“生成素材清单.py”自动生成 -->
  <script src="items.js?v=gender20260619"></script>

  <script>
    const ITEMS = window.ITEMS || {};

    /*
      页面显示分类。
      用户仍然只看到“衣服 / 上衣 / 下装 / 头发”，
      但底层会根据当前性别读取 clothes_f / clothes_m 等真实素材分类。
    */
    const CATEGORY_ORDER = [
      "background",
      "front",
      "wing",
      "clothes",
      "bottom",
      "top",
      "body",
      "neck",
      "hair",
      "hat",
      "glasses",
      "earring",
      "face",
      "hand",
      "effect",
      "partner",
      "text",
      "frame"
    ];

    /*
      实际图层顺序。
      这里仍然使用统一图层，不直接暴露 clothes_f / clothes_m。
    */
    const LAYER_ORDER = [
      "background",
      "front",
      "wing",
      "hair_back",
      "clothes",
      "bottom",
      "top",
      "body",
      "neck",
      "hair",
      "hat",
      "glasses",
      "earring",
      "face",
      "hand",
      "effect",
      "partner",
      "text",

    ];

    /*
      只有这四类对用户分男女。
      hair_back 是头发后发的内部图层，也跟随男女，但不显示成分类按钮。
    */
    const GENDER_SPLIT_CATEGORIES = ["clothes", "bottom", "top", "hair"];
    const GENDER_SPLIT_LAYERS = ["clothes", "bottom", "top", "hair", "hair_back"];
    const GENDER_LABEL = {
      f: "女",
      m: "男"
    };

    const CATEGORY_NAME = {
      background: "背景",
      front: "前景装饰",
      wing: "翅膀",
      clothes: "衣服",
      top: "上衣",
      bottom: "下装",
      body: "身体/脸",
      neck: "颈饰品",
      hair: "头发",
      hat: "帽子",
      glasses: "眼镜",
      earring: "耳饰",
      face: "脸饰品",
      hand: "手持物",
      effect: "特效",
      partner: "陪伴",
      text: "文字装饰",
      frame: "相框"
    };

    const LAYER_ID = {
      background: "layer-background",
      front: "layer-front",
      wing: "layer-wing",
      clothes: "layer-clothes",
      top: "layer-top",
      bottom: "layer-bottom",
      hair_back: "layer-hair-back",
      body: "layer-body",
      neck: "layer-neck",
      hair: "layer-hair",
      hat: "layer-hat",
      glasses: "layer-glasses",
      earring: "layer-earring",
      face: "layer-face",
      hand: "layer-hand",
      effect: "layer-effect",
      partner: "layer-partner",
      text: "layer-text",
      frame: "layer-frame"
    };

    const DRAW_ORDER = [
      "background",
      "front",
      "wing",
      "hair_back",
      "clothes",
      "bottom",
      "top",
      "body",
      "neck",
      "hair",
      "hat",
      "glasses",
      "earring",
      "face",
      "hand",
      "effect",
      "partner",
      "text",
      "frame"
    ];

    const EMPTY_OPTIONS = {
      background: "空白背景",
      front: "无前景装饰",
      wing: "无翅膀",
      clothes: "不穿整套",
      top: "不穿上衣",
      bottom: "不穿下装",
      neck: "无颈饰品",
      hair: "无头发",
      hat: "不戴帽子",
      glasses: "不戴眼镜",
      earring: "不戴耳饰",
      face: "无脸饰品",
      hand: "不拿物品",
      effect: "无特效",
      partner: "无陪伴",
      text: "无文字装饰",
      frame: "无相框"
    };

    const state = {};
    let currentCategory = "background";
    let currentGender = "f";

    /*
      防卡顿设置：
      1. 手机端每次先显示 30 个素材，网页端每次先显示 60 个素材。
      2. 用户滑到素材列表底部附近时，自动加载下一批。
      3. 当前搭配自动保存到 localStorage，刷新后自动恢复。
      4. 男女分类各自保存衣服、上衣、下装、头发。
    */
    const STORAGE_KEY = "qqshow_avatar_state_v5_gender";
    const OLD_STORAGE_KEY = "qqshow_avatar_state_v4";
    const visibleCounts = {};
    let autoLoadTimer = null;

    function genderCategoryName(category, gender) {
      return category + "_" + gender;
    }

    function genderCandidateExists(category, gender) {
      const candidate = genderCategoryName(category, gender);
      return Array.isArray(ITEMS[candidate]) && ITEMS[candidate].length > 0;
    }

    function getRealCategory(category) {
      if (!GENDER_SPLIT_LAYERS.includes(category)) {
        return category;
      }

      const candidate = genderCategoryName(category, currentGender);

      /*
        兼容旧结构：
        如果 clothes_f / hair_f 等不存在或为空，而旧 clothes / hair 里有素材，
        就继续读取旧分类，避免网站直接空掉。
      */
      if (Array.isArray(ITEMS[candidate]) && ITEMS[candidate].length > 0) {
        return candidate;
      }

      if (Array.isArray(ITEMS[category]) && ITEMS[category].length > 0) {
        return category;
      }

      return candidate;
    }

    function getStateKey(category) {
      if (!GENDER_SPLIT_LAYERS.includes(category)) {
        return category;
      }
      return getRealCategory(category);
    }

    function getState(category) {
      return state[getStateKey(category)] || "";
    }

    function setState(category, src) {
      state[getStateKey(category)] = src || "";
    }

    function getCategoryList(category) {
      const realCategory = getRealCategory(category);
      return ITEMS[realCategory] || [];
    }

    function getVisibleCount(category) {
      const realCategory = getRealCategory(category);
      return visibleCounts[realCategory] || getBatchSize();
    }

    function setVisibleCount(category, value) {
      const realCategory = getRealCategory(category);
      visibleCounts[realCategory] = value;
    }

    function getBatchSize() {
      return window.innerWidth <= 760 ? 30 : 60;
    }

    function increaseVisibleCount(category) {
      const list = getCategoryList(category);
      const realCategory = getRealCategory(category);
      visibleCounts[realCategory] = Math.min(getVisibleCount(category) + getBatchSize(), list.length);
    }

    function setupAutoLoadScroll() {
      const box = document.getElementById("items");

      if (!box) return;

      box.addEventListener("scroll", function () {
        if (autoLoadTimer) return;

        autoLoadTimer = setTimeout(function () {
          autoLoadTimer = null;

          const list = getCategoryList(currentCategory);
          const currentVisible = getVisibleCount(currentCategory);

          if (currentVisible >= list.length) return;

          const distanceToBottom = box.scrollHeight - box.scrollTop - box.clientHeight;

          if (distanceToBottom < 360) {
            const previousScrollTop = box.scrollTop;
            increaseVisibleCount(currentCategory);
            renderItems(currentCategory, { preserveScrollTop: previousScrollTop });
          }
        }, 120);
      }, { passive: true });
    }

    function init() {
      ensureCategories();
      checkItemsLoaded();
      createGenderSwitch();
      createTabs();
      restoreSavedAvatar();
      ensureGenderDefaults(currentGender);
      applyAllLayers();
      renderItems(currentCategory);
      setupAutoLoadScroll();
      updateClothesVisibility();
      updateGenderStatus();
    }

    function addEmptyOption(realCategory, displayCategory) {
      if (!ITEMS[realCategory]) {
        ITEMS[realCategory] = [];
      }

      if (!EMPTY_OPTIONS[displayCategory]) {
        return;
      }

      const hasEmpty = ITEMS[realCategory].some(item => item.src === "");
      if (!hasEmpty) {
        ITEMS[realCategory].unshift({
          name: EMPTY_OPTIONS[displayCategory],
          src: ""
        });
      }
    }

    function ensureCategories() {
      /*
        确保旧分类存在。
      */
      LAYER_ORDER.forEach(category => {
        if (!ITEMS[category]) {
          ITEMS[category] = [];
        }
      });

      /*
        确保男女分类存在。
      */
      ["f", "m"].forEach(gender => {
        GENDER_SPLIT_LAYERS.forEach(category => {
          const realCategory = genderCategoryName(category, gender);
          if (!ITEMS[realCategory]) {
            ITEMS[realCategory] = [];
          }
        });
      });

      /*
        给可显示分类加“不使用”选项。
      */
      CATEGORY_ORDER.forEach(category => {
        addEmptyOption(category, category);

        if (GENDER_SPLIT_CATEGORIES.includes(category)) {
          ["f", "m"].forEach(gender => {
            addEmptyOption(genderCategoryName(category, gender), category);
          });
        }
      });
    }

    function checkItemsLoaded() {
      const warningBox = document.getElementById("itemsWarning");

      if (!window.ITEMS) {
        warningBox.innerHTML = `
          <div class="warning">
            没有检测到 <b>items.js</b>。<br>
            请先运行 <b>生成素材清单_四字诗意命名版_男女分类.py</b>，生成 items.js 后再刷新网页。
          </div>
        `;
        return;
      }

      warningBox.innerHTML = "";
    }

    function createGenderSwitch() {
      document.querySelectorAll("#genderSwitch button").forEach(btn => {
        btn.onclick = function () {
          const gender = btn.getAttribute("data-gender");

          if (!gender || gender === currentGender) return;

          switchGender(gender);
        };
      });

      updateGenderStatus();
    }

    function updateGenderStatus() {
      document.querySelectorAll("#genderSwitch button").forEach(btn => {
        btn.classList.remove("active");

        if (btn.getAttribute("data-gender") === currentGender) {
          btn.classList.add("active");
        }
      });
    }

    function switchGender(gender) {
      currentGender = gender;

      ensureGenderDefaults(gender);
      applyAllLayers();
      updateClothesVisibility();
      renderItems(currentCategory, { resetScrollTop: true });
      updateGenderStatus();
      updateTabStatus();
      saveAvatarState();

      trackGAEvent("gender_switch", {
        gender: gender
      });
    }

    function createTabs() {
      const tabs = document.getElementById("tabs");
      tabs.innerHTML = "";

      CATEGORY_ORDER.forEach(category => {
        const btn = document.createElement("button");
        btn.innerText = CATEGORY_NAME[category];
        btn.setAttribute("data-category", category);

        btn.onclick = function () {
          trackGAEvent("category_click", {
            item_category: category,
            gender: currentGender
          });

          currentCategory = category;
          renderItems(category, { resetScrollTop: true });
          updateTabStatus();
        };

        tabs.appendChild(btn);
      });

      updateTabStatus();
    }

    function updateTabStatus() {
      document.querySelectorAll("#tabs button").forEach(btn => {
        btn.classList.remove("active");

        if (btn.getAttribute("data-category") === currentCategory) {
          btn.classList.add("active");
        }
      });
    }

    function ensureGenderDefaults(gender) {
      /*
        只给当前性别的四个分男女分类设置默认值。
        其它共用分类不受男女切换影响。
      */
      const oldGender = currentGender;
      currentGender = gender;

      GENDER_SPLIT_CATEGORIES.forEach(category => {
        const key = getStateKey(category);
        if (typeof state[key] === "string") {
          return;
        }

        const list = getCategoryList(category);
        state[key] = list.length > 0 ? list[0].src : "";
      });

      const hairBackKey = getStateKey("hair_back");
      if (typeof state[hairBackKey] !== "string") {
        state[hairBackKey] = "";
      }

      autoChooseHairBack(getState("hair"), true);

      currentGender = oldGender;
    }

    function setDefaultAvatar() {
      CATEGORY_ORDER.forEach(category => {
        const list = getCategoryList(category);

        if (list.length > 0) {
          chooseItem(category, list[0].src, true);
        } else {
          setState(category, "");
          applyLayer(category);
        }
      });

      autoChooseHairBack(getState("hair"), true);
    }

    function saveAvatarState() {
      try {
        const data = {
          state: state,
          currentCategory: currentCategory,
          currentGender: currentGender,
          savedAt: Date.now(),
          version: "gender_v5"
        };

        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (error) {
        console.log("自动保存搭配失败：", error);
      }
    }

    function restoreSavedAvatar() {
      let saved = null;

      try {
        const raw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem(OLD_STORAGE_KEY);
        if (raw) {
          saved = JSON.parse(raw);
        }
      } catch (error) {
        console.log("读取上次搭配失败：", error);
        saved = null;
      }

      if (!saved) {
        setDefaultAvatar();
        return;
      }

      if (saved.state && typeof saved.state === "object") {
        Object.keys(saved.state).forEach(key => {
          state[key] = typeof saved.state[key] === "string" ? saved.state[key] : "";
        });
      } else {
        /*
          兼容旧版本保存结构。
        */
        LAYER_ORDER.forEach(category => {
          state[category] = typeof saved[category] === "string" ? saved[category] : "";
        });
      }

      if (saved.currentCategory && CATEGORY_ORDER.includes(saved.currentCategory)) {
        currentCategory = saved.currentCategory;
      }

      if (saved.currentGender === "f" || saved.currentGender === "m") {
        currentGender = saved.currentGender;
      }

      ensureGenderDefaults(currentGender);
      autoChooseHairBack(getState("hair"), true);
      applyAllLayers();
      updateClothesVisibility();
    }

    function clearSavedAvatarState() {
      try {
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(OLD_STORAGE_KEY);
      } catch (error) {
        console.log("清除保存搭配失败：", error);
      }
    }

    function renderItems(category, options = {}) {
      const box = document.getElementById("items");
      const title = document.getElementById("categoryTitle");
      const count = document.getElementById("categoryCount");

      const preserveScrollTop = options.preserveScrollTop;
      const shouldResetScrollTop = options.resetScrollTop;

      box.innerHTML = "";

      const realCategory = getRealCategory(category);
      const list = getCategoryList(category);
      const selectedSrc = getState(category);

      if (GENDER_SPLIT_CATEGORIES.includes(category)) {
        title.innerText = CATEGORY_NAME[category] + "（" + GENDER_LABEL[currentGender] + "）";
      } else {
        title.innerText = CATEGORY_NAME[category];
      }

      if (list.length === 0) {
        count.innerText = "0 个素材";
        box.innerHTML = `
          <div class="warning">
            当前分类没有素材。<br>
            ${
              GENDER_SPLIT_CATEGORIES.includes(category)
                ? "请把图片放入 <b>assets/" + realCategory + "</b> 文件夹，然后运行 <b>生成素材清单_四字诗意命名版_男女分类.py</b>。"
                : "请把图片放入 <b>assets/" + category + "</b> 文件夹，然后运行 <b>生成素材清单_四字诗意命名版_男女分类.py</b>。"
            }
          </div>
        `;
        return;
      }

      let visibleCount = Math.min(getVisibleCount(category), list.length);

      /*
        如果当前已选素材在后面批次中，自动展开到它所在的位置。
      */
      const selectedIndex = list.findIndex(item => selectedSrc === item.src);
      if (selectedIndex >= visibleCount) {
        visibleCount = Math.min(list.length, selectedIndex + 1);
      }

      setVisibleCount(category, visibleCount);

      const visibleList = list.slice(0, visibleCount);
      count.innerText = visibleList.length + "/" + list.length + " 个素材";

      visibleList.forEach(item => {
        const div = document.createElement("div");
        div.className = "item";

        if (selectedSrc === item.src) {
          div.classList.add("selected");
        }

        if (item.src) {
          if (category === "hair") {
            const backSrc = getMatchedHairBackSrc(item.src);

            if (backSrc) {
              div.innerHTML = `
                <div class="hair-thumb">
                  <img class="hair-back-thumb" src="${backSrc}" alt="" loading="lazy" decoding="async">
                  <img class="hair-front-thumb" src="${item.src}" alt="${item.name}" loading="lazy" decoding="async">
                </div>
                <div class="item-name">${item.name}</div>
              `;
            } else {
              div.innerHTML = `
                <div class="hair-thumb">
                  <img class="hair-front-thumb" src="${item.src}" alt="${item.name}" loading="lazy" decoding="async">
                </div>
                <div class="item-name">${item.name}</div>
              `;
            }
          } else {
            div.innerHTML = `
              <img src="${item.src}" alt="${item.name}" loading="lazy" decoding="async">
              <div class="item-name">${item.name}</div>
            `;
          }
        } else {
          div.innerHTML = `
            <div class="empty-item">不使用</div>
            <div class="item-name">${item.name}</div>
          `;
        }

        div.onclick = function () {
          chooseItem(category, item.src, false);
          renderItems(category, { preserveScrollTop: box.scrollTop });
        };

        box.appendChild(div);
      });

      if (visibleCount < list.length) {
        const note = document.createElement("div");
        note.className = "auto-load-note";
        note.innerText = "继续向下滑动，自动加载更多素材（" + visibleCount + "/" + list.length + "）";
        box.appendChild(note);
      }

      if (typeof preserveScrollTop === "number") {
        box.scrollTop = preserveScrollTop;
      } else if (shouldResetScrollTop) {
        box.scrollTop = 0;
      }
    }

    function chooseItem(category, src, isInit = false) {
      /*
        如果选中了“整套衣服”，自动清空当前性别的上衣和下装。
      */
      if (category === "clothes" && src) {
        setState("top", "");
        setState("bottom", "");
        applyLayer("top");
        applyLayer("bottom");
      }

      setState(category, src);
      applyLayer(category);

      /*
        如果选中头发，自动匹配当前性别里的后发。
      */
      if (category === "hair") {
        autoChooseHairBack(src, isInit);
      }

      updateClothesVisibility();

      if (!isInit) {
        saveAvatarState();

        trackGAEvent("choose_item", {
          item_category: category,
          real_category: getRealCategory(category),
          gender: currentGender,
          has_item: src ? "yes" : "no"
        });

        updateTabStatus();
      }
    }

    function applyLayer(category) {
      const img = document.getElementById(LAYER_ID[category]);
      const src = getState(category);

      if (!img) return;

      if (src) {
        img.src = src;
        img.style.display = "block";
      } else {
        img.removeAttribute("src");
        img.style.display = "none";
      }
    }

    function applyAllLayers() {
      LAYER_ORDER.forEach(category => {
        applyLayer(category);
      });
    }

    function clearLayer(category) {
      setState(category, "");
      applyLayer(category);
    }

    function getHairMatchKey(src) {
      if (!src) return "";

      const fileName = src.split("/").pop() || "";

      return fileName
        .toLowerCase()
        .replace(/\.[^.]+$/, "")
        .replace(/_front$/, "")
        .replace(/_back$/, "")
        .replace(/^front_/, "")
        .replace(/^back_/, "");
    }

    function getHairBackList() {
      const realHairBack = getRealCategory("hair_back");
      return ITEMS[realHairBack] || ITEMS.hair_back || [];
    }

    function getMatchedHairBackSrc(frontSrc) {
      if (!frontSrc) return "";

      const frontKey = getHairMatchKey(frontSrc);
      const backList = getHairBackList();

      const matchedBack = backList.find(item => {
        if (!item.src) return false;
        return getHairMatchKey(item.src) === frontKey;
      });

      return matchedBack ? matchedBack.src : "";
    }

    function autoChooseHairBack(frontSrc, isInit = false) {
      /*
        取消头发时，后发也清空。
      */
      if (!frontSrc) {
        setState("hair_back", "");
        applyLayer("hair_back");
        return;
      }

      const backSrc = getMatchedHairBackSrc(frontSrc);
      setState("hair_back", backSrc || "");
      applyLayer("hair_back");

      if (!isInit) {
        saveAvatarState();
      }
    }

    function updateClothesVisibility() {
      const clothesImg = document.getElementById("layer-clothes");
      const hasTop = !!getState("top");
      const hasBottom = !!getState("bottom");

      if (!clothesImg) return;

      if (hasTop || hasBottom) {
        clothesImg.style.display = "none";
      } else {
        clothesImg.style.display = getState("clothes") ? "block" : "none";
      }
    }

    function resetAvatar() {
      trackGAEvent("reset_avatar", {
        gender: currentGender
      });

      setDefaultAvatar();
      saveAvatarState();
      renderItems(currentCategory, { resetScrollTop: true });
      updateClothesVisibility();
    }

    function saveAvatar() {
      trackGAEvent("save_avatar", {
        gender: currentGender
      });

      const canvas = document.createElement("canvas");
      canvas.width = 140;
      canvas.height = 226;

      const ctx = canvas.getContext("2d");

      let index = 0;

      function drawNext() {
        if (index >= DRAW_ORDER.length) {
          const link = document.createElement("a");
          link.download = "my-avatar.png";
          link.href = canvas.toDataURL("image/png");
          link.click();
          return;
        }

        const category = DRAW_ORDER[index];
        index++;

        /*
          上衣或下装出现时，保存图片也不绘制整套衣服。
        */
        if (category === "clothes" && (getState("top") || getState("bottom"))) {
          drawNext();
          return;
        }

        const src = getState(category);

        if (!src) {
          drawNext();
          return;
        }

        const img = new Image();

        img.onload = function () {
          ctx.drawImage(img, 0, 0, 140, 226);
          drawNext();
        };

        img.onerror = function () {
          console.log("图片加载失败：", src);
          drawNext();
        };

        img.src = src;
      }

      drawNext();
    }

    function trackGAEvent(eventName, params = {}) {
      if (typeof gtag === "function") {
        gtag("event", eventName, params);
      }
    }

    window.addEventListener("beforeunload", saveAvatarState);


    function openNotice() {
      const modal = document.getElementById("noticeModal");
      if (!modal) return;

      modal.classList.add("show");
      modal.setAttribute("aria-hidden", "false");

      trackGAEvent("notice_open");
    }

    function closeNotice() {
      const modal = document.getElementById("noticeModal");
      if (!modal) return;

      modal.classList.remove("show");
      modal.setAttribute("aria-hidden", "true");
    }

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        closeNotice();
      }
    });

    init();
  </script>
