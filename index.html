<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 已移除聊天室按钮和入口 -->
  <title>复古换装小屋</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: #f7efe7;
      color: #5b4030;
    }

    .page {
      width: 1100px;
      max-width: 96%;
      margin: 28px auto;
    }

    h1 {
      text-align: center;
      font-size: 30px;
      margin: 0 0 24px;
      color: #6b452e;
      letter-spacing: 2px;
    }

    .main {
      display: flex;
      gap: 28px;
      align-items: flex-start;
    }

    .preview-box {
      width: 270px;
      background: #fff;
      border: 1px solid #e4d2c2;
      border-radius: 16px;
      padding: 22px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(90, 60, 40, 0.12);
      flex-shrink: 0;
    }

    .preview-title {
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 14px;
      color: #6b452e;
    }

    .avatar-outer {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
      background: #f5eee7;
      border-radius: 12px;
      border: 1px dashed #d2bba7;
      margin-bottom: 18px;
    }

    .avatar {
      position: relative;
      width: 140px;
      height: 226px;
      background: transparent;
      overflow: hidden;
    }

    .layer {
      position: absolute;
      left: 0;
      top: 0;
      width: 140px;
      height: 226px;
      object-fit: contain;
      pointer-events: none;
      image-rendering: auto;
    }

    /*
      图层顺序：从下到上
      背景-前景装饰-翅膀-后发-衣服-上衣-下装-身体/脸-颈饰品-前发-帽子-眼镜-耳饰-脸饰品-手持物-特效-陪伴-文字装饰-相框

      头发只使用一个素材文件夹：assets/hair
      *_front 放前发层；*_back 放后发层，后发不显示分类按钮，会被前发自动带出。
    */
    #layer-background { z-index: 0; }
    #layer-front { z-index: 10; }
    #layer-wing { z-index: 20; }

    #layer-hair-back { z-index: 25; }

    #layer-clothes { z-index: 30; }
    #layer-bottom { z-index: 31; }
    #layer-top { z-index: 32; }

    #layer-body { z-index: 40; }
    #layer-neck { z-index: 50; }
    #layer-hair { z-index: 60; }

    #layer-hat { z-index: 70; }
    #layer-glasses { z-index: 80; }
    #layer-earring { z-index: 90; }
    #layer-face { z-index: 100; }
    #layer-face-2 { z-index: 101; }
    #layer-face-3 { z-index: 102; }
    #layer-hand { z-index: 110; }
    #layer-effect { z-index: 120; }
    #layer-partner { z-index: 130; }
    #layer-text { z-index: 140; }
    #layer-frame { z-index: 150; }

    .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .save-btn,
    .reset-btn {
      border: none;
      color: #fff;
      padding: 9px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .save-btn { background: #8b5e3c; }
    .save-btn:hover { background: #6e4528; }

    .reset-btn { background: #b9997b; }
    .reset-btn:hover { background: #98775a; }

    .panel {
      flex: 1;
      background: #fff;
      border: 1px solid #e4d2c2;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(90, 60, 40, 0.12);
      min-height: 520px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
      padding-bottom: 16px;
      border-bottom: 1px solid #eee0d5;
    }

    .tabs button {
      border: none;
      background: #d9b99b;
      color: #4f3424;
      padding: 10px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
    }

    .tabs button:hover { background: #c9a17e; }

    .tabs button.active {
      background: #8b5e3c;
      color: #fff;
    }

    .category-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      color: #6b452e;
    }

    .category-title {
      font-size: 17px;
      font-weight: bold;
    }

    .category-count {
      font-size: 13px;
      color: #9a7a64;
    }

    .items {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(128px, 1fr));
      gap: 14px;
      max-height: 640px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .item {
      background: #faf7f3;
      border: 1px solid #e5d9cc;
      border-radius: 10px;
      padding: 8px;
      text-align: center;
      cursor: pointer;
      transition: 0.15s;
      min-height: 198px;
    }

    .item:hover {
      border-color: #8b5e3c;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(90, 60, 40, 0.12);
    }

    .item.selected {
      border-color: #8b5e3c;
      background: #f3e4d6;
    }

    .item img {
      width: 96px;
      height: 155px;
      object-fit: contain;
      background: #eee;
      border-radius: 6px;
    }


    /* 头发合成缩略图：后发 + 前发叠加显示 */
    .hair-thumb {
      position: relative;
      width: 96px;
      height: 155px;
      margin: 0 auto;
      background: #eee;
      border-radius: 6px;
      overflow: hidden;
    }

    .hair-thumb img {
      position: absolute;
      left: 0;
      top: 0;
      width: 96px;
      height: 155px;
      object-fit: contain;
      background: transparent;
      border-radius: 0;
    }

    .hair-back-thumb {
      z-index: 1;
    }

    .hair-front-thumb {
      z-index: 2;
    }

    .item-name {
      font-size: 13px;
      margin-top: 8px;
      color: #5b4030;
      word-break: break-all;
      line-height: 1.35;
    }

    .empty-item {
      width: 96px;
      height: 155px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #eee;
      color: #777;
      font-size: 13px;
      border-radius: 6px;
    }

    .warning {
      background: #fff7e6;
      border: 1px solid #f0d49b;
      color: #8a611f;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 14px;
    }



    .load-more-wrap {
      grid-column: 1 / -1;
      display: flex;
      justify-content: center;
      padding: 10px 0 4px;
    }

    .load-more-btn {
      border: none;
      background: #8b5e3c;
      color: #fff;
      padding: 10px 22px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      box-shadow: 0 4px 10px rgba(90, 60, 40, 0.12);
    }

    .load-more-btn:hover {
      background: #6e4528;
    }

    .load-more-note {
      grid-column: 1 / -1;
      text-align: center;
      color: #9a7a64;
      font-size: 12px;
      padding: 2px 0 8px;
    }

    @media (max-width: 760px) {
      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      .page {
        width: 100%;
        max-width: 100%;
        height: 100dvh;
        max-height: 100dvh;
        margin: 0;
        padding: 0 10px 12px;
        overflow: hidden;
      }

      h1 { display: none; }

      .main {
        height: 100%;
        display: flex;
        flex-direction: column;
        gap: 8px;
        overflow: hidden;
      }

      .preview-box {
        flex: 0 0 auto;
        width: 100%;
        padding: 4px 10px 6px;
        border-radius: 0 0 14px 14px;
        box-shadow: 0 8px 18px rgba(90, 60, 40, 0.14);
        overflow: visible;
      }

      .preview-title { display: none; }

      .avatar-outer {
        align-items: flex-start;
        min-height: 350px;
        padding: 2px 10px 0;
        margin-bottom: 4px;
        overflow: visible;
      }

      .avatar {
        transform: translateY(-12px) scale(1.52);
        transform-origin: top center;
        overflow: visible;
      }

      .btn-row {
        position: relative;
        z-index: 1200;
        margin-top: 0;
        padding: 2px 0;
        background: #fff;
        border-radius: 8px;
      }

      .save-btn,
      .reset-btn {
        padding: 6px 12px;
        font-size: 12px;
        line-height: 1.2;
        border-radius: 7px;
      }

      .panel {
        flex: 1 1 auto;
        min-height: 0;
        width: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        padding: 0;
        border-radius: 12px 12px 0 0;
        box-shadow: none;
      }

      .tabs {
        flex: 0 0 auto;
        display: flex;
        flex-wrap: nowrap;
        overflow-x: auto;
        overflow-y: hidden;
        gap: 7px;
        margin: 0;
        padding: 8px 8px;
        background: #fff;
        border-bottom: 1px solid #eee0d5;
        box-shadow: 0 3px 8px rgba(90, 60, 40, 0.08);
        -webkit-overflow-scrolling: touch;
      }

      .tabs::-webkit-scrollbar { display: none; }

      .tabs button {
        flex: 0 0 auto;
        white-space: nowrap;
        padding: 8px 12px;
        font-size: 14px;
        line-height: 1.15;
        border-radius: 8px;
      }

      .category-head {
        flex: 0 0 auto;
        padding: 7px 10px 5px;
        margin-bottom: 0;
        background: #fff;
        border-bottom: 1px solid #f1e5db;
      }

      .category-title { font-size: 14px; }
      .category-count { font-size: 11px; }

      .items {
        flex: 1 1 auto;
        min-height: 0;
        grid-template-columns: repeat(auto-fill, minmax(84px, 1fr));
        gap: 9px;
        max-height: none;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 8px 8px 16px;
        -webkit-overflow-scrolling: touch;
      }

      .item {
        min-height: 136px;
        padding: 6px;
        border-radius: 9px;
      }

      .item img,
      .empty-item {
        width: 62px;
        height: 100px;
        border-radius: 6px;
      }


      .hair-thumb {
        width: 62px;
        height: 100px;
        border-radius: 6px;
      }

      .hair-thumb img {
        width: 62px;
        height: 100px;
      }

      .item-name {
        font-size: 11px;
        margin-top: 5px;
        line-height: 1.25;
      }
    }
  
    /* =========================
       风格覆盖：蓝白 QQ 空间风
       只改视觉，不改功能逻辑
       ========================= */
    body {
      background:
        radial-gradient(circle at 12% 8%, rgba(143, 194, 255, 0.45), transparent 28%),
        radial-gradient(circle at 88% 16%, rgba(203, 228, 255, 0.55), transparent 30%),
        linear-gradient(180deg, #f7fbff 0%, #eaf4ff 45%, #ffffff 100%);
      color: #1f3c68;
    }

    .page {
      position: relative;
    }

    h1 {
      color: #1e66c9;
      text-shadow: 0 3px 0 rgba(255,255,255,0.9);
      letter-spacing: 3px;
    }

    h1::before {
      content: "☁ ";
      color: #72aefa;
    }

    h1::after {
      content: " ✦";
      color: #72aefa;
    }

    .preview-box,
    .panel {
      background: rgba(255, 255, 255, 0.88);
      border: 2px solid #a9cdfc;
      box-shadow:
        0 12px 30px rgba(65, 132, 221, 0.16),

    }

    .preview-title,
    .category-title {

    }

    .avatar-outer {
      background:

    .tabs button {

    .tabs button:hover {
      background: linear-gradient(180deg, #ffffff, #cfe4ff);

    .tabs button.active {
      background: linear-gradient(180deg, #4fa2ff, #1f72df);

    .save-btn {

    }

    .notice-btn {
      background: linear-gradient(180deg, #7fbfff, #4f92df);

    .category-count {

    }

    .item {
      background: linear-gradient(180deg, #ffffff, #f0f7ff);

    }

    .item:hover {

    .item img,
    .empty-item,
    .hair-thumb {

    .item-name {

    }

    .empty-item {

    }

    }

    @media (max-width: 760px) {
      body {
        background:
          radial-gradient(circle at 20% 8%, rgba(143, 194, 255, 0.50), transparent 30%),
          linear-gradient(180deg, #f6fbff 0%, #eaf4ff 58%, #ffffff 100%);

    /* 声明按钮与弹窗 */
    .notice-btn {
      border: none;
      color: #fff;
      padding: 9px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      background: linear-gradient(180deg, #7fbfff, #4f92df);
      box-shadow: 0 5px 14px rgba(68, 143, 232, 0.20);
    }

    .notice-btn:hover {
      background: linear-gradient(180deg, #69aeff, #367ed0);
    }

    .notice-modal {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .notice-modal.show {
      display: flex;
    }

    .notice-mask {
      position: absolute;
      inset: 0;
      background: rgba(20, 46, 86, 0.38);
      backdrop-filter: blur(5px);
    }

    .notice-panel {
      position: relative;
      width: min(520px, 92vw);
      background: rgba(255, 255, 255, 0.96);
      border: 2px solid #a9cdfc;
      border-radius: 18px;
      box-shadow:
        0 18px 48px rgba(65, 132, 221, 0.28),
        inset 0 1px 0 rgba(255,255,255,0.95);
      padding: 26px 26px 22px;
      color: #1f3c68;
      animation: noticePop 0.18s ease-out;
    }

    @keyframes noticePop {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .notice-panel h2 {
      margin: 0 0 16px;
      color: #1d64bd;
      font-size: 22px;
      text-align: center;
      letter-spacing: 1px;
    }

    .notice-content {
      background: linear-gradient(180deg, #f7fbff, #ffffff);
      border: 1px solid #c7dfff;
      border-radius: 14px;
      padding: 16px 16px;
      line-height: 1.8;
      font-size: 15px;
    }

    .notice-content p {
      margin: 0 0 10px;
    }

    .notice-content p:last-child {
      margin-bottom: 0;
    }

    .notice-content a {
      color: #1f72df;
      font-weight: 700;
      text-decoration: none;
      border-bottom: 1px solid rgba(31, 114, 223, 0.35);
    }

    .notice-content a:hover {
      color: #ff5fae;
      border-bottom-color: rgba(255, 95, 174, 0.55);
    }

    .notice-close {
      position: absolute;
      top: 10px;
      right: 12px;
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 50%;
      background: #eaf4ff;
      color: #1d64bd;
      cursor: pointer;
      font-size: 24px;
      line-height: 30px;
    }

    .notice-close:hover {
      background: #d4e8ff;
    }

    .notice-ok {
      display: block;
      width: 160px;
      margin: 18px auto 0;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      color: #fff;
      background: linear-gradient(180deg, #4fa2ff, #1f72df);
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      box-shadow: 0 5px 14px rgba(31, 114, 223, 0.25);
    }

    .notice-ok:hover {
      background: linear-gradient(180deg, #318cf4, #145fc4);
    }

    @media (max-width: 760px) {
      .notice-btn {
        padding: 6px 12px;
        font-size: 12px;

        border-radius: 7px;
      }

      .notice-panel {
        width: min(430px, 94vw);
        padding: 22px 16px 18px;
        border-radius: 16px;
      }

      .notice-panel h2 {
        font-size: 20px;
      }

      .notice-content {
        font-size: 14px;
        line-height: 1.75;
        padding: 14px;
      }
    }

    .gender-label {

      cursor: pointer;

        overflow-x: auto;

      }

      .gender-label {
        font-size: 13px;
      }

      .gender-switch button {
        padding: 7px 16px;
        font-size: 14px;
      }
    }

  
    .undo-btn,
    .redo-btn {
      border: none;
      color: #ffffff;
      padding: 9px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      background: linear-gradient(180deg, #9ecbff, #5f9be5);
      box-shadow: 0 5px 14px rgba(68, 143, 232, 0.18);
    }

    .undo-btn:hover:not(:disabled),
    .redo-btn:hover:not(:disabled) {
      background: linear-gradient(180deg, #84bbff, #3f84d7);
    }

    .undo-btn:disabled,
    .redo-btn:disabled {
      cursor: not-allowed;
      opacity: 0.42;
      box-shadow: none;
      filter: grayscale(0.2);
    }

    @media (max-width: 760px) {
      .undo-btn,
      .redo-btn {
        padding: 7px 12px;
        font-size: 12px;
        border-radius: 7px;
      }
    }

  
    .random-btn {
      border: none;
      color: #ffffff;
      padding: 9px 18px;
      border-radius: 8px;
      cursor: pointer;

    };

    const DRAW_ORDER = [
      "background",
      "front",
      "wing",
      "hair_back",
      "clothes",
      "bottom",
      "top",
      "body",
      "neck",
      "hair",
      "hat",
      "glasses",
      "earring",
      "face",
      "hand",
      "effect",
      "partner",
      "text",
      "frame"
    ];

    const EMPTY_OPTIONS = {
      background: "空白背景",
      front: "无前景装饰",
      wing: "无翅膀",
      clothes: "不穿整套",
      top: "不穿上衣",
      bottom: "不穿下装",
      neck: "无颈饰品",
      hair: "无头发",
      hat: "不戴帽子",
      glasses: "不戴眼镜",
      earring: "不戴耳饰",
      face: "无脸饰品",
      hand: "不拿物品",
      effect: "无特效",
      partner: "无陪伴",
      text: "无文字装饰",
      frame: "无相框"
    };

    const state = {};
    let currentCategory = "background";
    let currentGender = "f";

    /*
      防卡顿设置：
      1. 手机端每次先显示 30 个素材，网页端每次先显示 60 个素材。
      2. 用户滑到素材列表底部附近时，自动加载下一批。
      3. 当前搭配自动保存到 localStorage，刷新后自动恢复。
      4. 男女分类各自保存衣服、上衣、下装、头发。
    */
    const STORAGE_KEY = "qqshow_avatar_state_v7_default_face3_undo";
    const OLD_STORAGE_KEY = "qqshow_avatar_state_v4";
    const HISTORY_LIMIT = 50;
    const visibleCounts = {};
    const undoStack = [];
    const redoStack = [];
    let autoLoadTimer = null;
    let isRestoringHistory = false;

    function genderCategoryName(category, gender) {
      return category + "_" + gender;
    }

    function categoryHasRealItems(categoryName) {
      return Array.isArray(ITEMS[categoryName]) && ITEMS[categoryName].some(item => item && item.src);
    }

    function genderCandidateExists(category, gender) {
      const candidate = genderCategoryName(category, gender);
      return categoryHasRealItems(candidate);
    }

    function getRealCategory(category) {
      if (!GENDER_SPLIT_LAYERS.includes(category)) {
        return category;
      }

      const candidate = genderCategoryName(category, currentGender);

      /*
        兼容旧结构：
        只有 clothes_f / hair_f 等分类里真的存在素材文件时，才读取男女分类。
        如果男女分类只有“不使用”空项，就回退到旧 clothes / hair 里的 default。
      */
      if (categoryHasRealItems(candidate)) {
        return candidate;
      }

      if (categoryHasRealItems(category)) {
        return category;
      }

      if (Array.isArray(ITEMS[candidate])) {
        return candidate;
      }

      return category;
    }

    function getStateKey(category) {
      if (!GENDER_SPLIT_LAYERS.includes(category)) {
        return category;
      }
      return getRealCategory(category);
    }

    function getFaceList() {
      const value = state.face;

      if (Array.isArray(value)) {
        return value.filter(Boolean).slice(0, FACE_SLOT_LIMIT);
      }

      if (typeof value === "string" && value) {
        return [value];
      }

      return [];
    }

    function setFaceList(list) {
      if (!Array.isArray(list)) {
        state.face = [];
        return;
      }

      state.face = list.filter(Boolean).slice(0, FACE_SLOT_LIMIT);
    }

    function isFaceSelected(src) {
      if (!src) return getFaceList().length === 0;
      return getFaceList().includes(src);
    }

    function toggleFaceItem(src) {
      if (!src) {
        setFaceList([]);
        return;
      }

      const list = getFaceList();
      const existingIndex = list.indexOf(src);

      /*
        已选脸饰再次点击 = 取消该脸饰。
      */
      if (existingIndex >= 0) {
        list.splice(existingIndex, 1);
        setFaceList(list);
        return;
      }

      /*
        未满 3 个时直接追加。
        已满 3 个时，用新选择替换最早选择的那个，始终保持最多 3 个。
      */
      if (list.length < FACE_SLOT_LIMIT) {
        list.push(src);
      } else {
        list.shift();
        list.push(src);
      }

      setFaceList(list);
    }

    function getState(category) {
      if (category === "face") {
        return getFaceList();
      }

      return state[getStateKey(category)] || "";
    }

    function setState(category, src) {
      if (category === "face") {
        if (Array.isArray(src)) {
          setFaceList(src);
        } else if (typeof src === "string" && src) {
          setFaceList([src]);
        } else {
          setFaceList([]);
        }

        return;
      }

      state[getStateKey(category)] = src || "";
    }

    function getRawCategoryList(category) {
      const realCategory = getRealCategory(category);
      return ITEMS[realCategory] || [];
    }

    function getCategoryList(category) {
      const list = getRawCategoryList(category);

      /*
        头发分类只展示“前发”素材。
        如果后发和前发混在同一个素材分类里，这里会自动把 *_back / back_* 后发素材隐藏，
        缩略图再由 renderItems() 用“后发 + 前发”叠加合成显示。
      */
      if (category === "hair") {
        return getHairFrontListForDisplay(list);
      }

      return list;
    }



    function getDisplayCategoryList(category) {
      const list = getCategoryList(category);

      /*
        素材显示顺序：
        - “不使用”和 default 默认项保持在最前，方便恢复空白/默认状态；
        - 其余真实素材倒序显示，让最新加入 items.js 末尾的素材优先出现在上方。
      */
      const pinnedItems = [];
      const realItems = [];

      list.forEach(item => {
        if (!item || !item.src || isDefaultItem(item)) {
          pinnedItems.push(item);
        } else {
          realItems.push(item);
        }
      });

      return pinnedItems.concat(realItems.slice().reverse());
    }

    function isDefaultItem(item) {
      if (!item || !item.src) return false;

      const fileName = item.src.split("/").pop().toLowerCase();

      return fileName === "default.gif"
        || fileName === "default.png"
        || fileName === "default.jpg"
        || fileName === "default.jpeg"
        || fileName === "default.webp"
        || fileName.includes("default");
    }

    function getDefaultSrcForCategory(category) {
      const list = getCategoryList(category);

      /*
        优先选择真实文件名里含 default 的素材。
        这样无论 default 是否排在第一，都能作为默认形象。
      */
      const defaultItem = list.find(item => item && item.src && isDefaultItem(item));
      if (defaultItem) {
        return defaultItem.src;
      }

      /*
        如果没有 default，优先选择“不使用”空项。
        这样帽子、眼镜、脸饰、手持物等不会随机穿上第一个素材。
      */
      const emptyItem = list.find(item => item && item.src === "");
      if (emptyItem) {
        return "";
      }

      /*
        身体/脸等必需层如果没有 default，就退回第一个真实素材。
      */
      const firstRealItem = list.find(item => item && item.src);
      return firstRealItem ? firstRealItem.src : "";
    }

    function getVisibleCount(category) {
      const realCategory = getRealCategory(category);
      return visibleCounts[realCategory] || getBatchSize();
    }

    function setVisibleCount(category, value) {
      const realCategory = getRealCategory(category);
      visibleCounts[realCategory] = value;
    }

    function getBatchSize() {
      return window.innerWidth <= 760 ? 30 : 60;
    }

    function increaseVisibleCount(category) {
      const list = getCategoryList(category);
      const realCategory = getRealCategory(category);
      visibleCounts[realCategory] = Math.min(getVisibleCount(category) + getBatchSize(), list.length);
    }

    function setupAutoLoadScroll() {
      const box = document.getElementById("items");

      if (!box) return;

      box.addEventListener("scroll", function () {
        if (autoLoadTimer) return;

        autoLoadTimer = setTimeout(function () {
          autoLoadTimer = null;

          const list = getCategoryList(currentCategory);
          const currentVisible = getVisibleCount(currentCategory);

          if (currentVisible >= list.length) return;

          const distanceToBottom = box.scrollHeight - box.scrollTop - box.clientHeight;

          if (distanceToBottom < 360) {
            const previousScrollTop = box.scrollTop;
            increaseVisibleCount(currentCategory);
            renderItems(currentCategory, { preserveScrollTop: previousScrollTop });
          }
        }, 120);
      }, { passive: true });
    }

    function init() {
      ensureCategories();
      checkItemsLoaded();
      createGenderSwitch();
      createTabs();
      restoreSavedAvatar();
      ensureGenderDefaults(currentGender);
      applyAllLayers();
      renderItems(currentCategory);
      setupAutoLoadScroll();
      updateClothesVisibility();
      updateGenderStatus();
      updateHistoryButtons();
    }

    function addEmptyOption(realCategory, displayCategory) {
      if (!ITEMS[realCategory]) {
        ITEMS[realCategory] = [];
      }

      if (!EMPTY_OPTIONS[displayCategory]) {
        return;
      }

      const hasEmpty = ITEMS[realCategory].some(item => item.src === "");
      if (!hasEmpty) {
        ITEMS[realCategory].unshift({
          name: EMPTY_OPTIONS[displayCategory],
          src: ""
        });
      }
    }

    function ensureCategories() {
      /*
        确保旧分类存在。
      */
      LAYER_ORDER.forEach(category => {
        if (!ITEMS[category]) {
          ITEMS[category] = [];
        }
      });

      /*
        确保男女分类存在。
      */
      ["f", "m"].forEach(gender => {
        GENDER_SPLIT_LAYERS.forEach(category => {
          const realCategory = genderCategoryName(category, gender);
          if (!ITEMS[realCategory]) {
            ITEMS[realCategory] = [];
          }
        });
      });

      /*
        给可显示分类加“不使用”选项。
      */
      CATEGORY_ORDER.forEach(category => {
        addEmptyOption(category, category);

        if (GENDER_SPLIT_CATEGORIES.includes(category)) {
          ["f", "m"].forEach(gender => {
            addEmptyOption(genderCategoryName(category, gender), category);
          });
        }
      });
    }

    function checkItemsLoaded() {
      const warningBox = document.getElementById("itemsWarning");

      if (!window.ITEMS) {
        warningBox.innerHTML = `
          <div class="warning">
            没有检测到 <b>items.js</b>。<br>
            请先运行 <b>生成素材清单_四字诗意命名版_男女分类.py</b>，生成 items.js 后再刷新网页。
          </div>
        `;
        return;
      }

      warningBox.innerHTML = "";
    }

    function cloneStateForHistory() {
      const copied = {};

      Object.keys(state).forEach(key => {
        if (Array.isArray(state[key])) {
          copied[key] = state[key].slice();
        } else if (typeof state[key] === "string") {
          copied[key] = state[key];
        } else {
          copied[key] = "";
        }
      });

      return copied;
    }

    function createHistorySnapshot() {
      return {
        state: cloneStateForHistory(),
        currentCategory: currentCategory,
        currentGender: currentGender
      };
    }

    function pushHistorySnapshot() {
      if (isRestoringHistory) return;

      undoStack.push(createHistorySnapshot());

      if (undoStack.length > HISTORY_LIMIT) {
        undoStack.shift();
      }

      redoStack.length = 0;
      updateHistoryButtons();
    }

    function restoreHistorySnapshot(snapshot) {
      if (!snapshot) return;

      isRestoringHistory = true;

      Object.keys(state).forEach(key => {
        delete state[key];
      });

      const snapshotState = snapshot.state || {};
      Object.keys(snapshotState).forEach(key => {
        if (key === "face" && Array.isArray(snapshotState[key])) {
          state[key] = snapshotState[key].filter(Boolean).slice(0, FACE_SLOT_LIMIT);
        } else if (Array.isArray(snapshotState[key])) {
          state[key] = snapshotState[key].slice();
        } else {
          state[key] = typeof snapshotState[key] === "string" ? snapshotState[key] : "";
        }
      });

      if (snapshot.currentGender === "f" || snapshot.currentGender === "m") {
        currentGender = snapshot.currentGender;
      }

      if (snapshot.currentCategory && CATEGORY_ORDER.includes(snapshot.currentCategory)) {
        currentCategory = snapshot.currentCategory;
      }

      ensureGenderDefaults(currentGender);
      autoChooseHairBack(getState("hair"), true);
      applyAllLayers();
      updateClothesVisibility();
      updateGenderStatus();
      updateTabStatus();
      renderItems(currentCategory);
      saveAvatarState();

      isRestoringHistory = false;
      updateHistoryButtons();
    }

    function undoStep() {
      if (undoStack.length === 0) return;

      redoStack.push(createHistorySnapshot());
      const previous = undoStack.pop();
      restoreHistorySnapshot(previous);

      trackGAEvent("undo_step", {
        gender: currentGender
      });
    }

    function redoStep() {
      if (redoStack.length === 0) return;

      undoStack.push(createHistorySnapshot());
      const next = redoStack.pop();
      restoreHistorySnapshot(next);

      trackGAEvent("redo_step", {
        gender: currentGender
      });
    }

    function updateHistoryButtons() {
      const undoBtn = document.getElementById("undoBtn");
      const redoBtn = document.getElementById("redoBtn");

      if (undoBtn) {
        undoBtn.disabled = undoStack.length === 0;
      }

      if (redoBtn) {
        redoBtn.disabled = redoStack.length === 0;
      }
    }

    function createGenderSwitch() {
      document.querySelectorAll("#genderSwitch button").forEach(btn => {
        btn.onclick = function () {
          const gender = btn.getAttribute("data-gender");

          if (!gender || gender === currentGender) return;

          switchGender(gender);
        };
      });

      updateGenderStatus();
    }

    function updateGenderStatus() {
      document.querySelectorAll("#genderSwitch button").forEach(btn => {
        btn.classList.remove("active");

        if (btn.getAttribute("data-gender") === currentGender) {
          btn.classList.add("active");
        }
      });
    }

    function switchGender(gender) {
      pushHistorySnapshot();

      currentGender = gender;

      ensureGenderDefaults(gender);
      applyAllLayers();
      updateClothesVisibility();
      renderItems(currentCategory, { resetScrollTop: true });
      updateGenderStatus();
      updateTabStatus();
      saveAvatarState();

      trackGAEvent("gender_switch", {
        gender: gender
      });
    }

    function createTabs() {
      const tabs = document.getElementById("tabs");
      tabs.innerHTML = "";

      CATEGORY_ORDER.forEach(category => {
        const btn = document.createElement("button");
        btn.innerText = CATEGORY_NAME[category];
        btn.setAttribute("data-category", category);

        btn.onclick = function () {
          trackGAEvent("category_click", {
            item_category: category,
            gender: currentGender
          });

          currentCategory = category;
          renderItems(category, { resetScrollTop: true });
          updateTabStatus();
        };

        tabs.appendChild(btn);
      });

      updateTabStatus();
    }

    function updateTabStatus() {
      document.querySelectorAll("#tabs button").forEach(btn => {
        btn.classList.remove("active");

        if (btn.getAttribute("data-category") === currentCategory) {
          btn.classList.add("active");
        }
      });
    }

    function ensureGenderDefaults(gender) {
      /*
        只给当前性别的四个分男女分类设置默认值。
        其它共用分类不受男女切换影响。
      */
      const oldGender = currentGender;
      currentGender = gender;

      GENDER_SPLIT_CATEGORIES.forEach(category => {
        const key = getStateKey(category);
        if (typeof state[key] === "string") {
          return;
        }

        state[key] = getDefaultSrcForCategory(category);
      });

      const hairBackKey = getStateKey("hair_back");
      if (typeof state[hairBackKey] !== "string") {
        state[hairBackKey] = "";
      }

      autoChooseHairBack(getState("hair"), true);

      currentGender = oldGender;
    }

    function setDefaultAvatar() {
      /*
        恢复默认时，严格按素材文件里的 default 显示。
        有 default 文件：使用 default。
        没有 default 文件：优先不使用该分类。
        必需层没有 default：退回第一个真实素材。
      */
      CATEGORY_ORDER.forEach(category => {
        const defaultSrc = getDefaultSrcForCategory(category);
        chooseItem(category, defaultSrc, true);
      });

      autoChooseHairBack(getState("hair"), true);
      applyAllLayers();
      updateClothesVisibility();
    }

    function saveAvatarState() {
      try {
        const data = {
          state: state,
          currentCategory: currentCategory,
          currentGender: currentGender,
          savedAt: Date.now(),
          version: "default_face3_undo_random_all_v9"
        };

        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (error) {
        console.log("自动保存搭配失败：", error);
      }

      updateHistoryButtons();
    }

    function restoreSavedAvatar() {
      let saved = null;

      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          saved = JSON.parse(raw);
        }
      } catch (error) {
        console.log("读取上次搭配失败：", error);
        saved = null;
      }

      if (!saved) {
        setDefaultAvatar();
        return;
      }

      if (saved.state && typeof saved.state === "object") {
        Object.keys(saved.state).forEach(key => {
          if (key === "face" && Array.isArray(saved.state[key])) {
            state[key] = saved.state[key].filter(Boolean).slice(0, FACE_SLOT_LIMIT);
          } else {
            state[key] = typeof saved.state[key] === "string" ? saved.state[key] : "";
          }
        });
      } else {
        /*
          兼容旧版本保存结构。
        */
        LAYER_ORDER.forEach(category => {
          state[category] = typeof saved[category] === "string" ? saved[category] : "";
        });
      }

      if (saved.currentCategory && CATEGORY_ORDER.includes(saved.currentCategory)) {
        currentCategory = saved.currentCategory;
      }

      if (saved.currentGender === "f" || saved.currentGender === "m") {
        currentGender = saved.currentGender;
      }

      ensureGenderDefaults(currentGender);
      autoChooseHairBack(getState("hair"), true);
      applyAllLayers();
      updateClothesVisibility();
    }

    function clearSavedAvatarState() {
      try {
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(OLD_STORAGE_KEY);
      } catch (error) {
        console.log("清除保存搭配失败：", error);
      }
    }

    function renderItems(category, options = {}) {
      const box = document.getElementById("items");
      const title = document.getElementById("categoryTitle");
      const count = document.getElementById("categoryCount");

      const preserveScrollTop = options.preserveScrollTop;
      const shouldResetScrollTop = options.resetScrollTop;

      box.innerHTML = "";

      const realCategory = getRealCategory(category);
      const list = getDisplayCategoryList(category);
      const selectedSrc = getState(category);
      const selectedFaceList = category === "face" ? getFaceList() : [];

      if (GENDER_SPLIT_CATEGORIES.includes(category)) {
        title.innerText = CATEGORY_NAME[category] + "（" + GENDER_LABEL[currentGender] + "）";
      } else {
        title.innerText = CATEGORY_NAME[category];
      }

      if (list.length === 0) {
        count.innerText = "0 个素材";
        box.innerHTML = `
          <div class="warning">
            当前分类没有素材。<br>
            ${
              GENDER_SPLIT_CATEGORIES.includes(category)
                ? "请把图片放入 <b>assets/" + realCategory + "</b> 文件夹，然后运行 <b>生成素材清单_四字诗意命名版_男女分类.py</b>。"
                : "请把图片放入 <b>assets/" + category + "</b> 文件夹，然后运行 <b>生成素材清单_四字诗意命名版_男女分类.py</b>。"
            }
          </div>
        `;
        return;
      }

      let visibleCount = Math.min(getVisibleCount(category), list.length);

      /*
        如果当前已选素材在后面批次中，自动展开到它所在的位置。
      */
      const selectedIndex = category === "face"
        ? list.findIndex(item => item.src && selectedFaceList.includes(item.src))
        : list.findIndex(item => selectedSrc === item.src);
      if (selectedIndex >= visibleCount) {
        visibleCount = Math.min(list.length, selectedIndex + 1);
      }

      setVisibleCount(category, visibleCount);

      const visibleList = list.slice(0, visibleCount);
      if (category === "face") {
        count.innerText = visibleList.length + "/" + list.length + " 个素材，已选 " + selectedFaceList.length + "/" + FACE_SLOT_LIMIT;
      } else {
        count.innerText = visibleList.length + "/" + list.length + " 个素材";
      }

      visibleList.forEach(item => {
        const div = document.createElement("div");
        div.className = "item";

        if (category === "face") {
          if (isFaceSelected(item.src)) {
            div.classList.add("selected");
          }
        } else if (selectedSrc === item.src) {
          div.classList.add("selected");
        }

        if (item.src) {
          if (category === "hair") {
            const backSrc = getMatchedHairBackSrc(item.src);

            if (backSrc) {
              div.innerHTML = `
                <div class="hair-thumb">
                  <img class="hair-back-thumb" src="${backSrc}" alt="" loading="lazy" decoding="async">
                  <img class="hair-front-thumb" src="${item.src}" alt="${item.name}" loading="lazy" decoding="async">
                </div>
                <div class="item-name">${item.name}</div>
              `;
            } else {
              div.innerHTML = `
                <div class="hair-thumb">
                  <img class="hair-front-thumb" src="${item.src}" alt="${item.name}" loading="lazy" decoding="async">
                </div>
                <div class="item-name">${item.name}</div>
              `;
            }
          } else {
            div.innerHTML = `
              <img src="${item.src}" alt="${item.name}" loading="lazy" decoding="async">
              <div class="item-name">${item.name}</div>
            `;
          }
        } else {
          div.innerHTML = `
            <div class="empty-item">不使用</div>
            <div class="item-name">${item.name}</div>
          `;
        }

        div.onclick = function () {
          chooseItem(category, item.src, false);
          renderItems(category, { preserveScrollTop: box.scrollTop });
        };

        box.appendChild(div);
      });

      if (category === "face") {
        const faceNote = document.createElement("div");
        faceNote.className = "auto-load-note";
        faceNote.innerText = "脸饰品可叠加选择，最多 3 个；再次点击已选素材可取消";
        box.appendChild(faceNote);
      }

      if (visibleCount < list.length) {
        const note = document.createElement("div");
        note.className = "auto-load-note";
        note.innerText = "继续向下滑动，自动加载更多素材（" + visibleCount + "/" + list.length + "）";
        box.appendChild(note);
      }

      if (typeof preserveScrollTop === "number") {
        box.scrollTop = preserveScrollTop;
      } else if (shouldResetScrollTop) {
        box.scrollTop = 0;
      }
    }

    function chooseItem(category, src, isInit = false) {
      if (!isInit) {
        pushHistorySnapshot();
      }

      /*
        脸饰品支持叠加：
        - 点“不使用”会清空全部脸饰；
        - 点未选择的脸饰会加入；
        - 点已选择的脸饰会取消；
        - 已满 3 个再点新的，会替换最早选择的一个。
      */
      if (category === "face") {
        toggleFaceItem(src);
        applyLayer("face");

        if (!isInit) {
          saveAvatarState();

          trackGAEvent("choose_item", {
            item_category: category,
            real_category: getRealCategory(category),
            gender: currentGender,
            has_item: getFaceList().length > 0 ? "yes" : "no",
            selected_count: getFaceList().length
          });

          updateTabStatus();
        }

        return;
      }

      /*
        如果选中了“整套衣服”，自动清空当前性别的上衣和下装。
      */
      if (category === "clothes" && src) {
        setState("top", "");
        setState("bottom", "");
        applyLayer("top");
        applyLayer("bottom");
      }

      setState(category, src);
      applyLayer(category);

      /*
        如果选中头发，自动匹配当前性别里的后发。
      */
      if (category === "hair") {
        autoChooseHairBack(src, isInit);
      }

      updateClothesVisibility();

      if (!isInit) {
        saveAvatarState();

        trackGAEvent("choose_item", {
          item_category: category,
          real_category: getRealCategory(category),
          gender: currentGender,
          has_item: src ? "yes" : "no"
        });

        updateTabStatus();
      }
    }

    function applyLayer(category) {
      if (category === "face") {
        const list = getFaceList();

        FACE_LAYER_IDS.forEach((id, index) => {
          const img = document.getElementById(id);

          if (!img) return;

          const src = list[index];

          if (src) {
            img.src = src;
            img.style.display = "block";
          } else {
            img.removeAttribute("src");
            img.style.display = "none";
          }
        });

        return;
      }

      const img = document.getElementById(LAYER_ID[category]);
      const src = getState(category);

      if (!img) return;

      if (src) {
        img.src = src;
        img.style.display = "block";
      } else {
        img.removeAttribute("src");
        img.style.display = "none";
      }
    }

    function applyAllLayers() {
      LAYER_ORDER.forEach(category => {
        applyLayer(category);
      });
    }

    function clearLayer(category) {
      setState(category, "");
      applyLayer(category);
    }

    function getHairFileBase(src) {
      if (!src) return "";

      const fileName = (src.split("/").pop() || "").toLowerCase();
      return fileName.replace(/\.[^.]+$/, "");
    }

    function isHairBackSrc(src) {
      const base = getHairFileBase(src);

      return /(^|[_\-])back($|[_\-])/.test(base)
        || /_back$/.test(base)
        || /-back$/.test(base)
        || /^back[_\-]/.test(base)
        || base.includes("后发")
        || base.includes("houfa");
    }

    function isHairFrontSrc(src) {
      const base = getHairFileBase(src);

      return /(^|[_\-])front($|[_\-])/.test(base)
        || /_front$/.test(base)
        || /-front$/.test(base)
        || /^front[_\-]/.test(base)
        || base.includes("前发")
        || base.includes("qianfa");
    }

    function getHairFrontListForDisplay(list) {
      if (!Array.isArray(list)) return [];

      const emptyItems = list.filter(item => item && !item.src);
      const realItems = list.filter(item => item && item.src);
      /*
        修复：不要因为分类中存在少量 *_front 前发，就把其它没有 front 标记的头发全部隐藏。
        只隐藏明确命名为后发的素材；其余头发都显示出来。
        有匹配后发时，缩略图仍然会按“后发 + 前发”叠加显示。
      */
      const displayItems = realItems.filter(item => !isHairBackSrc(item.src));

      return emptyItems.concat(displayItems);
    }

    function uniqueHairItems(list) {
      const result = [];
      const seen = new Set();

      if (!Array.isArray(list)) return result;

      list.forEach(item => {
        if (!item || !item.src || seen.has(item.src)) return;
        seen.add(item.src);
        result.push(item);
      });

      return result;
    }

    function getHairMatchKey(src) {
      if (!src) return "";

      return getHairFileBase(src)
        .replace(/(^|[_\-])front($|[_\-])/g, "$1")
        .replace(/(^|[_\-])back($|[_\-])/g, "$1")
        .replace(/_front$/, "")
        .replace(/_back$/, "")
        .replace(/-front$/, "")
        .replace(/-back$/, "")
        .replace(/^front[_\-]/, "")
        .replace(/^back[_\-]/, "")
        .replace(/前发/g, "")
        .replace(/后发/g, "")
        .replace(/qianfa/g, "")
        .replace(/houfa/g, "")
        .replace(/[_\-]+$/g, "")
        .replace(/^[_\-]+/g, "");
    }

    function getHairBackList() {
      const realHairBack = getRealCategory("hair_back");
      const realHair = getRealCategory("hair");

      /*
        优先只在“当前性别”的头发素材里找后发，
        避免男性头发误匹配到女性后发缩略图。
        只有当前性别完全没有可用后发素材时，
        才回退到通用 hair_back / hair 分类里查找。
      */
      const scopedCandidates = []
        .concat(ITEMS[realHairBack] || [])
        .concat(ITEMS[realHair] || []);

      const scopedExplicitBackItems = scopedCandidates.filter(item => item && item.src && isHairBackSrc(item.src));
      const scopedHairBackCategoryItems = (ITEMS[realHairBack] || []).filter(item => item && item.src);
      const scopedResult = uniqueHairItems(scopedExplicitBackItems.concat(scopedHairBackCategoryItems));

      if (scopedResult.length > 0) {
        return scopedResult;
      }

      /*
        兼容旧素材结构：如果当前性别目录里确实没有后发，
        再回退到通用分类继续匹配。
      */
      const fallbackCandidates = []
        .concat(ITEMS.hair_back || [])
        .concat(ITEMS.hair || []);

      const fallbackExplicitBackItems = fallbackCandidates.filter(item => item && item.src && isHairBackSrc(item.src));
      const fallbackHairBackCategoryItems = (ITEMS.hair_back || []).filter(item => item && item.src);

      return uniqueHairItems(fallbackExplicitBackItems.concat(fallbackHairBackCategoryItems));
    }

    function getMatchedHairBackSrc(frontSrc) {
      if (!frontSrc) return "";

      const frontKey = getHairMatchKey(frontSrc);
      const backList = getHairBackList();

      const matchedBack = backList.find(item => {
        if (!item.src) return false;
        return getHairMatchKey(item.src) === frontKey;
      });

      return matchedBack ? matchedBack.src : "";
    }

    function autoChooseHairBack(frontSrc, isInit = false) {
      /*
        取消头发时，后发也清空。
      */
      if (!frontSrc) {
        setState("hair_back", "");
        applyLayer("hair_back");
        return;
      }

      const backSrc = getMatchedHairBackSrc(frontSrc);
      setState("hair_back", backSrc || "");
      applyLayer("hair_back");

      if (!isInit) {
        saveAvatarState();
      }
    }

    function updateClothesVisibility() {
      const clothesImg = document.getElementById("layer-clothes");
      const hasTop = !!getState("top");
      const hasBottom = !!getState("bottom");

      if (!clothesImg) return;

      if (hasTop || hasBottom) {
        clothesImg.style.display = "none";
      } else {
        clothesImg.style.display = getState("clothes") ? "block" : "none";
      }
    }

    function getRandomSelectableItem(category) {
      const list = getCategoryList(category);

      /*
        随机优先排除“不使用”和 default。
        如果该分类全是 default 或只有一个真实素材，则退回全部真实素材随机。
      */
      const nonDefaultList = list.filter(item => item && item.src && !isDefaultItem(item));
      const realList = list.filter(item => item && item.src);
      const pool = nonDefaultList.length > 0 ? nonDefaultList : realList;

      if (pool.length === 0) {
        return null;
      }

      const index = Math.floor(Math.random() * pool.length);
      return pool[index];
    }

    function getRandomSelectableList(category) {
      const list = getCategoryList(category);
      const nonDefaultList = list.filter(item => item && item.src && !isDefaultItem(item));
      const realList = list.filter(item => item && item.src);

      return nonDefaultList.length > 0 ? nonDefaultList : realList;
    }

    function getRandomItems(category, count) {
      const pool = getRandomSelectableList(category).slice();
      const result = [];

      while (pool.length > 0 && result.length < count) {
        const index = Math.floor(Math.random() * pool.length);
        result.push(pool.splice(index, 1)[0]);
      }

      return result;
    }

    function randomAllItems() {
  pushHistorySnapshot();

  /*
    美观随机：
    只随机核心形象，减少复杂装饰。
    目标：搭配更干净、更像正常头像，而不是把所有素材堆满。
  */

  // 1. 先清空容易显得杂乱的装饰层
  const clearCategories = [
    "front",
    "wing",
    "effect",
    "partner",
    "text",
    "frame",
    "hand"
  ];

  clearCategories.forEach(category => {
    setState(category, "");
    applyLayer(category);
  });

  // 2. 背景：随机，但只换一个
  const backgroundItem = getRandomSelectableItem("background");
  setState("background", backgroundItem && backgroundItem.src ? backgroundItem.src : "");
  applyLayer("background");

  // 3. 身体/脸：保留或随机一个
  const bodyItem = getRandomSelectableItem("body");
  if (bodyItem && bodyItem.src) {
    setState("body", bodyItem.src);
    applyLayer("body");
  }

  // 4. 头发：必随机一个，并自动带出后发
  const hairItem = getRandomSelectableItem("hair");
  if (hairItem && hairItem.src) {
    setState("hair", hairItem.src);
    applyLayer("hair");
    autoChooseHairBack(hairItem.src, true);
  } else {
    setState("hair", "");
    setState("hair_back", "");
    applyLayer("hair");
    applyLayer("hair_back");
  }

  // 5. 衣服逻辑：优先整套衣服，少量概率用上衣+下装
  const hasClothes = getRandomSelectableList("clothes").length > 0;
  const hasTop = getRandomSelectableList("top").length > 0;
  const hasBottom = getRandomSelectableList("bottom").length > 0;

  const useFullClothes = hasClothes && Math.random() < 0.78;

  if (useFullClothes) {
    const clothesItem = getRandomSelectableItem("clothes");

    setState("clothes", clothesItem && clothesItem.src ? clothesItem.src : "");
    setState("top", "");
    setState("bottom", "");

    applyLayer("clothes");
    applyLayer("top");
    applyLayer("bottom");
  } else {
    const topItem = getRandomSelectableItem("top");
    const bottomItem = getRandomSelectableItem("bottom");

    setState("clothes", "");
    setState("top", topItem && topItem.src ? topItem.src : "");
    setState("bottom", bottomItem && bottomItem.src ? bottomItem.src : "");

    applyLayer("clothes");
    applyLayer("top");
    applyLayer("bottom");
  }

  // 6. 颈饰：40% 概率出现
  if (Math.random() < 0.4) {
    const neckItem = getRandomSelectableItem("neck");
    setState("neck", neckItem && neckItem.src ? neckItem.src : "");
  } else {
    setState("neck", "");
  }
  applyLayer("neck");

  // 7. 帽子：25% 概率出现
  if (Math.random() < 0.25) {
    const hatItem = getRandomSelectableItem("hat");
    setState("hat", hatItem && hatItem.src ? hatItem.src : "");
  } else {
    setState("hat", "");
  }
  applyLayer("hat");

  // 8. 眼镜：25% 概率出现
  if (Math.random() < 0.25) {
    const glassesItem = getRandomSelectableItem("glasses");
    setState("glasses", glassesItem && glassesItem.src ? glassesItem.src : "");
  } else {
    setState("glasses", "");
  }
  applyLayer("glasses");

  // 9. 耳饰：25% 概率出现
  if (Math.random() < 0.25) {
    const earringItem = getRandomSelectableItem("earring");
    setState("earring", earringItem && earringItem.src ? earringItem.src : "");
  } else {
    setState("earring", "");
  }
  applyLayer("earring");

  // 10. 脸饰：最多只随机 1 个，35% 概率出现
  if (Math.random() < 0.35) {
    const faceItem = getRandomSelectableItem("face");
    setFaceList(faceItem && faceItem.src ? [faceItem.src] : []);
  } else {
    setFaceList([]);
  }
  applyLayer("face");

  updateClothesVisibility();
  saveAvatarState();
  renderItems(currentCategory);
  updateTabStatus();

  trackGAEvent("random_beauty_items", {
    gender: currentGender,
    face_count: getFaceList().length,
    outfit_mode: useFullClothes ? "clothes" : "top_bottom"
  });
}

    function resetAvatar() {
      pushHistorySnapshot();

      trackGAEvent("reset_avatar", {
        gender: currentGender
      });

      setDefaultAvatar();
      saveAvatarState();
      renderItems(currentCategory, { resetScrollTop: true });
      updateClothesVisibility();
    }

    function saveAvatar() {
      trackGAEvent("save_avatar", {
        gender: currentGender
      });

      const canvas = document.createElement("canvas");
      canvas.width = 140;
      canvas.height = 226;

      const ctx = canvas.getContext("2d");

      let index = 0;

      function drawImageList(srcList, done) {
        let listIndex = 0;

        function drawOne() {
          if (listIndex >= srcList.length) {
            done();
            return;
          }

          const src = srcList[listIndex];
          listIndex++;

          if (!src) {
            drawOne();
            return;
          }

          const img = new Image();

          img.onload = function () {
            ctx.drawImage(img, 0, 0, 140, 226);
            drawOne();
          };

          img.onerror = function () {
            console.log("图片加载失败：", src);
            drawOne();
          };

          img.src = src;
        }

        drawOne();
      }

      function drawNext() {
        if (index >= DRAW_ORDER.length) {
          const link = document.createElement("a");
          link.download = "my-avatar.png";
          link.href = canvas.toDataURL("image/png");
          link.click();
          return;
        }

        const category = DRAW_ORDER[index];
        index++;

        /*
          上衣或下装出现时，保存图片也不绘制整套衣服。
        */
        if (category === "clothes" && (getState("top") || getState("bottom"))) {
          drawNext();
          return;
        }

        if (category === "face") {
          const faceList = getFaceList();

          if (faceList.length === 0) {
            drawNext();
            return;
          }

          drawImageList(faceList, drawNext);
          return;
        }

        const src = getState(category);

        if (!src) {
          drawNext();
          return;
        }

        const img = new Image();

        img.onload = function () {
          ctx.drawImage(img, 0, 0, 140, 226);
          drawNext();
        };

        img.onerror = function () {
          console.log("图片加载失败：", src);
          drawNext();
        };

        img.src = src;
      }

      drawNext();
    }

    function trackGAEvent(eventName, params = {}) {
      if (typeof gtag === "function") {
        gtag("event", eventName, params);
      }
    }

    window.addEventListener("beforeunload", saveAvatarState);


    function openNotice() {
      const modal = document.getElementById("noticeModal");

      modal.classList.add("show");

    function closeNotice() {
      const modal = document.getElementById("noticeModal");
      if (!modal) return;

      modal.classList.remove("show");
      modal.setAttribute("aria-hidden", "true");
    }

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        closeNotice();
      }

    /* =========================
       复古聊天室多人在线版：
       进入聊天室时只带入指定形象图层：
       整套衣服 / 上衣+下装、身体、颈饰品、头发、帽子、眼镜、耳饰、脸饰品。
       背景、前景、翅膀、手持物、特效、陪伴、文字、相框不会进入聊天室。
       ========================= */
    const CHAT_AVATAR_KEY = "qqshow_chat_avatar_v1";
    const CHAT_MEMBERS_KEY = "qqshow_chat_members_v1";
    const CHAT_CURRENT_MEMBER_KEY = "qqshow_chat_current_member_v1";
    const CHAT_DEVICE_MEMBER_KEY = "qqshow_chat_device_member_id_v2";
    const CHAT_CLEANUP_MEMBER_IDS_KEY = "qqshow_chat_cleanup_member_ids_v1";
    const CHAT_SAVED_NICKNAME_KEY = "qqshow_chat_saved_nickname_v1";
    const CHAT_RETURN_REENTER_KEY = "qqshow_chat_return_reenter_v1";
    const CHAT_PRESERVE_HISTORY_KEY = "qqshow_chat_preserve_history_v1";

    const CHAT_ALLOWED_LAYER_IDS = [
      { key: "hair_back", id: "layer-hair-back", z: 25, label: "后发" },
      { key: "clothes", id: "layer-clothes", z: 30, label: "整套衣服" },
      { key: "bottom", id: "layer-bottom", z: 31, label: "下装" },
      { key: "top", id: "layer-top", z: 32, label: "上衣" },
      { key: "body", id: "layer-body", z: 40, label: "身体" },
      { key: "neck", id: "layer-neck", z: 50, label: "颈饰品" },
      { key: "hair", id: "layer-hair", z: 60, label: "前发" },
      { key: "hat", id: "layer-hat", z: 70, label: "帽子" },
      { key: "glasses", id: "layer-glasses", z: 80, label: "眼镜" },
      { key: "earring", id: "layer-earring", z: 90, label: "耳饰" },
      { key: "face", id: "layer-face", z: 100, label: "脸饰品1" },
      { key: "face_2", id: "layer-face-2", z: 101, label: "脸饰品2" },
      { key: "face_3", id: "layer-face-3", z: 102, label: "脸饰品3" }
    ];

    function getChatLayerSrc(layerId) {
      const img = document.getElementById(layerId);
      if (!img) return "";

      const computed = window.getComputedStyle(img);
      if (computed.display === "none" || computed.visibility === "hidden" || computed.opacity === "0") {
        return "";
      }

      const src = img.currentSrc || img.getAttribute("src") || img.src || "";
      if (!src || src.indexOf("data:,") >= 0) return "";

      return src;
    }


    function createSafeRandomId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return "device_" + window.crypto.randomUUID().replace(/-/g, "");
      }
      return "device_" + Date.now() + "_" + Math.random().toString(36).slice(2, 12);
    }

    function getStableChatMemberId() {
      let id = localStorage.getItem(CHAT_DEVICE_MEMBER_KEY) || localStorage.getItem(CHAT_CURRENT_MEMBER_KEY) || "";
      if (!id) {
        id = createSafeRandomId();
      }
      localStorage.setItem(CHAT_DEVICE_MEMBER_KEY, id);
      localStorage.setItem(CHAT_CURRENT_MEMBER_KEY, id);
      return id;
    }

    function rememberOldMemberIdsForCleanup(nextId) {
      const oldIds = [];
      const currentId = localStorage.getItem(CHAT_CURRENT_MEMBER_KEY);
      if (currentId && currentId !== nextId) oldIds.push(currentId);

      readChatMembers().forEach(member => {
        if (member && member.id && member.id !== nextId) oldIds.push(member.id);
      });

      const unique = Array.from(new Set(oldIds)).slice(0, 20);
      if (unique.length) {
        localStorage.setItem(CHAT_CLEANUP_MEMBER_IDS_KEY, JSON.stringify(unique));
      }
    }

    function buildChatAvatarData(name) {
      const layers = CHAT_ALLOWED_LAYER_IDS.map(layer => {
        return {
          key: layer.key,
          id: layer.id,
          z: layer.z,
          label: layer.label,
          src: getChatLayerSrc(layer.id)
        };
      }).filter(layer => !!layer.src);

      return {
        id: getStableChatMemberId(),
        name: String(name || "").trim().slice(0, 12),
        gender: currentGender,
        createdAt: Date.now(),
        layers: layers
      };
    }

    function readChatMembers() {
      try {
        const raw = localStorage.getItem(CHAT_MEMBERS_KEY);
        const list = raw ? JSON.parse(raw) : [];
        return Array.isArray(list) ? list : [];
      } catch (error) {
        return [];
      }
    }

    function saveChatMember(avatarData) {
      /*
        防重复进入：同一台手机/电脑固定使用同一个 member id。
        再次进入聊天室时只更新当前形象，不再新增一个在线角色。
      */
      rememberOldMemberIdsForCleanup(avatarData.id);
      localStorage.setItem(CHAT_DEVICE_MEMBER_KEY, avatarData.id);
      localStorage.setItem(CHAT_AVATAR_KEY, JSON.stringify(avatarData));
      localStorage.setItem(CHAT_CURRENT_MEMBER_KEY, avatarData.id);
      localStorage.setItem(CHAT_MEMBERS_KEY, JSON.stringify([avatarData]));
    }

    function getSavedChatNickname() {
      const direct = localStorage.getItem(CHAT_SAVED_NICKNAME_KEY);
      if (direct && String(direct).trim()) return String(direct).trim().slice(0, 12);
      try {
        const raw = localStorage.getItem(CHAT_AVATAR_KEY);
        const avatar = raw ? JSON.parse(raw) : null;
        if (avatar && avatar.name && String(avatar.name).trim()) return String(avatar.name).trim().slice(0, 12);
      } catch (error) {}
      return "";
    }
