<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Cloudflare 聊天室诊断页</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #e8f8ff;
      color: #06435e;
      padding: 14px;
      font-size: 15px;
    }
    .box {
      border: 1px solid #75c7df;
      border-radius: 10px;
      background: #fff;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    h1 { font-size: 20px; margin: 0 0 10px; }
    button {
      border: 1px solid #42acd1;
      background: linear-gradient(#e8fbff,#a9e7fb);
      border-radius: 8px;
      padding: 8px 12px;
      color: #065477;
      font-weight: bold;
      margin: 4px 4px 4px 0;
    }
    .ok { color: #078a32; font-weight: bold; }
    .bad { color: #d50000; font-weight: bold; }
    .muted { color: #668; }
    .members {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }
    .member {
      border: 1px solid #a8d8ea;
      border-radius: 8px;
      background: #f7fdff;
      padding: 8px;
      min-height: 210px;
    }
    .avatar {
      width: 120px;
      height: 170px;
      position: relative;
      margin: 0 auto 6px;
      background: rgba(205,235,245,.45);
      overflow: hidden;
    }
    .avatar img {
      position: absolute;
      left: 0;
      top: 0;
      width: 120px;
      height: 170px;
      object-fit: contain;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-all;
      background: #f2fbff;
      border: 1px solid #cdeaf5;
      border-radius: 8px;
      padding: 8px;
      max-height: 280px;
      overflow: auto;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Cloudflare 聊天室诊断页</h1>
    <div>用途：只测试 Worker + D1 在线成员，不读取本地换装数据，不用 WebSocket。</div>
    <div style="margin-top:8px;">
      <button onclick="runAll()">立即检测</button>
      <button onclick="joinTestMember()">模拟加入一个测试用户</button>
      <button onclick="leaveTestMember()">移除测试用户</button>
    </div>
  </div>

  <div class="box">
    <div>Worker：<span id="healthStatus" class="muted">未检测</span></div>
    <div>房间：<b>castle_garden</b></div>
    <div>后端在线人数：<span id="memberCount" class="muted">未读取</span></div>
    <div>最后检测时间：<span id="timeText" class="muted">-</span></div>
  </div>

  <div class="box">
    <h1>在线成员渲染</h1>
    <div id="members" class="members"></div>
  </div>

  <div class="box">
    <h1>原始返回 JSON</h1>
    <pre id="raw">等待检测...</pre>
  </div>

<script>
const API = "https://qq-chat-worker.z3517679867.workers.dev";
const ROOM_ID = "castle_garden";
const TEST_ID = "debug_mobile_test_" + Math.random().toString(36).slice(2, 8);

function $(id) { return document.getElementById(id); }

async function fetchJson(url, options) {
  const res = await fetch(url, options || {});
  const text = await res.text();
  try {
    return JSON.parse(text);
  } catch (e) {
    throw new Error("返回不是 JSON：" + text.slice(0, 200));
  }
}

async function checkHealth() {
  try {
    const data = await fetchJson(API + "/health?v=" + Date.now());
    $("healthStatus").className = data.ok ? "ok" : "bad";
    $("healthStatus").textContent = data.ok ? ("正常：" + (data.version || "unknown")) : "异常";
  } catch (e) {
    $("healthStatus").className = "bad";
    $("healthStatus").textContent = "失败：" + e.message;
  }
}

function renderMembers(list) {
  const box = $("members");
  box.innerHTML = "";
  if (!list || !list.length) {
    box.innerHTML = "<div class='muted'>没有在线成员。</div>";
    return;
  }

  list.forEach((m, idx) => {
    const card = document.createElement("div");
    card.className = "member";

    const avatarBox = document.createElement("div");
    avatarBox.className = "avatar";

    const avatar = m.avatar || {};
    const layers = Array.isArray(avatar.layers) ? avatar.layers.slice() : [];
    layers.sort((a,b) => (a.z || 0) - (b.z || 0));

    if (!layers.length) {
      avatarBox.innerHTML = "<div class='muted' style='padding:60px 8px;text-align:center;'>无形象层</div>";
    } else {
      layers.forEach(layer => {
        if (!layer || !layer.src) return;
        const img = document.createElement("img");
        img.src = layer.src;
        img.style.zIndex = layer.z || 1;
        img.onerror = function () { this.style.opacity = ".18"; this.title = "图片加载失败：" + layer.src; };
        avatarBox.appendChild(img);
      });
    }

    const name = document.createElement("div");
    name.innerHTML = "<b>" + (m.nickname || avatar.name || "匿名") + "</b>";

    const meta = document.createElement("div");
    meta.className = "muted";
    meta.style.fontSize = "12px";
    meta.textContent = "id: " + (m.member_id || "-").slice(0, 22) + " / layers: " + layers.length;

    card.appendChild(avatarBox);
    card.appendChild(name);
    card.appendChild(meta);
    box.appendChild(card);
  });
}

async function checkMembers() {
  try {
    const data = await fetchJson(API + "/members?room_id=" + encodeURIComponent(ROOM_ID) + "&v=" + Date.now());
    $("raw").textContent = JSON.stringify(data, null, 2);
    $("memberCount").className = data.count > 0 ? "ok" : "bad";
    $("memberCount").textContent = String(data.count);
    renderMembers(data.members || []);
  } catch (e) {
    $("raw").textContent = String(e.stack || e.message || e);
    $("memberCount").className = "bad";
    $("memberCount").textContent = "读取失败";
    renderMembers([]);
  }
  $("timeText").textContent = new Date().toLocaleString();
}

async function joinTestMember() {
  const body = {
    room_id: ROOM_ID,
    member_id: TEST_ID,
    nickname: "手机测试",
    avatar: {
      id: TEST_ID,
      name: "手机测试",
      gender: "f",
      layers: [
        { key: "body", id: "layer-body", z: 40, label: "身体", src: "https://loveofqshow.online/assets/body_f/body_031.gif" },
        { key: "hair", id: "layer-hair", z: 60, label: "头发", src: "https://loveofqshow.online/assets/hair_f/hair_096.gif" }
      ]
    },
    x: 62,
    y: 88
  };
  await fetchJson(API + "/join", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  await runAll();
}

async function leaveTestMember() {
  await fetchJson(API + "/leave", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ room_id: ROOM_ID, member_id: TEST_ID })
  });
  await runAll();
}

async function runAll() {
  await checkHealth();
  await checkMembers();
}

runAll();
setInterval(checkMembers, 2000);
</script>
</body>
</html>
