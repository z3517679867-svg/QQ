<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>复古聊天室 2010</title>
  <style>
    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Microsoft YaHei", Tahoma, Arial, sans-serif;
      color: #073d66;
      background:
        radial-gradient(circle at 14% 10%, rgba(255,255,255,0.92) 0 4%, transparent 10%),
        radial-gradient(circle at 78% 13%, rgba(255,255,255,0.82) 0 5%, transparent 12%),
        linear-gradient(180deg, #2a8df2 0%, #55b8ff 42%, #bceaff 64%, #71c84a 65%, #3ea63b 100%);
      background-attachment: fixed;
    }

    body::before {
      content: "";
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 34vh;
      z-index: -1;
      background:
        radial-gradient(ellipse at 30% 10%, rgba(255,255,255,0.28), transparent 32%),
        linear-gradient(180deg, #83d46c 0%, #48aa3d 52%, #2f8c2d 100%);
    }

    .chat-page {
      width: 1180px;
      max-width: 96vw;
      height: calc(100dvh - 34px);
      min-height: 660px;
      margin: 18px auto;
      border: 1px solid #0b8fb7;
      border-radius: 9px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(224,248,255,0.98), rgba(245,253,255,0.98));
      box-shadow:
        0 22px 44px rgba(0, 54, 108, 0.32),
        inset 0 1px 0 rgba(255,255,255,0.95);
      display: flex;
      flex-direction: column;
    }

    .title-bar {
      height: 38px;
      flex: 0 0 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px 0 16px;
      color: #073d66;
      font-weight: 700;
      font-size: 18px;
      text-shadow: 0 1px 0 rgba(255,255,255,0.8);
      background:
        linear-gradient(180deg, #7deaff 0%, #22c2f1 48%, #00a4dd 49%, #1dc8ed 100%);
      border-bottom: 1px solid #078db8;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .window-icons {
      color: rgba(255,255,255,0.96);
      letter-spacing: 8px;
      font-size: 18px;
      text-shadow: 0 1px 2px rgba(0,70,110,0.45);
    }

    .chat-main {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      gap: 10px;
      padding: 10px;
    }

    .room-wrap,
    .side-panel,
    .message-panel {
      border: 1px solid #8ccde8;
      background: rgba(255,255,255,0.94);
      border-radius: 6px;
      box-shadow:
        0 4px 14px rgba(0, 83, 126, 0.18),
        inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .room-wrap {
      min-height: 0;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(234,250,255,0.95), rgba(255,255,255,0.94) 58%, rgba(219,246,215,0.95) 59%, rgba(180,230,165,0.95) 100%);
    }

    .room-toolbar {
      height: 34px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      color: #075984;
      border-bottom: 1px solid #b6d9ec;
      background: linear-gradient(180deg, #f6fdff, #d4f3ff);
      font-size: 13px;
      font-weight: 700;
    }

    .room-stage {
      position: relative;
      height: calc(100% - 34px);
      min-height: 420px;
      overflow: hidden;
    }

    .room-stage::before,
    .room-stage::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.72);
      filter: blur(0.2px);
    }

    .room-stage::before {
      width: 150px;
      height: 48px;
      left: 10%;
      top: 10%;
      box-shadow: 80px 12px 0 rgba(255,255,255,0.55), 610px -10px 0 rgba(255,255,255,0.5);
    }

    .room-stage::after {
      width: 300px;
      height: 78px;
      left: -60px;
      bottom: -38px;
      background: rgba(65, 165, 70, 0.35);
      box-shadow: 360px -5px 0 rgba(65, 165, 70, 0.18), 760px -6px 0 rgba(65, 165, 70, 0.2);
    }

    .member {
      position: absolute;
      width: 116px;
      height: 202px;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 2;
    }

    .member.current .name-tag {
      background: linear-gradient(180deg, #fff8c7, #ffe171);
      color: #5f3a00;
      border-color: #e6b800;
    }

    .bubble {
      position: absolute;
      left: 50%;
      top: -28px;
      transform: translateX(-50%);
      min-width: 92px;
      max-width: 180px;
      padding: 5px 8px;
      background: #ffffff;
      border: 1px solid #72b8df;
      border-radius: 12px;
      color: #06466b;
      font-size: 12px;
      line-height: 1.35;
      box-shadow: 0 3px 9px rgba(0,90,140,0.14);
      word-break: break-word;
      z-index: 7;
      display: none;
    }

    .bubble.show {
      display: block;
      animation: bubblePop 0.2s ease-out;
    }

    @keyframes bubblePop {
      from { opacity: 0; transform: translateX(-50%) translateY(6px) scale(0.96); }
      to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    }

    .bubble::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -6px;
      width: 10px;
      height: 10px;
      transform: translateX(-50%) rotate(45deg);
      background: #ffffff;
      border-right: 1px solid #72b8df;
      border-bottom: 1px solid #72b8df;
    }

    .chat-avatar {
      position: relative;
      width: 140px;
      height: 226px;
      margin: 0 auto;
      transform: scale(0.62);
      transform-origin: top center;
      filter: drop-shadow(0 5px 5px rgba(0,70,120,0.18));
    }

    .chat-avatar img {
      position: absolute;
      left: 0;
      top: 0;
      width: 140px;
      height: 226px;
      object-fit: contain;
      pointer-events: none;
    }

    .empty-avatar {
      width: 86px;
      height: 130px;
      margin: 4px auto 0;
      border: 1px dashed #81bde0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.72);
      color: #6d9ab2;
      font-size: 12px;
    }

    .name-tag {
      position: absolute;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      min-width: 76px;
      max-width: 118px;
      padding: 3px 8px;
      border: 1px solid #7bc5e5;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffffff, #d9f4ff);
      color: #075984;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      z-index: 4;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .side-panel {
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .side-title {
      flex: 0 0 auto;
      padding: 9px 10px;
      border-bottom: 1px solid #9cd6ec;
      background: linear-gradient(180deg, #dff9ff, #bfefff);
      font-weight: 700;
      color: #075984;
    }

    .member-list {
      flex: 1 1 auto;
      min-height: 0;
      padding: 8px;
      overflow-y: auto;
      background: linear-gradient(180deg, #ffffff, #f0fbff);
    }

    .member-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      margin-bottom: 6px;
      border: 1px solid #c9e7f4;
      border-radius: 5px;
      background: #ffffff;
      font-size: 13px;
      color: #24415a;
    }

    .member-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #31c969;
      box-shadow: 0 0 0 2px #d9ffe6;
    }

    .side-actions {
      flex: 0 0 auto;
      border-top: 1px solid #d3edf8;
      padding: 8px;
      display: grid;
      gap: 7px;
      background: #f7fcff;
    }

    .message-panel {
      flex: 0 0 150px;
      margin: 0 10px 10px;
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 10px;
      padding: 9px;
    }

    .message-log {
      min-height: 0;
      overflow-y: auto;
      border: 1px solid #c9e7f4;
      border-radius: 5px;
      padding: 8px;
      background: #ffffff;
      color: #24415a;
      font-size: 13px;
      line-height: 1.55;
    }

    .log-line {
      margin-bottom: 4px;
    }

    .log-line.system {
      color: #8a611f;
    }

    .message-box {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .message-box textarea {
      flex: 1 1 auto;
      min-height: 72px;
      resize: none;
      border: 1px solid #8ccde8;
      border-radius: 5px;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
      color: #24415a;
      background: #ffffff;
      outline: none;
    }

    .message-box textarea:focus {
      border-color: #00a4dd;
      box-shadow: 0 0 0 2px rgba(0,164,221,0.12);
    }

    .button-row {
      display: flex;
      gap: 7px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    button,
    .link-btn {
      border: 1px solid #4faed5;
      border-radius: 4px;
      padding: 6px 10px;
      color: #06466b;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(180deg, #ffffff 0%, #c9f2ff 48%, #8bdcff 49%, #dff8ff 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.95),
        0 2px 4px rgba(0,90,140,0.14);
      text-decoration: none;
      text-align: center;
    }

    button:hover,
    .link-btn:hover {
      background: linear-gradient(180deg, #ffffff 0%, #ffe99d 48%, #ffd953 49%, #fff4bc 100%);
      border-color: #e2a600;
      color: #7c4b00;
    }

    .hint {
      font-size: 12px;
      color: #5b91a9;
      line-height: 1.6;
    }

    @media (max-width: 760px) {
      .chat-page {
        width: 100vw;
        max-width: 100vw;
        height: 100dvh;
        min-height: 0;
        margin: 0;
        border-left: none;
        border-right: none;
        border-radius: 0;
      }

      .title-bar {
        height: 34px;
        flex-basis: 34px;
        font-size: 15px;
      }

      .window-icons {
        font-size: 15px;
        letter-spacing: 5px;
      }

      .chat-main {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) 128px;
        padding: 6px;
        gap: 6px;
      }

      .side-panel {
        display: none;
      }

      .room-stage {
        min-height: 0;
      }

      .member {
        width: 104px;
        height: 184px;
      }

      .chat-avatar {
        transform: scale(0.56);
      }

      .name-tag {
        bottom: 8px;
        font-size: 11px;
        min-width: 68px;
        max-width: 104px;
      }

      .bubble {
        top: -26px;
        font-size: 11px;
        max-width: 132px;
      }

      .message-panel {
        flex: 0 0 138px;
        margin: 0 6px 6px;
        grid-template-columns: 1fr;
        padding: 6px;
      }

      .message-log {
        display: none;
      }

      .message-box textarea {
        min-height: 66px;
        font-size: 13px;
      }

      button,
      .link-btn {
        padding: 5px 8px;
        font-size: 12px;
      }
    }
  

    /* =========================
       聊天室人物放大版
       只放大房间里的形象显示，不改聊天逻辑
       ========================= */
    .member {
      width: 156px !important;
      height: 284px !important;
    }

    .chat-avatar {
      transform: scale(0.9) !important;
      transform-origin: top center !important;
    }

    .name-tag {
      bottom: 2px !important;
      min-width: 86px !important;
      max-width: 150px !important;
      font-size: 13px !important;
    }

    .bubble {
      top: -32px !important;
      min-width: 108px !important;
      max-width: 210px !important;
    }

    @media (max-width: 760px) {
      .member {
        width: 132px !important;
        height: 244px !important;
      }

      .chat-avatar {
        transform: scale(0.76) !important;
      }

      .name-tag {
        bottom: 4px !important;
        min-width: 78px !important;
        max-width: 126px !important;
        font-size: 11px !important;
      }

      .bubble {
        top: -28px !important;
        max-width: 170px !important;
      }
    }


    /* =========================
       聊天室点击换位置版
       只增加站位交互，不改聊天和形象图层逻辑
       ========================= */
    .room-stage {
      cursor: crosshair;
    }

    .member.current {
      cursor: pointer;
    }

    .member.current::after {
      content: "点我换位";
      position: absolute;
      left: 50%;
      bottom: -18px;
      transform: translateX(-50%);
      padding: 2px 7px;
      border: 1px solid #7bc5e5;
      border-radius: 999px;
      background: rgba(255,255,255,0.88);
      color: #075984;
      font-size: 11px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.16s ease;
      z-index: 9;
    }

    .member.current:hover::after {
      opacity: 1;
    }

    @media (max-width: 760px) {
      .member.current::after {
        display: none;
      }
    }


    /* =========================
       2026-06-21 人物更大 + 自由换位版
       只改聊天室内人物大小和站位交互，不改聊天、形象图层和换装入口逻辑
       ========================= */
    .room-stage {
      cursor: crosshair !important;
      touch-action: none;
    }

    .member {
      width: 180px !important;
      height: 330px !important;
      transition: left 0.18s ease, top 0.18s ease;
      will-change: left, top;
    }

    .member.current {
      cursor: grab !important;
      z-index: 12;
      touch-action: none;
    }

    .member.current.dragging {
      cursor: grabbing !important;
      transition: none !important;
      z-index: 30;
    }

    .chat-avatar {
      transform: scale(1.08) !important;
      transform-origin: top center !important;
    }

    .name-tag {
      bottom: 10px !important;
      min-width: 92px !important;
      max-width: 164px !important;
      font-size: 13px !important;
    }

    .bubble {
      top: -38px !important;
      min-width: 116px !important;
      max-width: 230px !important;
      font-size: 12px !important;
    }

    .member.current::after {
      content: "拖动 / 点房间换位" !important;
      bottom: -12px !important;
    }

    @media (max-width: 760px) {
      .member {
        width: 154px !important;
        height: 286px !important;
      }

      .chat-avatar {
        transform: scale(0.88) !important;
      }

      .name-tag {
        bottom: 8px !important;
        min-width: 82px !important;
        max-width: 140px !important;
        font-size: 11px !important;
      }

      .bubble {
        top: -32px !important;
        min-width: 96px !important;
        max-width: 180px !important;
        font-size: 11px !important;
      }
    }

    /* =========================
       2026-06-21 聊天室背景选项 + 昵称再贴近人物
       增加城堡花园/涩谷街头两个背景按钮；不改聊天、换位、返回和进入逻辑
       ========================= */
    .room-wrap {
      display: flex !important;
      flex-direction: column !important;
      background: #ffffff !important;
    }

    .room-toolbar {
      height: auto !important;
      min-height: 36px !important;
      flex: 0 0 auto !important;
      flex-wrap: wrap !important;
      padding: 6px 10px !important;
      row-gap: 6px !important;
    }

    .room-toolbar .hint {
      flex: 1 1 260px;
    }

    .bg-switcher {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-left: auto;
      white-space: nowrap;
    }

    .bg-label {
      color: #075984;
      font-size: 12px;
      font-weight: 700;
    }

    .bg-btn {
      border: 1px solid #7bc5e5;
      border-radius: 999px;
      padding: 3px 8px;
      background: linear-gradient(180deg, #ffffff, #d9f4ff);
      color: #075984;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .bg-btn:hover {
      background: linear-gradient(180deg, #ffffff, #fff2b2);
      border-color: #e7bd28;
      color: #5f3a00;
    }

    .bg-btn.active {
      background: linear-gradient(180deg, #fff8c7, #ffe171);
      border-color: #e6b800;
      color: #5f3a00;
    }

    .room-stage {
      flex: 1 1 auto !important;
      height: auto !important;
      background-image: var(--chat-room-bg, url("chat_bg_fixed.png")) !important;
      background-repeat: no-repeat !important;
      background-position: center center !important;
      background-size: cover !important;
    }

    .room-stage::before,
    .room-stage::after {
      display: none !important;
    }

    .member .name-tag {
      bottom: 24px !important;
    }

    @media (max-width: 760px) {
      .room-toolbar {
        padding: 5px 7px !important;
      }

      .room-toolbar .hint {
        display: none;
      }

      .bg-switcher {
        width: 100%;
        margin-left: 0;
        justify-content: center;
      }

      .bg-btn {
        padding: 3px 7px;
        font-size: 11px;
      }

      .room-stage {
        background-size: cover !important;
        background-position: center center !important;
      }

      .member .name-tag {
        bottom: 18px !important;
      }
    }


    /* =========================
       多人聊天室修正版：坐标脚下锚点 + 手机在线用户 + 手机退出按钮 + 系统弹窗
       ========================= */
    .member {
      transform: translate(-50%, -100%) !important;
      width: 178px !important;
      height: 286px !important;
    }

    .member .name-tag {
      top: 250px !important;
      bottom: auto !important;
    }

    .mobile-member-list {
      display: none;
    }

    .mobile-exit-btn {
      display: none;
    }

    .system-toast {
      position: absolute;
      left: 50%;
      top: 54px;
      transform: translateX(-50%) translateY(-8px);
      z-index: 80;
      max-width: min(82%, 520px);
      padding: 8px 14px;
      border: 1px solid #e6b800;
      border-radius: 999px;
      background: linear-gradient(180deg, #fffbe2, #ffe98a);
      color: #6a4a00;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      box-shadow: 0 6px 18px rgba(120, 80, 0, 0.18);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .system-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 760px) {
      .chat-main {
        grid-template-rows: minmax(0, 1fr) 150px !important;
      }

      .room-wrap {
        min-height: 0;
      }

      .mobile-member-list {
        display: flex;
        align-items: center;
        gap: 6px;
        flex: 0 0 auto;
        min-height: 34px;
        padding: 5px 7px;
        overflow-x: auto;
        overflow-y: hidden;
        border-bottom: 1px solid #b6d9ec;
        background: rgba(247, 252, 255, 0.92);
        -webkit-overflow-scrolling: touch;
      }

      .mobile-member-list::-webkit-scrollbar {
        display: none;
      }

      .mobile-member-chip {
        flex: 0 0 auto;
        max-width: 96px;
        padding: 3px 8px;
        border: 1px solid #7bc5e5;
        border-radius: 999px;
        background: linear-gradient(180deg, #ffffff, #d9f4ff);
        color: #075984;
        font-size: 11px;
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .mobile-member-chip.me {
        border-color: #e6b800;
        background: linear-gradient(180deg, #fff8c7, #ffe171);
        color: #5f3a00;
      }

      .member {
        transform: translate(-50%, -100%) !important;
        width: 150px !important;
        height: 244px !important;
      }

      .member .name-tag {
        top: 208px !important;
        bottom: auto !important;
      }

      .mobile-exit-btn {
        display: inline-block;
      }

      .message-panel {
        flex-basis: 150px !important;
      }

      .button-row {
        justify-content: space-between;
      }

      .system-toast {
        top: 76px;
        max-width: 92%;
        padding: 7px 11px;
        font-size: 12px;
      }
    }


    /* =========================
       手机端聊天记录面板修复
       让手机端也显示历史消息，不影响发送、退出和在线用户
       ========================= */
    @media (max-width: 760px) {
      .chat-main {
        grid-template-rows: minmax(0, 1fr) 214px !important;
      }

      .message-panel {
        flex-basis: 214px !important;
        grid-template-columns: 1fr !important;
        grid-template-rows: 78px 1fr !important;
        gap: 6px !important;
        padding: 6px !important;
        margin: 0 6px 6px !important;
      }

      .message-log {
        display: block !important;
        height: 78px !important;
        min-height: 78px !important;
        max-height: 78px !important;
        overflow-y: auto !important;
        padding: 6px 7px !important;
        font-size: 11.5px !important;
        line-height: 1.45 !important;
        background: rgba(255,255,255,0.94) !important;
        -webkit-overflow-scrolling: touch;
      }

      .log-line {
        margin-bottom: 3px !important;

      .message-box {

      }

        gap: 5px !important;
      }
    }

  </style>
</head>
<body>
  <div class="chat-page">
    <div class="title-bar">
      <div>复古聊天室 2010 · 换装小屋房间</div>
      <div class="window-icons">＿ □ ×</div>
    </div>

    <div class="chat-main">
      <section class="room-wrap">
        <div class="room-toolbar">
          <span>房间：怀旧换装大厅</span>
          <span class="hint">多人在线版：点击房间任意位置可移动，别人也能看到</span>
          <div class="bg-switcher" aria-label="聊天室背景选择">
            <span class="bg-label">背景</span>
            <button class="bg-btn" type="button" data-bg="castle" onclick="switchRoomBackground('castle')">城堡花园</button>
            <button class="bg-btn" type="button" data-bg="shibuya" onclick="switchRoomBackground('shibuya')">涩谷街头</button>
          </div>
        </div>
        <div id="mobileMemberList" class="mobile-member-list" aria-label="手机端在线用户"></div>
        <div id="roomStage" class="room-stage"></div>
        <div id="systemToast" class="system-toast" aria-live="polite"></div>
      </section>

      <aside class="side-panel">
        <div class="side-title">在线用户</div>
        <div id="memberList" class="member-list"></div>
        <div class="side-actions">
          <a class="link-btn" href="index.html" onclick="return goBackToCottage(event)">返回换装小屋</a>
          <button type="button" onclick="clearRoom()">退出聊天室</button>
          <div class="hint">多人在线 Demo：同一时间进入房间的人会互相看到。</div>
        </div>
      </aside>
    </div>

    <div class="message-panel">
      <div id="messageLog" class="message-log"></div>
      <div class="message-box">
        <textarea id="messageInput" maxlength="80" placeholder="输入一句话，所有在线用户都会看到。按 Enter 发送，Shift+Enter 换行。"></textarea>
        <div class="button-row">
          <a class="link-btn" href="index.html" onclick="return goBackToCottage(event)">返回换装</a>
          <button type="button" class="mobile-exit-btn" onclick="clearRoom()">退出聊天室</button>
          <button type="button" onclick="sendMessage()">发送</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://jvqcdgbalurasirdgwsz.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_1Ufl2198LFxRiTYzwvvp1g_tYJ0-bIJ";
    const ROOM_ID = "main";

    const CHAT_AVATAR_KEY = "qqshow_chat_avatar_v1";
    const CHAT_MEMBERS_KEY = "qqshow_chat_members_v1";
    const CHAT_CURRENT_MEMBER_KEY = "qqshow_chat_current_member_v1";
    const CHAT_DEVICE_MEMBER_KEY = "qqshow_chat_device_member_id_v2";
    const CHAT_CLEANUP_MEMBER_IDS_KEY = "qqshow_chat_cleanup_member_ids_v1";
    const CHAT_ROOM_BG_KEY = "qqshow_chat_room_background_v1";
    const CHAT_ROOM_BACKGROUNDS = {
      castle: "chat_bg_fixed.png",
      shibuya: "chat_bg_shibuya.png"
    };

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
      realtime: {
        params: { eventsPerSecond: 8 }
      }
    });

    const stagePositions = [
      { left: 18, top: 88 },
      { left: 36, top: 80 },
      { left: 55, top: 91 },
      { left: 75, top: 83 },
      { left: 24, top: 65 },
      { left: 47, top: 67 },
      { left: 68, top: 66 },
      { left: 86, top: 91 },
      { left: 10, top: 78 },
      { left: 90, top: 74 },
      { left: 42, top: 94 },
      { left: 62, top: 94 }
    ];

    const fallbackMembers = [
      { id: "npc_1", name: "系统企鹅", layers: [], npc: true, pos: { left: 18, top: 86 } },
      { id: "npc_2", name: "泡泡糖", layers: [], npc: true, pos: { left: 77, top: 86 } }
    ];

    let membersCache = [];
    let messagesCache = [];
    let currentMemberId = localStorage.getItem(CHAT_DEVICE_MEMBER_KEY) || localStorage.getItem(CHAT_CURRENT_MEMBER_KEY) || "";
    let dragPositionState = null;
    let suppressNextStageClick = false;
    let lastPositionUpdateAt = 0;
    let positionUpdateTimer = null;
    let realtimeReady = false;
    let lastLoadedMessageId = 0;
    let systemToastTimer = null;

    function getSavedRoomBackground() {
      const saved = localStorage.getItem(CHAT_ROOM_BG_KEY);
      return CHAT_ROOM_BACKGROUNDS[saved] ? saved : "castle";
    }

    function applyRoomBackground(bgKey) {
      const key = CHAT_ROOM_BACKGROUNDS[bgKey] ? bgKey : "castle";
      const stage = document.getElementById("roomStage");
      if (stage) {
        stage.style.setProperty("--chat-room-bg", 'url("' + CHAT_ROOM_BACKGROUNDS[key] + '")');
      }

      document.querySelectorAll(".bg-btn").forEach(btn => {
        btn.classList.toggle("active", btn.getAttribute("data-bg") === key);
      });
    }

    async function switchRoomBackground(bgKey) {
      const key = CHAT_ROOM_BACKGROUNDS[bgKey] ? bgKey : "castle";
      localStorage.setItem(CHAT_ROOM_BG_KEY, key);
      applyRoomBackground(key);

      if (currentMemberId) {
        await supabaseClient
          .from("room_members")
          .update({ background_key: key, last_seen: new Date().toISOString() })
          .eq("id", currentMemberId);
      }
    }

    function clampStagePosition(pos) {
      const left = Number(pos && pos.left);
      const top = Number(pos && pos.top);
      return {
        left: Math.max(5, Math.min(95, Number.isFinite(left) ? left : 50)),
        top: Math.max(52, Math.min(96, Number.isFinite(top) ? top : 86))
      };
    }

    function getStagePointerPosition(event) {
      const stage = document.getElementById("roomStage");
      if (!stage) return null;
      const rect = stage.getBoundingClientRect();
      if (!rect.width || !rect.height) return null;
      const point = event.touches && event.touches[0] ? event.touches[0] : event;
      const left = ((point.clientX - rect.left) / rect.width) * 100;
      const top = ((point.clientY - rect.top) / rect.height) * 100;
      return clampStagePosition({ left, top });
    }

    function readJSON(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return fallback;
        const parsed = JSON.parse(raw);
        return parsed || fallback;
      } catch (error) {
        return fallback;
      }
    }

    function escapeHTML(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }


    function isSystemMessage(message) {
      if (!message) return false;
      return message.type === "system" || !message.memberId || message.name === "系统";
    }

    function normalizeMessageRow(row) {
      const system = !row.member_id || row.nickname === "系统";
      return {
        id: row.id,
        type: system ? "system" : "chat",
        memberId: row.member_id,
        name: row.nickname || (system ? "系统" : "匿名小人"),
        text: row.content || "",
        createdAt: row.created_at
      };
    }

    function appendMessage(message) {
      if (!message) return false;
      if (message.id && messagesCache.some(item => String(item.id) === String(message.id))) return false;
      messagesCache.push(message);
      messagesCache = messagesCache.slice(-80);
      return true;
    }

    function showSystemToast(text) {
      const toast = document.getElementById("systemToast");
      if (!toast || !text) return;
      toast.innerText = text;
      toast.classList.add("show");
      clearTimeout(systemToastTimer);
      systemToastTimer = setTimeout(() => {
        toast.classList.remove("show");
      }, 3600);
    }

    function setStatus(text) {
      const list = document.getElementById("memberList");
      if (!list) return;
      if (!membersCache.length) {
        list.innerHTML = `<div class="member-row"><span class="member-dot"></span><span>${escapeHTML(text)}</span></div>`;
      }
    }

    function normalizeMember(row, index) {
      const avatar = row && row.avatar && typeof row.avatar === "object" ? row.avatar : {};
      const pos = clampStagePosition({ left: row.x, top: row.y });
      return {
        id: row.id,
        name: row.nickname || avatar.name || "匿名小人",
        gender: avatar.gender || "f",
        layers: Array.isArray(avatar.layers) ? avatar.layers : [],
        pos,
        index,
        backgroundKey: row.background_key || "castle",
        lastSeen: row.last_seen
      };
    }

    function getMembers() {
      if (membersCache.length) return membersCache;
      const lastAvatar = readJSON(CHAT_AVATAR_KEY, null);
      if (lastAvatar && Array.isArray(lastAvatar.layers)) return [lastAvatar].concat(fallbackMembers);
      return fallbackMembers;
    }

    function getCurrentMemberId(members) {
      if (currentMemberId && members.some(member => member.id === currentMemberId)) return currentMemberId;
      const saved = localStorage.getItem(CHAT_CURRENT_MEMBER_KEY);
      if (saved && members.some(member => member.id === saved)) {
        currentMemberId = saved;
        return saved;
      }
      const firstReal = members.find(member => !member.npc);
      return firstReal ? firstReal.id : members[0].id;
    }

    function getMemberPosition(member, index) {
      if (member && member.pos && typeof member.pos === "object") return clampStagePosition(member.pos);
      return stagePositions[index % stagePositions.length];
    }

    function createAvatarElement(member) {
      const avatar = document.createElement("div");
      avatar.className = "chat-avatar";
      const layers = Array.isArray(member.layers) ? member.layers.slice() : [];
      layers.sort((a, b) => (a.z || 0) - (b.z || 0));

      if (!layers.length) {
        const empty = document.createElement("div");
        empty.className = "empty-avatar";
        empty.innerText = member.npc ? "QQ" : "空形象";
        return empty;
      }

      layers.forEach(layer => {
        if (!layer || !layer.src) return;
        const img = document.createElement("img");
        img.src = layer.src;
        img.alt = layer.label || "";
        img.style.zIndex = layer.z || 1;
        avatar.appendChild(img);
      });
      return avatar;
    }

    function renderRoom() {
      const stage = document.getElementById("roomStage");
      const list = document.getElementById("memberList");
      const mobileList = document.getElementById("mobileMemberList");
      if (!stage || !list) return;

      const members = getMembers();
      const currentId = getCurrentMemberId(members);
      stage.innerHTML = "";
      list.innerHTML = "";
      if (mobileList) mobileList.innerHTML = "";

      members.forEach((member, index) => {
        const pos = getMemberPosition(member, index);
        const memberEl = document.createElement("div");
        memberEl.className = "member" + (member.id === currentId ? " current" : "");
        memberEl.style.left = pos.left + "%";
        memberEl.style.top = pos.top + "%";
        memberEl.setAttribute("data-member-id", member.id);

        if (member.id === currentId && !member.npc) {
          memberEl.title = "按住拖动可自由换位；也可以点击房间任意位置移动";
          memberEl.addEventListener("pointerdown", startCurrentMemberDrag);
          memberEl.addEventListener("click", function (event) {
            event.stopPropagation();
          });
        }

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.setAttribute("data-bubble", member.id);
        memberEl.appendChild(bubble);
        memberEl.appendChild(createAvatarElement(member));

        const nameTag = document.createElement("div");
        nameTag.className = "name-tag";
        nameTag.innerText = member.name || "匿名小人";
        memberEl.appendChild(nameTag);
        stage.appendChild(memberEl);

        const row = document.createElement("div");
        row.className = "member-row";
        row.innerHTML = `<span class="member-dot"></span><span>${escapeHTML(member.name || "匿名小人")}${member.id === currentId ? "（我）" : ""}</span>`;
        list.appendChild(row);

        if (mobileList && index < 8) {
          const chip = document.createElement("div");
          chip.className = "mobile-member-chip" + (member.id === currentId ? " me" : "");
          chip.innerText = (member.name || "匿名小人") + (member.id === currentId ? "（我）" : "");
          mobileList.appendChild(chip);
        }
      });
    }

    function renderMessages() {
      const log = document.getElementById("messageLog");
      if (!log) return;
      const messages = messagesCache.slice(-80);
      if (!messages.length) {
        log.innerHTML = `<div class="log-line system">系统提示：欢迎进入多人怀旧换装大厅。</div>`;
        return;
      }
      log.innerHTML = messages.map(message => {
        if (isSystemMessage(message)) return `<div class="log-line system">系统提示：${escapeHTML(message.text)}</div>`;
        return `<div class="log-line"><b>${escapeHTML(message.name)}：</b>${escapeHTML(message.text)}</div>`;
      }).join("");
      log.scrollTop = log.scrollHeight;
    }

    function showBubble(memberId, text) {
      document.querySelectorAll(".bubble").forEach(el => {
        el.classList.remove("show");
        el.innerText = "";
      });
      const bubble = document.querySelector(`[data-bubble="${CSS.escape(memberId)}"]`);
      if (!bubble) return;
      bubble.innerText = text;
      bubble.classList.add("show");
      clearTimeout(showBubble.timer);
      showBubble.timer = setTimeout(() => bubble.classList.remove("show"), 5200);
    }

    function showLatestBubble() {
      const latest = messagesCache.filter(message => message.type !== "system").slice(-1)[0];
      if (!latest) return;
      showBubble(latest.memberId, latest.text);
    }

    async function loadMembers() {
      const since = new Date(Date.now() - 3 * 60 * 1000).toISOString();
      const { data, error } = await supabaseClient
        .from("room_members")
        .select("id, room_id, nickname, avatar, x, y, background_key, last_seen, created_at")
        .eq("room_id", ROOM_ID)
        .gte("last_seen", since)
        .order("created_at", { ascending: true })
        .limit(30);

      if (error) {
        console.error("读取在线用户失败", error);
        setStatus("数据库未初始化或权限未配置");
        return;
      }

      membersCache = (data || []).map(normalizeMember);
      renderRoom();
    }

    async function loadMessages() {
      const { data, error } = await supabaseClient
        .from("chat_messages")
        .select("id, member_id, nickname, content, created_at")
        .eq("room_id", ROOM_ID)
        .order("created_at", { ascending: false })
        .limit(80);

      if (error) {
        console.error("读取消息失败", error);
        return;
      }

      messagesCache = (data || []).reverse().map(normalizeMessageRow);
      lastLoadedMessageId = messagesCache.reduce((max, item) => {
        const id = Number(item.id);
        return Number.isFinite(id) && id > max ? id : max;
      }, lastLoadedMessageId);
      renderMessages();
    }


    function createSafeRandomId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return "device_" + window.crypto.randomUUID().replace(/-/g, "");
      }
      return "device_" + Date.now() + "_" + Math.random().toString(36).slice(2, 12);
    }

    function getStableMemberIdForThisDevice() {
      let id = localStorage.getItem(CHAT_DEVICE_MEMBER_KEY) || localStorage.getItem(CHAT_CURRENT_MEMBER_KEY) || "";
      if (!id) id = createSafeRandomId();
      localStorage.setItem(CHAT_DEVICE_MEMBER_KEY, id);
      localStorage.setItem(CHAT_CURRENT_MEMBER_KEY, id);
      return id;
    }

    function readCleanupMemberIds() {
      try {
        const raw = localStorage.getItem(CHAT_CLEANUP_MEMBER_IDS_KEY);
        const list = raw ? JSON.parse(raw) : [];
        return Array.isArray(list) ? Array.from(new Set(list.filter(Boolean))) : [];
      } catch (error) {
        return [];
      }
    }

    async function cleanupOldMemberRows(currentId) {
      const oldIds = readCleanupMemberIds().filter(id => id && id !== currentId);
      if (!oldIds.length) return;
      try {
        await supabaseClient
          .from("room_members")
          .delete()
          .in("id", oldIds.slice(0, 20));
        localStorage.removeItem(CHAT_CLEANUP_MEMBER_IDS_KEY);
      } catch (error) {
        console.warn("清理旧在线角色失败，稍后会自动过期", error);
      }
    }

    function getLocalAvatarForJoin() {
      const avatar = readJSON(CHAT_AVATAR_KEY, null);
      if (!avatar || !Array.isArray(avatar.layers) || !avatar.layers.length) return null;
      avatar.id = getStableMemberIdForThisDevice();
      if (!avatar.name) avatar.name = "匿名小人";
      localStorage.setItem(CHAT_AVATAR_KEY, JSON.stringify(avatar));
      localStorage.setItem(CHAT_MEMBERS_KEY, JSON.stringify([avatar]));
      return avatar;
    }

    async function joinRoom() {
      const avatar = getLocalAvatarForJoin();
      if (!avatar) {
        setStatus("请先返回小屋设计形象，再进入聊天室");
        renderRoom();
        return;
      }

      currentMemberId = avatar.id;
      localStorage.setItem(CHAT_DEVICE_MEMBER_KEY, currentMemberId);
      localStorage.setItem(CHAT_CURRENT_MEMBER_KEY, currentMemberId);
      await cleanupOldMemberRows(currentMemberId);
      const existingPos = avatar.pos || stagePositions[Math.floor(Math.random() * stagePositions.length)];
      const pos = clampStagePosition(existingPos);

      const payload = {
        id: currentMemberId,
        room_id: ROOM_ID,
        nickname: String(avatar.name || "匿名小人").slice(0, 12),
        avatar: {
          id: avatar.id,
          name: avatar.name,
          gender: avatar.gender || "f",
          layers: avatar.layers || []
        },
        x: pos.left,
        y: pos.top,
        background_key: getSavedRoomBackground(),
        last_seen: new Date().toISOString()
      };

      const { error } = await supabaseClient
        .from("room_members")
        .upsert(payload, { onConflict: "id" });

      if (error) {
        console.error("进入房间失败", error);
        alert("多人聊天室连接失败：请确认 Supabase SQL 已运行，并开启 Realtime。\n\n" + error.message);
        return;
      }

      await loadMembers();
      await sendSystemMessage("欢迎 " + payload.nickname + " 进入聊天室。", false);
    }

    async function heartbeat() {
      if (!currentMemberId) return;
      await supabaseClient
        .from("room_members")
        .update({ last_seen: new Date().toISOString() })
        .eq("id", currentMemberId);
    }

    async function saveCurrentMemberPosition(pos, positionIndex, options) {
      if (!currentMemberId) return;
      const opts = options || {};
      const cleanPos = clampStagePosition(pos);
      const current = membersCache.find(member => member.id === currentMemberId);
      if (current) current.pos = cleanPos;

      const avatar = readJSON(CHAT_AVATAR_KEY, null);
      if (avatar && avatar.id === currentMemberId) {
        avatar.pos = cleanPos;
        localStorage.setItem(CHAT_AVATAR_KEY, JSON.stringify(avatar));
      }

      if (!opts.skipRender) renderRoom();
      if (!opts.silent) showBubble(currentMemberId, opts.bubbleText || "我换了个位置~");

      const now = Date.now();
      const doUpdate = async () => {
        lastPositionUpdateAt = Date.now();
        await supabaseClient
          .from("room_members")
          .update({ x: cleanPos.left, y: cleanPos.top, last_seen: new Date().toISOString() })
          .eq("id", currentMemberId);
      };

      if (now - lastPositionUpdateAt > 500 || !opts.skipRender) {
        await doUpdate();
      } else {
        clearTimeout(positionUpdateTimer);
        positionUpdateTimer = setTimeout(doUpdate, 520);
      }
    }

    function updateCurrentMemberVisualPosition(pos) {
      if (!currentMemberId) return;
      const cleanPos = clampStagePosition(pos);
      const el = document.querySelector('.member.current[data-member-id="' + CSS.escape(currentMemberId) + '"]');
      if (!el) return;
      el.style.left = cleanPos.left + "%";
      el.style.top = cleanPos.top + "%";
    }

    function moveCurrentMemberToClick(event) {
      if (suppressNextStageClick) {
        suppressNextStageClick = false;
        return;
      }
      const stage = document.getElementById("roomStage");
      if (!stage || !currentMemberId) return;
      const pos = getStagePointerPosition(event);
      if (!pos) return;
      saveCurrentMemberPosition(pos, null, { silent: true });
    }

    function startCurrentMemberDrag(event) {
      const members = getMembers();
      const currentMember = members.find(member => member.id === currentMemberId);
      if (!currentMember || currentMember.npc) return;
      event.preventDefault();
      event.stopPropagation();
      const memberEl = event.currentTarget;
      memberEl.classList.add("dragging");
      if (memberEl.setPointerCapture && event.pointerId !== undefined) {
        try { memberEl.setPointerCapture(event.pointerId); } catch (error) {}
      }
      dragPositionState = {
        id: currentMemberId,
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        moved: false,
        lastPos: getMemberPosition(currentMember, 0)
      };
    }

    function dragCurrentMember(event) {
      if (!dragPositionState) return;
      if (dragPositionState.pointerId !== undefined && event.pointerId !== dragPositionState.pointerId) return;
      const pos = getStagePointerPosition(event);
      if (!pos) return;
      const dx = Math.abs(event.clientX - dragPositionState.startX);
      const dy = Math.abs(event.clientY - dragPositionState.startY);
      if (dx > 3 || dy > 3) dragPositionState.moved = true;
      dragPositionState.lastPos = pos;
      updateCurrentMemberVisualPosition(pos);
    }

    function endCurrentMemberDrag(event) {
      if (!dragPositionState) return;
      if (dragPositionState.pointerId !== undefined && event.pointerId !== dragPositionState.pointerId) return;
      const state = dragPositionState;
      dragPositionState = null;
      suppressNextStageClick = true;
      document.querySelectorAll(".member.current.dragging").forEach(el => el.classList.remove("dragging"));
      if (state.moved && state.lastPos) {
        saveCurrentMemberPosition(state.lastPos, null, { silent: true });
      }
      setTimeout(() => { suppressNextStageClick = false; }, 0);
    }

    function setupStagePositionClick() {
      const stage = document.getElementById("roomStage");
      if (!stage || stage.dataset.positionClickReady === "1") return;
      stage.dataset.positionClickReady = "1";
      stage.addEventListener("click", moveCurrentMemberToClick);
      stage.addEventListener("pointermove", dragCurrentMember, { passive: false });
      stage.addEventListener("pointerup", endCurrentMemberDrag);
      stage.addEventListener("pointercancel", endCurrentMemberDrag);
      stage.addEventListener("pointerleave", function (event) {
        if (dragPositionState) endCurrentMemberDrag(event);
      });
    }

    async function sendSystemMessage(text, localOnly) {
      const cleanText = String(text || "").trim().slice(0, 120);
      if (!cleanText) return;

      if (localOnly) {
        appendMessage({ id: "sys_" + Date.now(), type: "system", memberId: null, name: "系统", text: cleanText, createdAt: new Date().toISOString() });
        renderMessages();
        showSystemToast(cleanText);
        return;
      }

      const { error } = await supabaseClient
        .from("chat_messages")
        .insert({
          room_id: ROOM_ID,
          member_id: null,
          nickname: "系统",
          content: cleanText
        });

      if (error) {
        console.warn("系统消息发送失败，使用本地显示", error);
        appendMessage({ id: "sys_" + Date.now(), type: "system", memberId: null, name: "系统", text: cleanText, createdAt: new Date().toISOString() });
        renderMessages();
        showSystemToast(cleanText);
      }
    }

    async function sendMessage() {
      const input = document.getElementById("messageInput");
      if (!input) return;
      const text = input.value.trim().replace(/\s+/g, " ").slice(0, 80);
      if (!text) return;

      const members = getMembers();
      const currentMember = members.find(member => member.id === currentMemberId);
      if (!currentMember || currentMember.npc) {
        alert("请先从换装小屋进入聊天室。若已经进入，请刷新页面。 ");
        return;
      }

      input.value = "";
      const { error } = await supabaseClient
        .from("chat_messages")
        .insert({
          room_id: ROOM_ID,
          member_id: currentMember.id,
          nickname: currentMember.name || "匿名小人",
          content: text
        });

      if (error) {
        console.error("发送失败", error);
        alert("消息发送失败：" + error.message);
      }
    }

    async function clearRoom() {
      if (!confirm("确定退出多人聊天室吗？你的角色会从当前房间移除。")) return;
      const current = membersCache.find(member => member.id === currentMemberId);
      const nickname = current && current.name ? current.name : "用户";
      await sendSystemMessage(nickname + " 已退出聊天室。", false);
      if (currentMemberId) {
        await supabaseClient.from("room_members").delete().eq("id", currentMemberId);
      }
      localStorage.removeItem(CHAT_CURRENT_MEMBER_KEY);
      currentMemberId = "";
      await loadMembers();
    }

    function goBackToCottage(event) {
      if (event && event.preventDefault) event.preventDefault();
      try {
        const ref = document.referrer || "";
        if (ref) {
          const refUrl = new URL(ref, window.location.href);
          const here = new URL(window.location.href);
          const refFile = (refUrl.pathname.split("/").pop() || "").toLowerCase();
          if (refUrl.origin === here.origin && refFile.indexOf("chat") === -1) {
            window.location.href = refUrl.href;
            return false;
          }
        }
      } catch (error) {}
      window.location.href = "index.html";
      return false;
    }

    function setupRealtime() {
      if (realtimeReady) return;
      realtimeReady = true;

      supabaseClient
        .channel("retro-chatroom-main")
        .on("postgres_changes", { event: "*", schema: "public", table: "room_members", filter: "room_id=eq." + ROOM_ID }, async () => {
          await loadMembers();
        })
        .on("postgres_changes", { event: "INSERT", schema: "public", table: "chat_messages", filter: "room_id=eq." + ROOM_ID }, payload => {
          const row = payload.new;
          const message = normalizeMessageRow(row);
          const isNewAfterInitialLoad = Number(message.id) > lastLoadedMessageId;
          if (appendMessage(message)) {
            const numericId = Number(message.id);
            if (Number.isFinite(numericId) && numericId > lastLoadedMessageId) lastLoadedMessageId = numericId;
            renderMessages();
            if (isSystemMessage(message)) {
              if (isNewAfterInitialLoad) showSystemToast(message.text);
            } else if (isNewAfterInitialLoad) {
              showBubble(message.memberId, message.text);
            }
          }
        })
        .subscribe(status => {
          console.log("Supabase Realtime:", status);
        });
    }

    async function initOnlineChat() {
      applyRoomBackground(getSavedRoomBackground());
      setupStagePositionClick();
      renderRoom();
      renderMessages();
      await loadMessages();
      setupRealtime();
      await joinRoom();
      await loadMembers();
      setInterval(heartbeat, 25000);
      setInterval(loadMembers, 30000);
    }

    window.addEventListener("beforeunload", function () {
      heartbeat();
    });

    document.getElementById("messageInput").addEventListener("keydown", function (event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    initOnlineChat();
  </script>
</body>
</html>
