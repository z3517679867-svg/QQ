<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=overlays-content">
  <!-- 每房间15人限制版：其余逻辑不变 -->
  <title>复古聊天室 2010</title>
  <style>
    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Microsoft YaHei", Tahoma, Arial, sans-serif;
      color: #073d66;
      background:
        radial-gradient(circle at 14% 10%, rgba(255,255,255,0.92) 0 4%, transparent 10%),
        radial-gradient(circle at 78% 13%, rgba(255,255,255,0.82) 0 5%, transparent 12%),
        linear-gradient(180deg, #2a8df2 0%, #55b8ff 42%, #bceaff 64%, #71c84a 65%, #3ea63b 100%);
      background-attachment: fixed;
    }

    body::before {
      content: "";
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 34vh;
      z-index: -1;
      background:
        radial-gradient(ellipse at 30% 10%, rgba(255,255,255,0.28), transparent 32%),
        linear-gradient(180deg, #83d46c 0%, #48aa3d 52%, #2f8c2d 100%);
    }

    .chat-page {
      width: 1180px;
      max-width: 96vw;
      height: calc(100dvh - 34px);
      min-height: 660px;
      margin: 18px auto;
      border: 1px solid #0b8fb7;
      border-radius: 9px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(224,248,255,0.98), rgba(245,253,255,0.98));
      box-shadow:
        0 22px 44px rgba(0, 54, 108, 0.32),
        inset 0 1px 0 rgba(255,255,255,0.95);
      display: flex;
      flex-direction: column;
    }

    .title-bar {
      height: 38px;
      flex: 0 0 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px 0 16px;
      color: #073d66;
      font-weight: 700;
      font-size: 18px;
      text-shadow: 0 1px 0 rgba(255,255,255,0.8);
      background:
        linear-gradient(180deg, #7deaff 0%, #22c2f1 48%, #00a4dd 49%, #1dc8ed 100%);
      border-bottom: 1px solid #078db8;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .window-icons {
      color: rgba(255,255,255,0.96);
      letter-spacing: 8px;
      font-size: 18px;
      text-shadow: 0 1px 2px rgba(0,70,110,0.45);
    }

    .chat-main {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      gap: 10px;
      padding: 10px;
    }

    .room-wrap,
    .side-panel,
    .message-panel {
      border: 1px solid #8ccde8;
      background: rgba(255,255,255,0.94);
      border-radius: 6px;
      box-shadow:
        0 4px 14px rgba(0, 83, 126, 0.18),
        inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .room-wrap {
      min-height: 0;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(234,250,255,0.95), rgba(255,255,255,0.94) 58%, rgba(219,246,215,0.95) 59%, rgba(180,230,165,0.95) 100%);
    }

    .room-toolbar {
      height: 34px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
      color: #075984;
      border-bottom: 1px solid #b6d9ec;
      background: linear-gradient(180deg, #f6fdff, #d4f3ff);
      font-size: 13px;
      font-weight: 700;
    }

    .room-stage {
      position: relative;
      height: calc(100% - 34px);
      min-height: 420px;
      overflow: hidden;
    }

    .room-stage::before,
    .room-stage::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.72);
      filter: blur(0.2px);
    }

    .room-stage::before {
      width: 150px;
      height: 48px;
      left: 10%;
      top: 10%;
      box-shadow: 80px 12px 0 rgba(255,255,255,0.55), 610px -10px 0 rgba(255,255,255,0.5);
    }

    .room-stage::after {
      width: 300px;
      height: 78px;
      left: -60px;
      bottom: -38px;
      background: rgba(65, 165, 70, 0.35);
      box-shadow: 360px -5px 0 rgba(65, 165, 70, 0.18), 760px -6px 0 rgba(65, 165, 70, 0.2);
    }

    .member {
      position: absolute;
      width: 116px;
      height: 202px;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 2;
    }

    .member.current .name-tag {
      background: linear-gradient(180deg, #fff8c7, #ffe171);
      color: #5f3a00;
      border-color: #e6b800;
    }

    .bubble {
      position: absolute;
      left: 50%;
      top: -28px;
      transform: translateX(-50%);
      min-width: 92px;
      max-width: 180px;
      padding: 5px 8px;
      background: #ffffff;
      border: 1px solid #72b8df;
      border-radius: 12px;
      color: #06466b;
      font-size: 12px;
      line-height: 1.35;
      box-shadow: 0 3px 9px rgba(0,90,140,0.14);
      word-break: break-word;
      z-index: 7;
      display: none;
    }

    .bubble.show {
      display: block;
      animation: bubblePop 0.2s ease-out;
    }

    @keyframes bubblePop {
      from { opacity: 0; transform: translateX(-50%) translateY(6px) scale(0.96); }
      to { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    }

    .bubble::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -6px;
      width: 10px;
      height: 10px;
      transform: translateX(-50%) rotate(45deg);
      background: #ffffff;
      border-right: 1px solid #72b8df;
      border-bottom: 1px solid #72b8df;
    }

    .chat-avatar {
      position: relative;
      width: 140px;
      height: 226px;
      margin: 0 auto;
      transform: scale(0.62);
      transform-origin: top center;
      filter: drop-shadow(0 5px 5px rgba(0,70,120,0.18));
    }

    .chat-avatar img {
      position: absolute;
      left: 0;
      top: 0;
      width: 140px;
      height: 226px;
      object-fit: contain;
      pointer-events: none;
    }

    .empty-avatar {
      width: 86px;
      height: 130px;
      margin: 4px auto 0;
      border: 1px dashed #81bde0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.72);
      color: #6d9ab2;
      font-size: 12px;
    }

    .name-tag {
      position: absolute;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      min-width: 76px;
      max-width: 118px;
      padding: 3px 8px;
      border: 1px solid #7bc5e5;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffffff, #d9f4ff);
      color: #075984;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      z-index: 4;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .side-panel {
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .side-title {
      flex: 0 0 auto;
      padding: 9px 10px;
      border-bottom: 1px solid #9cd6ec;
      background: linear-gradient(180deg, #dff9ff, #bfefff);
      font-weight: 700;
      color: #075984;
    }

    .member-list {
      flex: 1 1 auto;
      min-height: 0;
      padding: 8px;
      overflow-y: auto;
      background: linear-gradient(180deg, #ffffff, #f0fbff);
    }

    .member-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      margin-bottom: 6px;
      border: 1px solid #c9e7f4;
      border-radius: 5px;
      background: #ffffff;
      font-size: 13px;
      color: #24415a;
    }

    .member-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #31c969;
      box-shadow: 0 0 0 2px #d9ffe6;
    }

    .side-actions {
      flex: 0 0 auto;
      border-top: 1px solid #d3edf8;
      padding: 8px;
      display: grid;
      gap: 7px;
      background: #f7fcff;
    }

    .message-panel {
      flex: 0 0 150px;
      margin: 0 10px 10px;
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 10px;
      padding: 9px;
    }

    .message-log {
      min-height: 0;
      overflow-y: auto;
      border: 1px solid #c9e7f4;
      border-radius: 5px;
      padding: 8px;
      background: #ffffff;
      color: #24415a;
      font-size: 13px;
      line-height: 1.55;
    }

    .log-line {
      margin-bottom: 4px;
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .log-line.system {
      color: #8a611f;
    }

    .log-content {
      flex: 1 1 auto;
      min-width: 0;
      word-break: break-word;
    }

    .report-btn {
      flex: 0 0 auto;
      border: 1px solid #8ccde8;
      border-radius: 10px;
      background: linear-gradient(#ffffff, #e9f9ff);
      color: #27708b;
      font-size: 11px;
      line-height: 1.2;
      padding: 2px 7px;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }

    .report-btn:hover {
      background: #dff6ff;
      color: #b54040;
      border-color: #efb2b2;
    }

    .report-btn:disabled {
      opacity: 0.55;
      cursor: default;
      color: #7a9bad;
      background: #edf7fb;
      border-color: #c8e2ee;
    }

    .message-box {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .message-box textarea {
      flex: 1 1 auto;
      min-height: 72px;
      resize: none;
      border: 1px solid #8ccde8;
      border-radius: 5px;
      padding: 8px;
      font-family: inherit;
      font-size: 14px;
      color: #24415a;
      background: #ffffff;
      outline: none;
    }

    .message-box textarea:focus {
      border-color: #00a4dd;
      box-shadow: 0 0 0 2px rgba(0,164,221,0.12);
    }

    .button-row {
      display: flex;
      gap: 7px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    button,
    .link-btn {
      border: 1px solid #4faed5;
      border-radius: 4px;
      padding: 6px 10px;
      color: #06466b;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(180deg, #ffffff 0%, #c9f2ff 48%, #8bdcff 49%, #dff8ff 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.95),
        0 2px 4px rgba(0,90,140,0.14);
      text-decoration: none;
      text-align: center;
    }

    button:hover,
    .link-btn:hover {
      background: linear-gradient(180deg, #ffffff 0%, #ffe99d 48%, #ffd953 49%, #fff4bc 100%);
      border-color: #e2a600;
      color: #7c4b00;
    }

    .hint {
      font-size: 12px;
      color: #5b91a9;
      line-height: 1.6;
    }

    @media (max-width: 760px) {
      .chat-page {
        width: 100vw;
        max-width: 100vw;
        height: 100dvh;
        min-height: 0;
        margin: 0;
        border-left: none;
        border-right: none;
        border-radius: 0;
      }

      .title-bar {
        height: 34px;
        flex-basis: 34px;
        font-size: 15px;
      }

      .window-icons {
        font-size: 15px;
        letter-spacing: 5px;
      }

      .chat-main {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 1fr) 128px;
        padding: 6px;
        gap: 6px;
      }

      .side-panel {
        display: none;
      }

      .room-stage {
        min-height: 0;
      }

      .member {
        width: 104px;
        height: 184px;
      }

      .chat-avatar {
        transform: scale(0.56);
      }

      .name-tag {
        bottom: 8px;
        font-size: 11px;
        min-width: 68px;
        max-width: 104px;
      }

      .bubble {
        top: -26px;
        font-size: 11px;
        max-width: 132px;
      }

      .message-panel {
        flex: 0 0 138px;
        margin: 0 6px 6px;
        grid-template-columns: 1fr;
        padding: 6px;
      }

      .message-log {
        display: none;
      }

      .message-box textarea {
        min-height: 66px;
        font-size: 13px;
      }

      button,
      .link-btn {
        padding: 5px 8px;
        font-size: 12px;
      }
    }
  

    /* =========================
       聊天室人物放大版
       只放大房间里的形象显示，不改聊天逻辑
       ========================= */
    .member {
      width: 156px !important;
      height: 284px !important;
    }

    .chat-avatar {
      transform: scale(0.9) !important;
      transform-origin: top center !important;
    }

    .name-tag {
      bottom: 2px !important;
      min-width: 86px !important;
      max-width: 150px !important;
      font-size: 13px !important;
    }

    .bubble {
      top: -32px !important;
      min-width: 108px !important;
      max-width: 210px !important;
    }

    @media (max-width: 760px) {
      .member {
        width: 132px !important;
        height: 244px !important;
      }

      .chat-avatar {
        transform: scale(0.76) !important;
      }

      .name-tag {
        bottom: 4px !important;
        min-width: 78px !important;
        max-width: 126px !important;
        font-size: 11px !important;
      }

      .bubble {
        top: -28px !important;
        max-width: 170px !important;
      }
    }


    /* =========================
       聊天室点击换位置版
       只增加站位交互，不改聊天和形象图层逻辑
       ========================= */
    .room-stage {
      cursor: crosshair;
    }

    .member.current {
      cursor: pointer;
    }

    .member.current::after {
      content: "点我换位";
      position: absolute;
      left: 50%;
      bottom: -18px;
      transform: translateX(-50%);
      padding: 2px 7px;
      border: 1px solid #7bc5e5;
      border-radius: 999px;
      background: rgba(255,255,255,0.88);
      color: #075984;
      font-size: 11px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.16s ease;
      z-index: 9;
    }

    .member.current:hover::after {
      opacity: 1;
    }

    @media (max-width: 760px) {
      .member.current::after {
        display: none;
      }
    }


    /* =========================
       2026-06-21 人物更大 + 自由换位版
       只改聊天室内人物大小和站位交互，不改聊天、形象图层和换装入口逻辑
       ========================= */
    .room-stage {
      cursor: crosshair !important;
      touch-action: none;
    }

    .member {
      width: 180px !important;
      height: 330px !important;
      transition: left 0.18s ease, top 0.18s ease;
      will-change: left, top;
    }

    .member.current {
      cursor: grab !important;
      z-index: 12;
      touch-action: none;
    }

    .member.current.dragging {
      cursor: grabbing !important;
      transition: none !important;
      z-index: 30;
    }

    .chat-avatar {
      transform: scale(1.08) !important;
      transform-origin: top center !important;
    }

    .name-tag {
      bottom: 10px !important;
      min-width: 92px !important;
      max-width: 164px !important;
      font-size: 13px !important;
    }

    .bubble {
      top: -38px !important;
      min-width: 116px !important;
      max-width: 230px !important;
      font-size: 12px !important;
    }

    .member.current::after {
      content: "拖动 / 点房间换位" !important;
      bottom: -12px !important;
    }

    @media (max-width: 760px) {
      .member {
        width: 154px !important;
        height: 286px !important;
      }

      .chat-avatar {
        transform: scale(0.88) !important;
      }

      .name-tag {
        bottom: 8px !important;
        min-width: 82px !important;
        max-width: 140px !important;
        font-size: 11px !important;
      }

      .bubble {
        top: -32px !important;
        min-width: 96px !important;
        max-width: 180px !important;
        font-size: 11px !important;
      }
    }

    /* =========================
       2026-06-21 聊天室背景选项 + 昵称再贴近人物
       增加城堡花园/涩谷街头两个背景按钮；不改聊天、换位、返回和进入逻辑
       ========================= */
    .room-wrap {
      display: flex !important;
      flex-direction: column !important;
      background: #ffffff !important;
    }

    .room-toolbar {
      height: auto !important;
      min-height: 36px !important;
      flex: 0 0 auto !important;
      flex-wrap: wrap !important;
      padding: 6px 10px !important;
      row-gap: 6px !important;
    }

    .room-toolbar .hint {
      flex: 1 1 260px;
    }

    .bg-switcher {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-left: auto;
      white-space: nowrap;
    }

    .bg-label {
      color: #075984;
      font-size: 12px;
      font-weight: 700;
    }

    .bg-btn {
      border: 1px solid #7bc5e5;
      border-radius: 999px;
      padding: 3px 8px;
      background: linear-gradient(180deg, #ffffff, #d9f4ff);
      color: #075984;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .bg-btn:hover {
      background: linear-gradient(180deg, #ffffff, #fff2b2);
      border-color: #e7bd28;
      color: #5f3a00;
    }

    .bg-btn.active {
      background: linear-gradient(180deg, #fff8c7, #ffe171);
      border-color: #e6b800;
      color: #5f3a00;
    }

    .room-stage {
      flex: 1 1 auto !important;
      height: auto !important;
      background-image: var(--chat-room-bg, url("chat_bg_fixed.png")) !important;
      background-repeat: no-repeat !important;
      background-position: center center !important;
      background-size: cover !important;
    }

    .room-stage::before,
    .room-stage::after {
      display: none !important;
    }

    .member .name-tag {
      bottom: 24px !important;
    }

    @media (max-width: 760px) {
      .room-toolbar {
        padding: 5px 7px !important;
      }

      .room-toolbar .hint {
        display: none;
      }

      .bg-switcher {
        width: 100%;
        margin-left: 0;
        justify-content: center;
      }

      .bg-btn {
        padding: 3px 7px;
        font-size: 11px;
      }

      .room-stage {
        background-size: cover !important;
        background-position: center center !important;
      }

      .member .name-tag {
        bottom: 18px !important;
      }
    }


    /* =========================
       多人聊天室修正版：坐标脚下锚点 + 手机在线用户 + 手机退出按钮 + 系统弹窗
       ========================= */
    .member {
      transform: translate(-50%, -100%) !important;
      width: 178px !important;
      height: 286px !important;
    }

    .member .name-tag {
      top: 250px !important;
      bottom: auto !important;
    }

    .mobile-member-list {
      display: none;
    }

    .mobile-exit-btn {
      display: none;
    }

    .system-toast {
      position: absolute;
      left: 50%;
      top: 54px;
      transform: translateX(-50%) translateY(-8px);
      z-index: 80;
      max-width: min(82%, 520px);
      padding: 8px 14px;
      border: 1px solid #e6b800;
      border-radius: 999px;
      background: linear-gradient(180deg, #fffbe2, #ffe98a);
      color: #6a4a00;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      box-shadow: 0 6px 18px rgba(120, 80, 0, 0.18);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .system-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 760px) {
      .chat-main {
        grid-template-rows: minmax(0, 1fr) 150px !important;
      }

      .room-wrap {
        min-height: 0;
      }

      .mobile-member-list {
        display: flex;
        align-items: center;
        gap: 6px;
        flex: 0 0 auto;
        min-height: 34px;
        padding: 5px 7px;
        overflow-x: auto;
        overflow-y: hidden;
        border-bottom: 1px solid #b6d9ec;
        background: rgba(247, 252, 255, 0.92);
        -webkit-overflow-scrolling: touch;
      }

      .mobile-member-list::-webkit-scrollbar {
        display: none;
      }

      .mobile-member-chip {
        flex: 0 0 auto;
        max-width: 96px;
        padding: 3px 8px;
        border: 1px solid #7bc5e5;
        border-radius: 999px;
        background: linear-gradient(180deg, #ffffff, #d9f4ff);
        color: #075984;
        font-size: 11px;
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .mobile-member-chip.me {
        border-color: #e6b800;
        background: linear-gradient(180deg, #fff8c7, #ffe171);
        color: #5f3a00;
      }

      .member {
        transform: translate(-50%, -100%) !important;
        width: 150px !important;
        height: 244px !important;
      }

      .member .name-tag {
        top: 208px !important;
        bottom: auto !important;
      }

      .mobile-exit-btn {
        display: inline-block;
      }

      .message-panel {
        flex-basis: 150px !important;
      }

      .button-row {
