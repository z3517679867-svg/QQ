<body>
  <div class="chat-page">
    <div class="title-bar">
      <div>复古聊天室 2010 · 换装小屋房间</div>
      <div class="window-icons">＿ □ ×</div>
    </div>

    <div class="chat-main">
      <section class="room-wrap">
        <div class="room-toolbar">
          <span id="roomTitle">房间：城堡花园</span>
          <span id="roomCapacity" class="hint">本房间最多 15 人</span>
          <div class="bg-switcher" aria-label="聊天室房间选择">
            <span class="bg-label">房间</span>
            <button class="bg-btn" type="button" data-room="castle" onclick="switchChatRoom('castle')">城堡花园</button>
            <button class="bg-btn" type="button" data-room="shibuya" onclick="switchChatRoom('shibuya')">涩谷街头</button>
            <button class="bg-btn" type="button" data-room="window" onclick="switchChatRoom('window')">窗外的风</button>
            <button class="bg-btn" type="button" data-room="santorini" onclick="switchChatRoom('santorini')">圣托里尼</button>
            <button class="bg-btn" type="button" data-room="stage" onclick="switchChatRoom('stage')">我的舞台</button>
            <button class="bg-btn" type="button" data-room="garden" onclick="switchChatRoom('garden')">园林之语</button>
          </div>
          <div id="systemAnnouncement" class="system-announcement-fixed" aria-label="系统公告">系统公告：欢迎大家来玩耍，注意文明用语~如有不当言论同时被三个用户举报会被禁言</div>
        </div>
        <div id="mobileMemberList" class="mobile-member-list" aria-label="手机端在线用户"></div>
        <div id="roomStage" class="room-stage"></div>
        <div id="systemToast" class="system-toast" aria-live="polite"></div>
      </section>

      <aside class="side-panel">
        <div class="side-title">在线用户</div>
        <div id="memberList" class="member-list"></div>
        <div class="side-actions">
          <a class="link-btn" href="index.html" onclick="return goBackToCottage(event)">返回换装小屋</a>
          <button type="button" onclick="clearRoom()">退出聊天室</button>
          <div class="hint">Cloudflare 实时聊天室测试版：每个背景对应一个独立房间，每个房间最多 15 人。</div>
        </div>
      </aside>
    </div>

    <div class="message-panel">
      <div id="systemLine" class="system-line-fixed" aria-live="polite">系统提示：欢迎进入多人怀旧换装大厅。</div>
      <div id="messageLog" class="message-log"></div>
      <div class="message-box">
        <textarea id="messageInput" maxlength="80" placeholder="输入一句话，所有在线用户都会看到。按 Enter 发送，Shift+Enter 换行。"></textarea>
        <div class="button-row">
          <a class="link-btn" href="index.html" onclick="return goBackToCottage(event)">返回换装</a>
          <button type="button" class="mobile-exit-btn" onclick="clearRoom()">退出聊天室</button>
          <button type="button" onclick="sendMessage()">发送</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const CHAT_API_BASE = "https://chat-api.loveofqshow.online";
    const CHAT_WS_BASE = "wss://chat-api.loveofqshow.online/ws";

    const CHAT_AVATAR_KEY = "qqshow_chat_avatar_v1";
    const CHAT_MEMBERS_KEY = "qqshow_chat_members_v1";
    const CHAT_CURRENT_MEMBER_KEY = "qqshow_chat_current_member_v1";
    const CHAT_DEVICE_MEMBER_KEY = "qqshow_chat_device_member_id_v2";
    const CHAT_CLEANUP_MEMBER_IDS_KEY = "qqshow_chat_cleanup_member_ids_v1";
    const CHAT_ACTIVE_ROOM_KEY = "qqshow_chat_active_room_v2";
    const CHAT_SAVED_NICKNAME_KEY = "qqshow_chat_saved_nickname_v1";
    const CHAT_RETURN_REENTER_KEY = "qqshow_chat_return_reenter_v1";
    const CHAT_PRESERVE_HISTORY_KEY = "qqshow_chat_preserve_history_v1";
    const CHAT_ROOM_BASELINE_PREFIX = "qqshow_chat_room_baseline_v1_";
    const CHAT_ROOM_LIMIT = 15;
    const CHAT_ROOMS = {
      castle: { id: "castle_garden", name: "城堡花园", bg: "chat_bg_fixed.png" },
      shibuya: { id: "shibuya_street", name: "涩谷街头", bg: "chat_bg_shibuya.png" },
      window: { id: "window_view", name: "窗外的风", bg: "chat_bg_window_view.png" },
      santorini: { id: "santorini", name: "圣托里尼", bg: "chat_bg_santorini.png" },
      stage: { id: "my_stage", name: "我的舞台", bg: "chat_bg_my_stage.png" },
      garden: { id: "garden_words", name: "园林之语", bg: "chat_bg_garden_words.png" }
    };
    let currentRoomKey = getSavedRoomKey();
    let currentRoomId = CHAT_ROOMS[currentRoomKey].id;

    let chatSocket = null;
    let chatSocketReady = false;
    let chatReconnectTimer = null;
    let shouldReconnectSocket = true;
    let lastJoinPayload = null;
    let memberPollTimer = null;
    let memberPollInFlight = false;
    let messagePollInFlight = false;
    let lastMembersRenderHash = "";
    let lastMessagesRenderHash = "";
    const MEMBER_POLL_INTERVAL_MS = 4500;

    const stagePositions = [
      { left: 18, top: 90 },
      { left: 36, top: 83 },
      { left: 55, top: 93 },
      { left: 75, top: 86 },
      { left: 24, top: 69 },
      { left: 47, top: 71 },
      { left: 68, top: 70 },
      { left: 86, top: 93 },
      { left: 10, top: 81 },
      { left: 90, top: 78 },
      { left: 42, top: 96 },
      { left: 62, top: 96 }
    ];

    const STAGE_STAND_DOWN_OFFSET = 0;

    // 不再显示系统默认角色；房间里只显示真实进入聊天室的用户。
    const fallbackMembers = [];

    let membersCache = [];
    let messagesCache = [];
    const CHAT_HISTORY_FETCH_LIMIT = 15;
    const CHAT_HISTORY_DISPLAY_LIMIT = 15; // 只显示最近15条
    const activeBubblesByMember = {};
    const activeBubbleTimersByMember = {};
    const BUBBLE_DISPLAY_MS = 5000;
    const BUBBLE_MAX_PER_MEMBER = 2;
    const shownBubbleMessageIds = new Set();
    const recentlySentBubbleKeys = new Map();
    const REPORTS_LOCAL_KEY = "qqshow_chat_reported_message_ids_v1";
    const reportedMessageIds = new Set(readJSON(REPORTS_LOCAL_KEY, []));
    let currentMemberId = localStorage.getItem(CHAT_DEVICE_MEMBER_KEY) || localStorage.getItem(CHAT_CURRENT_MEMBER_KEY) || "";
    let dragPositionState = null;
    let suppressNextStageClick = false;
    let lastPositionUpdateAt = 0;
    let positionUpdateTimer = null;
    let realtimeReady = false;
    let lastLoadedMessageId = 0;
    // 恢复历史消息：手机端和电脑端都读取当前房间最近消息，不再按进入时间截断。
    let roomEntryBaselineMessageId = 0;
    let preserveHistoryReentry = localStorage.getItem(CHAT_PRESERVE_HISTORY_KEY) === "1";
    let systemToastTimer = null;

    function getSavedRoomKey() {
      const saved = localStorage.getItem(CHAT_ACTIVE_ROOM_KEY);
      return CHAT_ROOMS[saved] ? saved : "castle";
    }

    function getCurrentRoomConfig() {
      return CHAT_ROOMS[currentRoomKey] || CHAT_ROOMS.castle;
    }

    function getRoomBaselineStorageKey(roomId) {
      return CHAT_ROOM_BASELINE_PREFIX + (roomId || currentRoomId || "main");
    }

    function readSavedRoomBaseline(roomId) {
      const raw = localStorage.getItem(getRoomBaselineStorageKey(roomId));
      const value = Number(raw);
      return Number.isFinite(value) && value >= 0 ? value : null;
    }

    function saveRoomBaseline(roomId, baseline) {
      const value = Number(baseline);
      if (!Number.isFinite(value) || value < 0) return;
      localStorage.setItem(getRoomBaselineStorageKey(roomId), String(Math.floor(value)));
    }

    function rememberReturnToCottageSession() {
      localStorage.setItem(CHAT_RETURN_REENTER_KEY, "1");
      localStorage.setItem(CHAT_PRESERVE_HISTORY_KEY, "1");
      localStorage.setItem(CHAT_ACTIVE_ROOM_KEY, currentRoomKey);
      const current = membersCache.find(member => member.id === currentMemberId);
      if (current && current.name) {
        localStorage.setItem(CHAT_SAVED_NICKNAME_KEY, current.name);
      } else {
        const avatar = readJSON(CHAT_AVATAR_KEY, null);
        if (avatar && avatar.name) localStorage.setItem(CHAT_SAVED_NICKNAME_KEY, avatar.name);
      }
      if (roomEntryBaselineMessageId >= 0) saveRoomBaseline(currentRoomId, roomEntryBaselineMessageId);
    }

    function applyChatRoom(roomKey) {
      const key = CHAT_ROOMS[roomKey] ? roomKey : "castle";
      const config = CHAT_ROOMS[key];
      currentRoomKey = key;
      currentRoomId = config.id;
      localStorage.setItem(CHAT_ACTIVE_ROOM_KEY, key);

      const stage = document.getElementById("roomStage");
      if (stage) stage.style.setProperty("--chat-room-bg", 'url("' + config.bg + '")');

      const title = document.getElementById("roomTitle");
      if (title) title.innerText = "房间：" + config.name;

      document.querySelectorAll(".bg-btn").forEach(btn => {
        btn.classList.toggle("active", btn.getAttribute("data-room") === key);
      });
      updateRoomCapacityText();
    }

    function hasRenderableAvatarLayers(layers) {
      return Array.isArray(layers) && layers.some(layer => {
        if (!layer || typeof layer.src !== "string") return false;
        const src = layer.src.trim();
        if (!src) return false;
        if (/^(undefined|null)$/i.test(src)) return false;
        return true;
      });
    }

    function isCategoryLikeNickname(name) {
      const cleanName = String(name || "").trim();
      if (!cleanName) return true;
      // 这里用于过滤误入聊天室的素材项，例如“乱码衣服”“xxx上衣”等。
      return /(衣服|上衣|下装|身体|脸|前发|后发|头发|帽子|眼镜|耳饰|脸饰品|背景|前景|特效|手持|颈饰|相框|装饰|翅膀|陪伴)$/.test(cleanName);
    }

    function isRenderableRoomMember(member) {
      if (!member) return false;
      if (member.npc) return false;
      const name = String(member.name || "").trim();
      if (!name) return false;
      if (isCategoryLikeNickname(name)) return false;
      // 不再因为素材图层为空或个别图片加载失败就隐藏用户。
      // 否则会出现“能说话但看不到人”的情况。
      return true;
    }

    function isRenderableRoomMemberRow(row) {
      const avatar = row && row.avatar && typeof row.avatar === "object" ? row.avatar : {};
      const name = String((row && row.nickname) || avatar.name || "").trim();
      if (!name) return false;
      if (isCategoryLikeNickname(name)) return false;
      return true;
    }

    function updateRoomCapacityText() {
      const cap = document.getElementById("roomCapacity");
      if (!cap) return;
      const count = membersCache.filter(isRenderableRoomMember).length;
      cap.innerText = "本房间在线 " + count + "/" + CHAT_ROOM_LIMIT + " 人";
    }

    async function getRoomActiveMemberCount(roomId, excludeId) {
      // Cloudflare Durable Object 会在连接时判断房间人数；前端这里只显示当前缓存人数。
      return membersCache.filter(isRenderableRoomMember).length;
    }

    async function canEnterRoom(roomKey, options) {
      // Cloudflare 后端会严格限制每房间最多 15 人。
      return true;
    }

    async function switchChatRoom(roomKey) {
      const key = CHAT_ROOMS[roomKey] ? roomKey : "castle";
      if (key === currentRoomKey) return;

      const oldRoomId = currentRoomId;
      const oldRoomName = getCurrentRoomConfig().name;
      const oldMember = membersCache.find(member => member.id === currentMemberId);
      const oldName = oldMember && oldMember.name ? oldMember.name : "用户";

      if (currentMemberId) {
        await sendSystemMessage(oldName + " 已退出" + oldRoomName + "。", true);
        try {
          await workerFetch("/leave", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ room_id: oldRoomId, member_id: currentMemberId })
          });
        } catch (error) {
          console.warn("切换房间时清理旧房间在线成员失败", error);
        }
      }

      membersCache = [];
      messagesCache = [];
      clearAllBubbleTimers();
      Object.keys(activeBubblesByMember).forEach(id => delete activeBubblesByMember[id]);
      applyChatRoom(key);
      renderRoom();
      renderMessages();
      await resetRoomHistoryBaseline();
      await loadMessages();
      await joinRoom({ roomSwitch: true });
    }

    function clampStagePosition(pos) {
      const left = Number(pos && pos.left);
      const top = Number(pos && pos.top);
      return {
        left: Math.max(5, Math.min(95, Number.isFinite(left) ? left : 50)),
        top: Math.max(50, Math.min(98, Number.isFinite(top) ? top : 88))
      };
    }

    function getStagePointerPosition(event) {
      const stage = document.getElementById("roomStage");
      if (!stage) return null;
      const rect = stage.getBoundingClientRect();
      if (!rect.width || !rect.height) return null;
      const point = event.touches && event.touches[0] ? event.touches[0] : event;
      const left = ((point.clientX - rect.left) / rect.width) * 100;
      const top = ((point.clientY - rect.top) / rect.height) * 100;
      return clampStagePosition({ left, top });
    }

    function readJSON(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return fallback;
        const parsed = JSON.parse(raw);
        return parsed || fallback;
      } catch (error) {
        return fallback;
      }
    }

    function escapeHTML(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }


    function isSystemMessage(message) {
      if (!message) return false;
      return message.type === "system" || !message.memberId || message.name === "系统";
    }

    function normalizeMessageRow(row) {
      const system = !row.member_id || row.nickname === "系统";
      return {
        id: row.id,
        type: system ? "system" : "chat",
        memberId: row.member_id,
        name: row.nickname || (system ? "系统" : "匿名小人"),
        text: row.content || "",
        createdAt: row.created_at
      };
    }
    function normalizeWorkerMessage(row) {
      if (!row) return null;
      const system = !row.member_id || row.nickname === "系统";
      return {
        id: row.id,
        type: system ? "system" : "chat",
        memberId: row.member_id,
        name: row.nickname || (system ? "系统" : "匿名小人"),
        text: row.content || "",
        createdAt: row.created_at
      };
    }

    function normalizeWorkerMember(item, index) {
      const avatar = item && item.avatar && typeof item.avatar === "object" ? item.avatar : {};
      const pos = clampStagePosition({ left: item.x, top: item.y });
      return {
        id: item.member_id || item.id,
        name: item.nickname || avatar.name || "匿名小人",
        gender: avatar.gender || "f",
        layers: Array.isArray(avatar.layers) ? avatar.layers : [],
        pos,
        index,
        backgroundKey: currentRoomKey,
        lastSeen: item.joined_at || Date.now()
      };
    }

    function getMembersRenderHash(members) {
      return (members || []).map(member => {
        const pos = member && member.pos ? member.pos : {};
        const layers = Array.isArray(member && member.layers) ? member.layers.map(layer => layer && layer.src ? layer.src : "").join("|") : "";
        return [
          member && member.id,
          member && member.name,
          Math.round(Number(pos.left || 0) * 10) / 10,
          Math.round(Number(pos.top || 0) * 10) / 10,
          layers
        ].join("~");
      }).join("||");
    }

    function applyWorkerMembers(rawMembers, options) {
      const opts = options || {};
      let workerMembers = (rawMembers || []).map(normalizeWorkerMember).filter(isRenderableRoomMember);
      workerMembers = workerMembers.slice(0, CHAT_ROOM_LIMIT);
      const localAvatar = readJSON(CHAT_AVATAR_KEY, null);
      const localMember = localAvatar && localAvatar.id === currentMemberId && Array.isArray(localAvatar.layers)
        ? {
            id: currentMemberId,
            name: String(localAvatar.name || "匿名小人").slice(0, 12),
            gender: localAvatar.gender || "f",
            layers: localAvatar.layers || [],
            pos: clampStagePosition(localAvatar.pos || stagePositions[0]),
            index: 0,
            backgroundKey: currentRoomKey,
            lastSeen: Date.now()
          }
        : null;

      if (localMember && !workerMembers.some(member => member.id === currentMemberId)) {
        workerMembers.unshift(localMember);
      }
      workerMembers = workerMembers.slice(0, CHAT_ROOM_LIMIT);

      const nextHash = getMembersRenderHash(workerMembers);
      membersCache = workerMembers;
      if (opts.forceRender || nextHash !== lastMembersRenderHash) {
        lastMembersRenderHash = nextHash;
        renderRoom();
      }
    }

    async function pollWorkerMembers(options) {
      if (!currentRoomId || memberPollInFlight) return;
      memberPollInFlight = true;
      try {
        const data = await workerFetch("/members?room_id=" + encodeURIComponent(currentRoomId), null, 9000);
        if (data && data.ok) {
          applyWorkerMembers(data.members || [], options || {});
        }
      } catch (error) {
        console.warn("读取在线成员失败", error);
      } finally {
        memberPollInFlight = false;
      }
    }

    function startMemberPolling() {
      stopMemberPolling();
      pollWorkerMembers({ forceRender: true });
      memberPollTimer = setInterval(function () { pollWorkerMembers(); }, MEMBER_POLL_INTERVAL_MS);
    }

    function stopMemberPolling() {
      if (memberPollTimer) {
        clearInterval(memberPollTimer);
        memberPollTimer = null;
      }
    }

    async function workerFetch(path, options, timeoutMs) {
      const controller = new AbortController();
      const timer = setTimeout(function () {
        try { controller.abort(); } catch (error) {}
      }, timeoutMs || 10000);

      try {
        const mergedOptions = Object.assign({ cache: "no-store" }, options || {});
        mergedOptions.signal = controller.signal;
        const response = await fetch(CHAT_API_BASE + path, mergedOptions);
        if (!response.ok) {
          let payload = null;
          const text = await response.text().catch(() => "");
          try { payload = text ? JSON.parse(text) : null; } catch (error) {}
          const err = new Error((payload && payload.message) || text || ("HTTP " + response.status));
          err.status = response.status;
          err.code = payload && payload.error ? payload.error : "";
          err.payload = payload;
          throw err;
        }
        return await response.json();
      } finally {
        clearTimeout(timer);
      }
    }

    function getSendErrorMessage(error) {
      if (error && error.code === "room_full") return "当前房间已满，每个房间最多 15 人。请换一个房间。";
      if (error && error.code === "banned") return "当前账号已被禁言，无法发言。";
      if (error && error.name === "AbortError") return "网络超时，请稍后再试。";
      return (error && error.message) || "消息发送失败，请稍后再试。";
    }

    function closeChatSocket() {
      shouldReconnectSocket = false;
      clearTimeout(chatReconnectTimer);
      chatReconnectTimer = null;
      if (chatSocket) {
        try { chatSocket.close(); } catch (error) {}
      }
      chatSocket = null;
      chatSocketReady = false;
      stopMemberPolling();
    }

    function sendSocketPayload(payload) {
      if (!chatSocket || chatSocket.readyState !== WebSocket.OPEN) return false;
      chatSocket.send(JSON.stringify(payload || {}));
      return true;
    }

    function handleSocketMessage(event) {
      let data = null;
      try {
        data = JSON.parse(event.data);
      } catch (error) {
        return;
      }

      if (!data || !data.type) return;

      if (data.type === "connected") {
        chatSocketReady = true;
        if (lastJoinPayload) {
          sendSocketPayload(lastJoinPayload);
          setTimeout(function () { sendSocketPayload({ type: "sync" }); }, 300);
          setTimeout(function () { sendSocketPayload({ type: "sync" }); }, 1200);
        }
        startMemberPolling();
        updateSystemLine("Cloudflare 聊天室已连接（15人显示修复版）。");
        return;
      }

      if (data.type === "members") {
        applyWorkerMembers(data.members || []);
        return;
      }

      if (data.type === "chat") {
        const message = normalizeWorkerMessage(data.message);
        if (appendMessage(message)) {
          const numericId = Number(message.id);
          if (Number.isFinite(numericId) && numericId > lastLoadedMessageId) lastLoadedMessageId = numericId;
          renderMessages();
          if (!isSystemMessage(message)) showBubble(message.memberId, message.text);
        }
        return;
      }

      if (data.type === "room_full") {
        showSystemToast(data.message || "当前房间已满。每个房间最多 15 人。");
        alert(data.message || "当前房间已满。每个房间最多 15 人。");
        return;
      }

      if (data.type === "banned") {
        showSystemToast(data.message || "当前账号已被禁言，无法发言。");
        return;
      }
    }

    function connectChatSocket(avatar, pos) {
      closeChatSocket();
      shouldReconnectSocket = true;
      const params = new URLSearchParams({
        room_id: currentRoomId,
        member_id: currentMemberId,
        nickname: String(avatar.name || "匿名小人").slice(0, 20),
        x: String(pos.left),
        y: String(pos.top)
      });
      const socketUrl = CHAT_WS_BASE + "?" + params.toString();
      chatSocket = new WebSocket(socketUrl);

      lastJoinPayload = {
        type: "join",
        nickname: String(avatar.name || "匿名小人").slice(0, 20),
        avatar: {
          id: avatar.id,
          name: String(avatar.name || "匿名小人").slice(0, 20),
          gender: avatar.gender || "f",
          layers: avatar.layers || []
        },
        x: pos.left,
        y: pos.top
      };

      chatSocket.addEventListener("open", function () {
        chatSocketReady = true;
        sendSocketPayload(lastJoinPayload);
        sendSocketPayload({ type: "sync" });
        startMemberPolling();
      });
      chatSocket.addEventListener("message", handleSocketMessage);
      chatSocket.addEventListener("close", function () {
        chatSocketReady = false;
        if (shouldReconnectSocket && currentMemberId) {
          clearTimeout(chatReconnectTimer);
          chatReconnectTimer = setTimeout(function () {
            const savedAvatar = readJSON(CHAT_AVATAR_KEY, null);
            if (savedAvatar && savedAvatar.id === currentMemberId) {
              const savedPos = savedAvatar.pos || pos;
              connectChatSocket(savedAvatar, clampStagePosition(savedPos));
            }
          }, 2500);
        }
      });
      chatSocket.addEventListener("error", function () {
        showSystemToast("Cloudflare 聊天室连接异常，正在重试。");
      });
    }

    function appendMessage(message) {
      if (!message) return false;
      if (message.id && messagesCache.some(item => String(item.id) === String(message.id))) return false;
      messagesCache.push(message);
      messagesCache = messagesCache.slice(-CHAT_HISTORY_FETCH_LIMIT);
      return true;
    }

    function removeMessageById(messageId) {
      const targetId = String(messageId || "");
      const before = messagesCache.length;
      messagesCache = messagesCache.filter(item => String(item.id || "") !== targetId);
      return messagesCache.length !== before;
    }


    function saveReportedMessageIds() {
      try {
        localStorage.setItem(REPORTS_LOCAL_KEY, JSON.stringify(Array.from(reportedMessageIds).slice(-300)));
      } catch (error) {
        console.warn("保存举报记录失败", error);
      }
    }

    function getMessageById(messageId) {
      const targetId = String(messageId || "");
      return messagesCache.find(item => String(item.id) === targetId) || null;
    }

    function getReporterInfo() {
      const members = getMembers();
      const current = members.find(member => member.id === currentMemberId) || null;
      return {
        id: current && current.id ? current.id : currentMemberId || "",
        name: current && current.name ? current.name : "匿名用户"
      };
    }

    async function reportMessageById(messageId) {
      const message = getMessageById(messageId);
      if (!message || isSystemMessage(message)) {
        showSystemToast("这条消息无法举报。");
        return;
      }

      const key = String(message.id);
      if (reportedMessageIds.has(key)) {
        showSystemToast("你已经举报过这条消息。");
        return;
      }

      const reporter = getReporterInfo();
      if (reporter.id && message.memberId && String(reporter.id) === String(message.memberId)) {
        showSystemToast("不能举报自己的发言。");
        return;
      }

      const confirmed = confirm("确定举报这条不当言论吗？\n\n" + (message.name || "匿名用户") + "：" + (message.text || ""));
      if (!confirmed) return;

      const reasonInput = prompt("请选择或填写举报原因：辱骂 / 低俗 / 广告引流 / 骚扰 / 其他", "不当言论");
      if (reasonInput === null) return;
      const reason = String(reasonInput || "不当言论").trim().slice(0, 80) || "不当言论";

      try {
        const result = await workerFetch("/report", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            room_id: currentRoomId,
            message_id: message.id,
            reported_member_id: message.memberId || null,
            reported_nickname: message.name || "匿名用户",
            reported_content: message.text || "",
            reporter_member_id: reporter.id || null,
            reporter_nickname: reporter.name || "匿名用户",
            reason: reason
          })
        });

        reportedMessageIds.add(key);
        saveReportedMessageIds();
        renderMessages();

        if (result.action === "temporary_ban") {
          showSystemToast("举报已提交。该用户已被自动禁言 3 小时。");
        } else if (result.action === "permanent_ban") {
          showSystemToast("举报已提交。该用户已被自动永久禁言。");
        } else {
          showSystemToast("举报已提交。累计 3 名不同用户举报后，系统会自动禁言。");
        }
      } catch (error) {
        console.error("举报失败", error);
        showSystemToast("举报失败，请稍后再试。");
      }
    }

    window.reportMessageById = reportMessageById;

    function updateSystemLine(text) {
      const line = document.getElementById("systemLine");
      if (!line) return;
      const cleanText = String(text || "").trim();
      line.innerText = cleanText ? "系统提示：" + cleanText : "系统提示：欢迎进入多人怀旧换装大厅。";
    }

    function getLatestSystemMessageText() {
      const latest = messagesCache.filter(message => isSystemMessage(message)).slice(-1)[0];
      return latest ? latest.text : "欢迎进入多人怀旧换装大厅。";
    }

    function showSystemToast(text) {
      updateSystemLine(text);
    }

    function setStatus(text) {
      const list = document.getElementById("memberList");
      if (!list) return;
      if (!membersCache.length) {
        list.innerHTML = `<div class="member-row"><span class="member-dot"></span><span>${escapeHTML(text)}</span></div>`;
      }
    }

    function normalizeMember(row, index) {
      const avatar = row && row.avatar && typeof row.avatar === "object" ? row.avatar : {};
      const pos = clampStagePosition({ left: row.x, top: row.y });
      return {
        id: row.id,
        name: row.nickname || avatar.name || "匿名小人",
        gender: avatar.gender || "f",
        layers: Array.isArray(avatar.layers) ? avatar.layers : [],
        pos,
        index,
        backgroundKey: row.background_key || "castle",
        lastSeen: row.last_seen
      };
    }

    function getMembers() {
      if (membersCache.length) return membersCache;
      const lastAvatar = readJSON(CHAT_AVATAR_KEY, null);
      if (lastAvatar && Array.isArray(lastAvatar.layers)) return [lastAvatar];
      return fallbackMembers;
    }

    function getCurrentMemberId(members) {
      if (currentMemberId && members.some(member => member.id === currentMemberId)) return currentMemberId;
      const saved = localStorage.getItem(CHAT_CURRENT_MEMBER_KEY);
      if (saved && members.some(member => member.id === saved)) {
        currentMemberId = saved;
        return saved;
      }
      const firstReal = members.find(member => !member.npc);
      if (firstReal) return firstReal.id;
      return members[0] ? members[0].id : "";
    }

    function getMemberPosition(member, index) {
      const basePos = (member && member.pos && typeof member.pos === "object")
        ? member.pos
        : stagePositions[index % stagePositions.length];
      const offset = Number.isFinite(STAGE_STAND_DOWN_OFFSET) ? STAGE_STAND_DOWN_OFFSET : 0;
      return clampStagePosition({
        left: basePos.left,
        top: Number(basePos.top) + offset
      });
    }

    function createAvatarElement(member) {
      const avatar = document.createElement("div");
      avatar.className = "chat-avatar";
      const layers = Array.isArray(member.layers) ? member.layers.slice() : [];
      layers.sort((a, b) => (a.z || 0) - (b.z || 0));

      if (!layers.length) {
        const empty = document.createElement("div");
        empty.className = "empty-avatar visible-empty-avatar";
        empty.innerText = member.npc ? "QQ" : "小人";
        return empty;
      }

      layers.forEach(layer => {
        if (!layer || !layer.src) return;
        const img = document.createElement("img");
        img.src = layer.src;
        img.alt = layer.label || "";
        img.style.zIndex = layer.z || 1;
        avatar.appendChild(img);
      });
      return avatar;
    }

    function renderRoom() {
      const stage = document.getElementById("roomStage");
      const list = document.getElementById("memberList");
      const mobileList = document.getElementById("mobileMemberList");
      if (!stage || !list) return;

      const members = getMembers().filter(isRenderableRoomMember);
      const currentId = getCurrentMemberId(members);
      stage.innerHTML = "";
      list.innerHTML = "";
      if (mobileList) mobileList.innerHTML = "";

      updateRoomCapacityText();

      if (!members.length) {
        list.innerHTML = `<div class="member-row"><span class="member-dot"></span><span>暂无在线用户</span></div>`;
        return;
      }

      members.forEach((member, index) => {
        const pos = getMemberPosition(member, index);
        const memberEl = document.createElement("div");
        memberEl.className = "member" + (member.id === currentId ? " current" : "");
        memberEl.style.left = pos.left + "%";
        memberEl.style.top = pos.top + "%";
        memberEl.style.setProperty("z-index", String(100 + Math.round(pos.top * 10) + (member.id === currentId ? 4 : 0)), "important");
        memberEl.setAttribute("data-member-id", member.id);

        if (member.id === currentId && !member.npc) {
          memberEl.title = "按住拖动可自由换位；也可以点击房间任意位置移动";
          memberEl.addEventListener("pointerdown", startCurrentMemberDrag);
          memberEl.addEventListener("click", function (event) {
            event.stopPropagation();
          });
        }

        const bubbleStack = document.createElement("div");
        bubbleStack.className = "bubble-stack";
        bubbleStack.setAttribute("data-bubbles", member.id);
        memberEl.appendChild(bubbleStack);
        memberEl.appendChild(createAvatarElement(member));

        const nameTag = document.createElement("div");
        nameTag.className = "name-tag";
        nameTag.innerText = member.name || "匿名小人";
        memberEl.appendChild(nameTag);
        stage.appendChild(memberEl);
        renderMemberBubbles(member.id);

        const row = document.createElement("div");
        row.className = "member-row";
        row.innerHTML = `<span class="member-dot"></span><span>${escapeHTML(member.name || "匿名小人")}${member.id === currentId ? "（我）" : ""}</span>`;
        list.appendChild(row);

        if (mobileList && index < 8) {
          const chip = document.createElement("div");
          chip.className = "mobile-member-chip" + (member.id === currentId ? " me" : "");
          chip.innerText = (member.name || "匿名小人") + (member.id === currentId ? "（我）" : "");
          mobileList.appendChild(chip);
        }
      });
    }

    function renderMessages() {
      const log = document.getElementById("messageLog");
      if (!log) return;

      updateSystemLine(getLatestSystemMessageText());

      // 历史消息：最多渲染最近 20 条；消息栏通过 CSS 固定为约 5 行高度，剩余内容可滚动查看。
      const chatMessages = messagesCache
        .filter(message => !isSystemMessage(message))
        .slice(-CHAT_HISTORY_DISPLAY_LIMIT);

      if (!chatMessages.length) {
        log.innerHTML = `<div class="log-line system">暂无聊天消息。</div>`;
        return;
      }

      log.innerHTML = chatMessages.map(message => {
        const messageId = String(message.id || "");
        const reported = reportedMessageIds.has(messageId);
        const reportLabel = reported ? "已举报" : "举报";
        const disabledAttr = reported ? " disabled" : "";
        if (message.localPending) {
          return `<div class="log-line pending" data-message-id="${escapeHTML(messageId)}"><span class="log-content"><b>${escapeHTML(message.name)}：</b>${escapeHTML(message.text)}</span><button type="button" class="report-btn" disabled>发送中</button></div>`;
        }
        return `<div class="log-line" data-message-id="${escapeHTML(messageId)}"><span class="log-content"><b>${escapeHTML(message.name)}：</b>${escapeHTML(message.text)}</span><button type="button" class="report-btn" onclick="reportMessageById('${escapeHTML(messageId)}')"${disabledAttr}>${reportLabel}</button></div>`;
      }).join("");
      log.scrollTop = log.scrollHeight;
    }

    function clearBubbleTimer(memberId, bubbleId) {
      if (!memberId || !bubbleId) return;
      const timers = activeBubbleTimersByMember[memberId];
      if (timers && timers[bubbleId]) {
        clearTimeout(timers[bubbleId]);
        delete timers[bubbleId];
      }
    }

    function clearMemberBubbleTimers(memberId) {
      const timers = activeBubbleTimersByMember[memberId];
      if (!timers) return;
      Object.keys(timers).forEach(key => clearTimeout(timers[key]));
      delete activeBubbleTimersByMember[memberId];
    }

    function clearAllBubbleTimers() {
      Object.keys(activeBubbleTimersByMember).forEach(clearMemberBubbleTimers);
    }

    function normalizeBubbleItem(item) {
      const now = Date.now();
      if (item && typeof item === "object") {
        return {
          id: item.id || ("bubble_" + now + "_" + Math.random().toString(36).slice(2)),
          text: String(item.text || "").trim().slice(0, 80),
          expiresAt: Number(item.expiresAt) || (now + BUBBLE_DISPLAY_MS)
        };
      }
      return {
        id: "bubble_" + now + "_" + Math.random().toString(36).slice(2),
        text: String(item || "").trim().slice(0, 80),
        expiresAt: now + BUBBLE_DISPLAY_MS
      };
    }

    function renderMemberBubbles(memberId) {
      if (!memberId) return;
      const stack = document.querySelector(`[data-bubbles="${CSS.escape(memberId)}"]`);
      if (!stack) return;
      const now = Date.now();
      const bubbles = (activeBubblesByMember[memberId] || [])
        .map(normalizeBubbleItem)
        .filter(item => item.text && item.expiresAt > now)
        .slice(-BUBBLE_MAX_PER_MEMBER);
      activeBubblesByMember[memberId] = bubbles;
      stack.innerHTML = bubbles.map(item => {
        return `<div class="bubble show" data-bubble-id="${escapeHTML(item.id)}">${escapeHTML(item.text)}</div>`;
      }).join("");
    }

    function scheduleBubbleRemoval(memberId, bubbleId, delayMs) {
      if (!memberId || !bubbleId) return;
      if (!activeBubbleTimersByMember[memberId]) activeBubbleTimersByMember[memberId] = {};
      clearBubbleTimer(memberId, bubbleId);
      activeBubbleTimersByMember[memberId][bubbleId] = setTimeout(function () {
        const current = activeBubblesByMember[memberId] || [];
        activeBubblesByMember[memberId] = current.filter(item => {
          const bubble = normalizeBubbleItem(item);
          return bubble.id !== bubbleId;
        });
        clearBubbleTimer(memberId, bubbleId);
        renderMemberBubbles(memberId);
      }, Math.max(0, delayMs || BUBBLE_DISPLAY_MS));
    }

    function showBubble(memberId, text) {
      if (!memberId) return;
      const cleanText = String(text || "").trim().slice(0, 80);
      if (!cleanText) return;
      const now = Date.now();
      const bubble = {
        id: "bubble_" + now + "_" + Math.random().toString(36).slice(2),
        text: cleanText,
        expiresAt: now + BUBBLE_DISPLAY_MS
      };
      const current = (activeBubblesByMember[memberId] || [])
        .map(normalizeBubbleItem)
        .filter(item => item.text && item.expiresAt > now);
      current.push(bubble);
      const limited = current.slice(-BUBBLE_MAX_PER_MEMBER);
      const keptIds = new Set(limited.map(item => item.id));
      (activeBubblesByMember[memberId] || []).map(normalizeBubbleItem).forEach(item => {
        if (!keptIds.has(item.id)) clearBubbleTimer(memberId, item.id);
      });
      activeBubblesByMember[memberId] = limited;

      let stack = null;
      try {
        stack = document.querySelector(`[data-bubbles="${CSS.escape(memberId)}"]`);
      } catch (error) {
        stack = null;
      }

      if (!stack) {
        // 成员列表刚刷新时，气泡容器可能还没生成；先重绘房间，再延迟一帧补显示。
        renderRoom();
        requestAnimationFrame(function () {
          renderMemberBubbles(memberId);
        });
      } else {
        renderMemberBubbles(memberId);
      }

      limited.forEach(item => {
        const delay = Math.max(0, item.expiresAt - Date.now());
        scheduleBubbleRemoval(memberId, item.id, delay);
      });
    }


    function makeBubbleDedupeText(text) {
      return String(text || "").trim().replace(/\s+/g, " ").slice(0, 80);
    }

    function rememberOwnBubbleText(text) {
      const clean = makeBubbleDedupeText(text);
      if (!clean) return;
      recentlySentBubbleKeys.set(clean, Date.now() + 12000);
      if (recentlySentBubbleKeys.size > 80) {
        const now = Date.now();
        Array.from(recentlySentBubbleKeys.keys()).forEach(key => {
          if ((recentlySentBubbleKeys.get(key) || 0) < now) recentlySentBubbleKeys.delete(key);
        });
      }
    }

    function shouldSkipDuplicateOwnBubble(message) {
      if (!message || String(message.memberId || "") !== String(currentMemberId || "")) return false;
      const clean = makeBubbleDedupeText(message.text);
      if (!clean) return false;
      const expiresAt = recentlySentBubbleKeys.get(clean) || 0;
      if (expiresAt > Date.now()) {
        recentlySentBubbleKeys.delete(clean);
        return true;
      }
      recentlySentBubbleKeys.delete(clean);
      return false;
    }

    function showMessageBubbleOnce(message) {
      if (!message || isSystemMessage(message) || !message.memberId || !message.text) return;

      // 自己发送时已经即时显示过气泡；服务器消息轮询回来时不要再弹第二次。
      if (shouldSkipDuplicateOwnBubble(message)) return;

      const key = String(message.id || "") || (String(message.memberId) + "_" + String(message.createdAt || "") + "_" + String(message.text || ""));
      if (shownBubbleMessageIds.has(key)) return;
      shownBubbleMessageIds.add(key);
      if (shownBubbleMessageIds.size > 500) {
        Array.from(shownBubbleMessageIds).slice(0, 200).forEach(id => shownBubbleMessageIds.delete(id));
      }
      showBubble(message.memberId, message.text);
    }

    function showLatestBubble() {
      const latest = messagesCache.filter(message => message.type !== "system").slice(-1)[0];
      if (!latest) return;
      showBubble(latest.memberId, latest.text);
    }

    async function loadMembers() {
      renderRoom();
    }

    async function resetRoomHistoryBaseline(options) {
      const opts = options || {};
      // 恢复历史消息：无论新进入、刷新、切换房间，均读取当前房间最近聊天记录。
      roomEntryBaselineMessageId = 0;
      lastLoadedMessageId = 0;
      messagesCache = [];
      Object.keys(activeBubblesByMember).forEach(id => delete activeBubblesByMember[id]);
      updateSystemLine(opts.preserve ? "已返回聊天室，正在恢复房间历史消息。" : "欢迎进入多人怀旧换装大厅。");
      renderMessages();
    }

    async function loadMessages(options) {
      if (!currentRoomId || messagePollInFlight) return;
      messagePollInFlight = true;
      try {
        const previousMaxId = Number(lastLoadedMessageId || 0);
        const data = await workerFetch("/history?room_id=" + encodeURIComponent(currentRoomId) + "&limit=" + CHAT_HISTORY_FETCH_LIMIT, null, 9000);
        const nextMessages = (data.messages || []).map(normalizeWorkerMessage).filter(Boolean);
        const nextHash = nextMessages.map(message => [message.id, message.memberId, message.text, message.createdAt].join("~")).join("||");
        messagesCache = nextMessages;
        const newMaxId = nextMessages.reduce((max, item) => {
          const id = Number(item.id);
          return Number.isFinite(id) && id > max ? id : max;
        }, previousMaxId || 0);

        if ((options && options.forceRender) || nextHash !== lastMessagesRenderHash) {
          lastMessagesRenderHash = nextHash;
          renderMessages();
        }

        // 初次进入只恢复历史，不弹旧气泡；之后轮询到的新发言才弹气泡。
        if (previousMaxId > 0) {
          nextMessages.forEach(message => {
            const id = Number(message.id || 0);
            if (Number.isFinite(id) && id > previousMaxId) {
              showMessageBubbleOnce(message);
            }
          });
        }

        lastLoadedMessageId = newMaxId;
      } catch (error) {
        console.warn("读取 Cloudflare 历史消息失败", error);
      } finally {
        messagePollInFlight = false;
      }
    }


    function createSafeRandomId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return "device_" + window.crypto.randomUUID().replace(/-/g, "");
      }
      return "device_" + Date.now() + "_" + Math.random().toString(36).slice(2, 12);
    }

    function getStableMemberIdForThisDevice() {
      let id = localStorage.getItem(CHAT_DEVICE_MEMBER_KEY) || localStorage.getItem(CHAT_CURRENT_MEMBER_KEY) || "";
      if (!id) id = createSafeRandomId();
      localStorage.setItem(CHAT_DEVICE_MEMBER_KEY, id);
      localStorage.setItem(CHAT_CURRENT_MEMBER_KEY, id);
      return id;
    }

    function readCleanupMemberIds() {
      try {
        const raw = localStorage.getItem(CHAT_CLEANUP_MEMBER_IDS_KEY);
        const list = raw ? JSON.parse(raw) : [];
        return Array.isArray(list) ? Array.from(new Set(list.filter(Boolean))) : [];
      } catch (error) {
        return [];
      }
    }

    async function cleanupOldMemberRows(currentId) {
      // Cloudflare Durable Object 使用 WebSocket 在线状态，不需要清理旧数据库在线行。
    }

    function getLocalAvatarForJoin() {
      const avatar = readJSON(CHAT_AVATAR_KEY, null);
      if (!avatar || !Array.isArray(avatar.layers) || !avatar.layers.length) return null;

      const cleanName = String(avatar.name || "").trim().slice(0, 12);
      if (!cleanName) {
        alert("进入聊天室前必须填写昵称，请先返回换装小屋重新进入聊天室。");
        return null;
      }

      avatar.id = getStableMemberIdForThisDevice();
      avatar.name = cleanName;
      localStorage.setItem(CHAT_AVATAR_KEY, JSON.stringify(avatar));
      localStorage.setItem(CHAT_MEMBERS_KEY, JSON.stringify([avatar]));
      return avatar;
    }

    let httpMessagePollTimer = null;
    let heartbeatTimer = null;
    const HTTP_MESSAGE_POLL_INTERVAL_MS = 1500;

    async function httpJoinRoom(avatar, pos) {
      const response = await workerFetch("/join", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          room_id: currentRoomId,
          member_id: currentMemberId,
          nickname: String(avatar.name || "匿名小人").slice(0, 20),
          avatar: {
            id: avatar.id,
            name: String(avatar.name || "匿名小人").slice(0, 20),
            gender: avatar.gender || "f",
            layers: avatar.layers || []
          },
          x: pos.left,
          y: pos.top
        })
      });

      if (response && response.members) {
        applyWorkerMembers(response.members);
      }
      updateSystemLine("Cloudflare 聊天室已连接（15人显示修复版）。");
      startMemberPolling();
      startMessagePolling();
      return response;
    }

    function startMessagePolling() {
      stopMessagePolling();
      loadMessages({ forceRender: true });
      httpMessagePollTimer = setInterval(function () { loadMessages(); }, HTTP_MESSAGE_POLL_INTERVAL_MS);
    }

    function stopMessagePolling() {
      if (httpMessagePollTimer) {
        clearInterval(httpMessagePollTimer);
        httpMessagePollTimer = null;
      }
    }

    async function sendHttpMessage(text, options) {
      const sendOptions = options || {};
      const avatar = readJSON(CHAT_AVATAR_KEY, null);
      const pos = avatar && avatar.pos ? clampStagePosition(avatar.pos) : { left: 50, top: 82 };

      const result = await workerFetch("/send", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          room_id: currentRoomId,
          member_id: currentMemberId,
          nickname: avatar && avatar.name ? avatar.name : "匿名小人",
          avatar: avatar ? {
            id: avatar.id,
            name: avatar.name,
            gender: avatar.gender || "f",
            layers: avatar.layers || []
          } : {},
          content: text,
          x: pos.left,
          y: pos.top
        })
      });

      if (result && result.message) {
        const message = normalizeWorkerMessage(result.message);
        if (sendOptions.tempId) removeMessageById(sendOptions.tempId);
        appendMessage(message);
        renderMessages();

        // 自己发送时，前端已经即时显示过气泡；这里不重复弹。其他用户仍会通过轮询看到气泡。
        if (!sendOptions.tempId) showMessageBubbleOnce(message);

        const id = Number(message && message.id || 0);
        if (Number.isFinite(id) && id > lastLoadedMessageId) lastLoadedMessageId = id;
      } else if (!sendOptions.tempId) {
        showBubble(currentMemberId, text);
      }

      // 发送成功后的刷新放到后台做，不再让它影响“输入框清空”和发送结果。
      setTimeout(function () {
        pollWorkerMembers().catch(function () {});
        loadMessages().catch(function () {});
      }, 100);

      return result;
    }

    async function joinRoom(options) {
      const joinOptions = options || {};
      const avatar = getLocalAvatarForJoin();
      if (!avatar) {
        setStatus("请先返回小屋设计形象，再进入聊天室");
        renderRoom();
        return;
      }

      currentMemberId = avatar.id;
      localStorage.setItem(CHAT_DEVICE_MEMBER_KEY, currentMemberId);
      localStorage.setItem(CHAT_CURRENT_MEMBER_KEY, currentMemberId);

      const existingPos = avatar.pos || stagePositions[Math.floor(Math.random() * stagePositions.length)];
      const pos = clampStagePosition(existingPos);
      avatar.pos = pos;
      localStorage.setItem(CHAT_AVATAR_KEY, JSON.stringify(avatar));

      const localMember = {
        id: currentMemberId,
        name: String(avatar.name || "匿名小人").trim().slice(0, 12),
        gender: avatar.gender || "f",
        layers: avatar.layers || [],
        pos,
        index: 0,
        backgroundKey: currentRoomKey,
        lastSeen: new Date().toISOString()
      };
      membersCache = [localMember].concat(membersCache.filter(member => member.id !== currentMemberId));
      renderRoom();

      try {
        await httpJoinRoom(avatar, pos);
      } catch (error) {
        console.error("HTTP 加入聊天室失败", error);
        if (error && error.code === "room_full") {
          membersCache = membersCache.filter(member => member.id !== currentMemberId);
          localStorage.removeItem(CHAT_CURRENT_MEMBER_KEY);
          currentMemberId = "";
          renderRoom();
          alert("当前房间已满，每个房间最多 15 人。请换一个房间。");
          showSystemToast("当前房间已满，每个房间最多 15 人。");
          return;
        }
        showSystemToast("聊天室连接失败，请刷新后重试。");
      }

      if (preserveHistoryReentry) {
        showSystemToast(localMember.name + " 已返回" + getCurrentRoomConfig().name + "，继续上次聊天。");
      } else if (!joinOptions.roomSwitch) {
        showSystemToast("欢迎 " + localMember.name + " 进入" + getCurrentRoomConfig().name + "。");
      }
      localStorage.setItem(CHAT_SAVED_NICKNAME_KEY, localMember.name);
      localStorage.removeItem(CHAT_RETURN_REENTER_KEY);
      localStorage.removeItem(CHAT_PRESERVE_HISTORY_KEY);
      preserveHistoryReentry = false;
    }

    async function heartbeat() {
      if (!currentMemberId || !currentRoomId) return;
      sendSocketPayload({ type: "ping" });

      // HTTP 保活：电脑端/手机端只要页面还开着、没有点“退出聊天室”，就持续刷新 last_seen。
      const avatar = readJSON(CHAT_AVATAR_KEY, null);
      const current = membersCache.find(member => member.id === currentMemberId);
      const pos = clampStagePosition(
        (current && current.pos) ||
        (avatar && avatar.pos) ||
        stagePositions[0]
      );

      try {
        const data = await workerFetch("/move", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            room_id: currentRoomId,
            member_id: currentMemberId,
            nickname: avatar && avatar.name ? avatar.name : (current && current.name ? current.name : "匿名小人"),
            avatar: avatar ? {
              id: avatar.id,
              name: avatar.name,
              gender: avatar.gender || "f",
              layers: avatar.layers || []
            } : {},
            x: pos.left,
            y: pos.top
          })
        });
        if (data && data.members) applyWorkerMembers(data.members);
      } catch (error) {
        console.warn("聊天室保活失败", error);
        if (error && error.code === "room_full") {
          showSystemToast("当前房间已满，你没有进入成功。请换一个房间。");
        }
      }
    }

    async function saveCurrentMemberPosition(pos, positionIndex, options) {
      if (!currentMemberId) return;
      const opts = options || {};
      const cleanPos = clampStagePosition(pos);
      const current = membersCache.find(member => member.id === currentMemberId);
      if (current) current.pos = cleanPos;

      const avatar = readJSON(CHAT_AVATAR_KEY, null);
      if (avatar && avatar.id === currentMemberId) {
        avatar.pos = cleanPos;
        localStorage.setItem(CHAT_AVATAR_KEY, JSON.stringify(avatar));
      }

      if (!opts.skipRender) renderRoom();
      if (!opts.silent) showBubble(currentMemberId, opts.bubbleText || "我换了个位置~");

      const now = Date.now();
      const doUpdate = () => {
        lastPositionUpdateAt = Date.now();
        sendSocketPayload({ type: "move", x: cleanPos.left, y: cleanPos.top });
        workerFetch("/move", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            room_id: currentRoomId,
            member_id: currentMemberId,
            x: cleanPos.left,
            y: cleanPos.top
          })
        }).then(function (data) {
          if (data && data.members) applyWorkerMembers(data.members);
        }).catch(function (error) {
          console.warn("HTTP 位置同步失败", error);
        });
      };

      if (now - lastPositionUpdateAt > 500 || !opts.skipRender) {
        doUpdate();
      } else {
        clearTimeout(positionUpdateTimer);
        positionUpdateTimer = setTimeout(doUpdate, 520);
      }
    }

    function updateCurrentMemberVisualPosition(pos) {
      if (!currentMemberId) return;
      const cleanPos = clampStagePosition(pos);
      const el = document.querySelector('.member.current[data-member-id="' + CSS.escape(currentMemberId) + '"]');
      if (!el) return;
      el.style.left = cleanPos.left + "%";
      el.style.top = cleanPos.top + "%";
    }

    function moveCurrentMemberToClick(event) {
      if (suppressNextStageClick) {
        suppressNextStageClick = false;
        return;
      }
      const stage = document.getElementById("roomStage");
      if (!stage || !currentMemberId) return;
      const pos = getStagePointerPosition(event);
      if (!pos) return;
      saveCurrentMemberPosition(pos, null, { silent: true });
    }

    function startCurrentMemberDrag(event) {
      const members = getMembers();
      const currentMember = members.find(member => member.id === currentMemberId);
      if (!currentMember || currentMember.npc) return;
      event.preventDefault();
      event.stopPropagation();
      const memberEl = event.currentTarget;
      memberEl.classList.add("dragging");
      if (memberEl.setPointerCapture && event.pointerId !== undefined) {
        try { memberEl.setPointerCapture(event.pointerId); } catch (error) {}
      }
      dragPositionState = {
        id: currentMemberId,
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        moved: false,
        lastPos: getMemberPosition(currentMember, 0)
      };
    }

    function dragCurrentMember(event) {
      if (!dragPositionState) return;
      if (dragPositionState.pointerId !== undefined && event.pointerId !== dragPositionState.pointerId) return;
      const pos = getStagePointerPosition(event);
      if (!pos) return;
      const dx = Math.abs(event.clientX - dragPositionState.startX);
      const dy = Math.abs(event.clientY - dragPositionState.startY);
      if (dx > 3 || dy > 3) dragPositionState.moved = true;
      dragPositionState.lastPos = pos;
      updateCurrentMemberVisualPosition(pos);
    }

    function endCurrentMemberDrag(event) {
      if (!dragPositionState) return;
      if (dragPositionState.pointerId !== undefined && event.pointerId !== dragPositionState.pointerId) return;
      const state = dragPositionState;
      dragPositionState = null;
      suppressNextStageClick = true;
      document.querySelectorAll(".member.current.dragging").forEach(el => el.classList.remove("dragging"));
      if (state.moved && state.lastPos) {
        saveCurrentMemberPosition(state.lastPos, null, { silent: true });
      }
      setTimeout(() => { suppressNextStageClick = false; }, 0);
    }

    function setupStagePositionClick() {
      const stage = document.getElementById("roomStage");
      if (!stage || stage.dataset.positionClickReady === "1") return;
      stage.dataset.positionClickReady = "1";
      stage.addEventListener("click", moveCurrentMemberToClick);
      stage.addEventListener("pointermove", dragCurrentMember, { passive: false });
      stage.addEventListener("pointerup", endCurrentMemberDrag);
      stage.addEventListener("pointercancel", endCurrentMemberDrag);
      stage.addEventListener("pointerleave", function (event) {
        if (dragPositionState) endCurrentMemberDrag(event);
      });
    }

    async function sendSystemMessage(text, localOnly) {
      const cleanText = String(text || "").trim().slice(0, 120);
      if (!cleanText) return;
      appendMessage({ id: "sys_" + Date.now(), type: "system", memberId: null, name: "系统", text: cleanText, createdAt: new Date().toISOString() });
      renderMessages();
      showSystemToast(cleanText);
    }

    function getChatSendErrorMessage(error) {
      const raw = String((error && (error.message || error.details || error.hint || error.code)) || "");
      if (/MEMBER_PERMANENT_BANNED/i.test(raw)) return "当前账号已被永久禁言，无法发言。";
      if (/MEMBER_TEMP_BANNED/i.test(raw)) return "当前账号已被临时禁言 3 小时，暂时无法发言。";
      if (/BANNED_WORD/i.test(raw)) return "消息包含违规内容，无法发送。";
      if (/LINK_NOT_ALLOWED/i.test(raw)) return "消息包含链接，无法发送。";
      if (/MESSAGE_TOO_LONG/i.test(raw)) return "消息太长，请控制在 80 字以内。";
      if (/EMPTY_MESSAGE/i.test(raw)) return "不能发送空消息。";
      return "消息发送失败，请稍后再试。";
    }


    async function sendMessage() {
      const input = document.getElementById("messageInput");
      if (!input) return;
      const text = input.value.trim().replace(/\s+/g, " ").slice(0, 80);
      if (!text) return;

      const members = getMembers();
      const currentMember = members.find(member => member.id === currentMemberId);
      if (!currentMember || currentMember.npc) {
        alert("请先从换装小屋进入聊天室。若已经进入，请刷新页面。 ");
        return;
      }

      // 先清空输入框，避免手机端/慢网络下“已发出但字还留在框里”。
      input.value = "";
      input.dispatchEvent(new Event("input", { bubbles: true }));
      input.focus();

      // 本机立即显示，不等网络返回，降低电脑端和手机端的发送延迟感。
      const tempId = "local_" + Date.now() + "_" + Math.random().toString(36).slice(2);
      const localMessage = {
        id: tempId,
        type: "chat",
        memberId: currentMemberId,
        name: currentMember.name || "匿名小人",
        text: text,
        createdAt: new Date().toISOString(),
        localPending: true
      };
      appendMessage(localMessage);
      renderMessages();
      showBubble(currentMemberId, text);
      rememberOwnBubbleText(text);

      try {
        await sendHttpMessage(text, { tempId: tempId });
      } catch (error) {
        console.error("HTTP 消息发送失败", error);
        removeMessageById(tempId);
        renderMessages();
        showSystemToast(getSendErrorMessage(error));
        // 不自动把文字塞回输入框，避免误以为没有发送；失败时用户可重新输入。
      }
    }

    async function clearRoom() {
      if (!confirm("确定退出多人聊天室吗？你的角色会从当前房间移除。")) return;
      const current = membersCache.find(member => member.id === currentMemberId);
      const nickname = current && current.name ? current.name : "用户";
      await sendSystemMessage(nickname + " 已退出" + getCurrentRoomConfig().name + "。", true);
      try {
        await workerFetch("/leave", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ room_id: currentRoomId, member_id: currentMemberId })
        });
      } catch (error) {}
      closeChatSocket();
      stopMemberPolling();
      stopMessagePolling();
      if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; }
      localStorage.removeItem(CHAT_CURRENT_MEMBER_KEY);
      currentMemberId = "";
      membersCache = [];
      renderRoom();
    }

    function goBackToCottage(event) {
      if (event && event.preventDefault) event.preventDefault();
      rememberReturnToCottageSession();
      try {
        const ref = document.referrer || "";
        if (ref) {
          const refUrl = new URL(ref, window.location.href);
          const here = new URL(window.location.href);
          const refFile = (refUrl.pathname.split("/").pop() || "").toLowerCase();
          if (refUrl.origin === here.origin && refFile.indexOf("chat") === -1) {
            window.location.href = refUrl.href;
            return false;
          }
        }
      } catch (error) {}
      window.location.href = "index.html";
      return false;
    }

    function setupRealtime() {
      // Cloudflare 版使用原生 WebSocket，不再连接 Supabase Realtime。
    }

    async function initOnlineChat() {
      applyChatRoom(currentRoomKey);
      setupStagePositionClick();
      renderRoom();
      renderMessages();
      await resetRoomHistoryBaseline({ preserve: preserveHistoryReentry });
      await loadMessages();
      await joinRoom();
      if (heartbeatTimer) clearInterval(heartbeatTimer);
      heartbeatTimer = setInterval(heartbeat, 30000);
      heartbeat();
    }

    window.addEventListener("beforeunload", function () {
      shouldReconnectSocket = false;
      if (chatSocket) {
        try { chatSocket.close(); } catch (error) {}
      }
    });

    function resumeMobileChatPolling() {
      if (!currentMemberId) return;
      heartbeat();
      pollWorkerMembers({ forceRender: true });
      loadMessages({ forceRender: true });
      startMemberPolling();
      startMessagePolling();
    }

    document.addEventListener("visibilitychange", function () {
      if (!document.hidden) {
        setTimeout(resumeMobileChatPolling, 300);
      }
    }, { passive: true });

    window.addEventListener("pageshow", function () {
      setTimeout(resumeMobileChatPolling, 300);
    }, { passive: true });

    document.getElementById("messageInput").addEventListener("keydown", function (event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    initOnlineChat();
  </script>
  <script>
    // 手机端输入框固定布局：记录初始可视高度，键盘弹出时不让页面整体被重新压缩或放大。
    (function () {
      var baseHeight = 0;
      function setStableHeight(force) {
        if (window.innerWidth > 760) return;
        if (force || !baseHeight) {
          baseHeight = window.innerHeight || document.documentElement.clientHeight || 0;
          if (baseHeight) document.documentElement.style.setProperty('--chat-app-height', baseHeight + 'px');
        }
      }

      setStableHeight(true);
      window.addEventListener('load', function () { setStableHeight(true); }, { passive: true });
      window.addEventListener('orientationchange', function () {
        baseHeight = 0;
        setTimeout(function () { setStableHeight(true); }, 360);
      }, { passive: true });

      document.addEventListener('DOMContentLoaded', function () {
        var input = document.getElementById('messageInput');
        if (!input) return;
        input.addEventListener('focus', function () {
          setStableHeight(false);
          document.body.classList.add('typing-fixed-layout');
        }, { passive: true });
        input.addEventListener('blur', function () {
          document.body.classList.remove('typing-fixed-layout');
        }, { passive: true });
      });
    })();
  </script>

  <script>
    // iPhone 输入时防自动放大：输入框聚焦期间锁定 viewport，避免 Safari/内置浏览器把页面放大。
    (function () {
      var viewport = document.querySelector('meta[name="viewport"]');
      if (!viewport) return;
      var locked = 'width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=overlays-content';
      viewport.setAttribute('content', locked);

      function lockViewport() {
        viewport.setAttribute('content', locked);
        document.documentElement.style.webkitTextSizeAdjust = '100%';
        document.documentElement.style.textSizeAdjust = '100%';
      }

      window.addEventListener('pageshow', lockViewport, { passive: true });
      window.addEventListener('resize', lockViewport, { passive: true });
      document.addEventListener('focusin', function (event) {
        if (event.target && event.target.id === 'messageInput') {
          lockViewport();
          document.body.classList.add('typing-fixed-layout');
          // 等键盘动画开始后把视图轻微校正，避免浏览器把输入区局部放大。
          setTimeout(function () {
            lockViewport();
            try { window.scrollTo(0, Math.max(0, window.scrollY)); } catch (e) {}
          }, 60);
        }
      }, true);
      document.addEventListener('focusout', function (event) {
        if (event.target && event.target.id === 'messageInput') {
          document.body.classList.remove('typing-fixed-layout');
          lockViewport();
        }
      }, true);
    })();
  </script>
